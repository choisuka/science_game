<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학탐험대 🚌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#001219;--bg2:#0a4a52;--bg3:#0e7490;
  --text:#f1f5f9;--text2:#94d2bd;
  --r:16px;
}
html,body{background:linear-gradient(160deg,#001219 0%,#005f73 100%);color:var(--text);font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100%;overflow-x:hidden}

/* ── 별 배경 ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── 공통 ── */
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 1.2rem 4rem}
.hidden{display:none!important}

/* ── 홈 화면 ── */
#home{text-align:center;padding-top:3.5rem}
.bus-emoji{font-size:5rem;display:block;animation:busFloat 2.5s ease-in-out infinite}
@keyframes busFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
#home h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;margin:.8rem 0 .4rem;
  background:linear-gradient(135deg,#f97316,#eab308,#22c55e,#3b82f6,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#home .sub{color:var(--text2);font-size:1rem;margin-bottom:2.5rem}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-top:1.5rem;text-align:left}
.topic-card{
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r);padding:1.4rem 1.2rem;cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.topic-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.topic-card:hover{border-color:var(--tc)}
.topic-icon{font-size:2.6rem;display:block;margin-bottom:.6rem}
.topic-card h3{font-size:1.05rem;font-weight:800;margin-bottom:.3rem}
.topic-card p{font-size:.78rem;color:var(--text2);line-height:1.6}
.topic-badge{
  position:absolute;top:.8rem;right:.8rem;
  font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;
  background:rgba(255,255,255,.08);color:var(--text2)
}
.topic-card.done .topic-badge{background:rgba(34,197,94,.2);color:#4ade80}

/* ── 퀴즈 화면 ── */
#quiz{padding-top:2rem}
.quiz-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.8rem}
.back-btn{background:rgba(255,255,255,.07);border:none;border-radius:50%;width:40px;height:40px;
  font-size:1.1rem;cursor:pointer;color:var(--text);transition:background .2s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.14)}
.quiz-topic{font-weight:800;font-size:1.1rem}
.progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;flex:1}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f97316,#a855f7);transition:width .4s}
.q-num{font-size:.8rem;color:var(--text2);white-space:nowrap}

.scene-box{
  background:var(--bg2);border-radius:var(--r);padding:1.6rem 1.4rem;
  margin-bottom:1.4rem;border:1px solid rgba(255,255,255,.07);
}
.scene-icon{font-size:3.5rem;text-align:center;display:block;margin-bottom:.8rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.scene-text{font-size:.9rem;color:var(--text2);line-height:1.8;text-align:center}
.scene-text strong{color:var(--text)}

.question{font-size:1.15rem;font-weight:700;line-height:1.6;margin-bottom:1.2rem;text-align:center}

.choices{display:grid;gap:.75rem}
.choice{
  background:var(--bg3);border:1.5px solid rgba(255,255,255,.08);
  border-radius:12px;padding:1rem 1.2rem;cursor:pointer;font-size:.95rem;
  text-align:left;color:var(--text);transition:border-color .15s,background .15s;
  display:flex;align-items:center;gap:.75rem;
}
.choice:hover:not(.disabled){background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.2)}
.choice.correct{background:rgba(34,197,94,.12);border-color:#22c55e;color:#4ade80}
.choice.wrong{background:rgba(239,68,68,.12);border-color:#ef4444;color:#f87171}
.choice.disabled{cursor:default}
.choice-letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.choice.correct .choice-letter{background:rgba(34,197,94,.3)}
.choice.wrong .choice-letter{background:rgba(239,68,68,.3)}

.fact-box{
  background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.25);
  border-radius:12px;padding:1rem 1.2rem;margin-top:1.2rem;
  font-size:.88rem;line-height:1.8;color:var(--text2);
  animation:fadeIn .4s ease
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fact-box strong{color:#fbbf24}
.next-btn{
  width:100%;margin-top:1.2rem;padding:1rem;border-radius:12px;border:none;
  background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;
  font-size:1rem;font-weight:800;cursor:pointer;transition:opacity .2s
}
.next-btn:hover{opacity:.87}

/* ── 주제 소개(영상) 화면 ── */
#intro{text-align:center;padding-top:3rem}
.intro-icon{font-size:5rem;display:block;margin-bottom:.6rem;animation:busFloat 2.5s ease-in-out infinite}
.intro-name{font-size:2rem;font-weight:900;margin-bottom:.3rem}
.intro-desc{color:var(--text2);font-size:.95rem;margin-bottom:1.6rem}
.video-box{position:relative;width:100%;padding-top:56.25%;border-radius:var(--r);overflow:hidden;background:#000}
.video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.no-vid{background:var(--bg2);border-radius:var(--r);padding:2.5rem 1rem;color:var(--text2);font-size:.9rem;margin-bottom:1.4rem}
.vid-nav{display:flex;align-items:center;justify-content:space-between;margin:.6rem 0 1.2rem;gap:.5rem}
.vid-nav-btn{background:rgba(255,255,255,.1);border:none;color:var(--text);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;flex-shrink:0}
.vid-nav-btn:disabled{opacity:.25;cursor:default}
.vid-counter{font-size:.78rem;color:var(--text2)}
.intro-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-start{padding:.9rem 2.2rem;border-radius:100px;border:none;background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;font-size:1rem;font-weight:800;cursor:pointer}
.btn-back2{padding:.9rem 1.6rem;border-radius:100px;border:none;background:var(--bg3);color:var(--text);font-size:1rem;font-weight:700;cursor:pointer}
.story-section{background:var(--bg2);border-radius:var(--r);padding:1.4rem 1.2rem;margin-bottom:1.4rem;border:1px solid rgba(255,255,255,.07);text-align:left}
.story-section h4{font-size:1rem;font-weight:900;margin-bottom:1rem;color:#7dd3c8}
.story-block{margin-bottom:1rem}
.story-block .s-label{font-size:.85rem;font-weight:800;margin-bottom:.3rem;color:var(--text)}
.story-block p{font-size:.82rem;color:var(--text2);line-height:1.9}
.s-intro{font-size:.88rem;color:var(--text2);margin-bottom:1rem;line-height:1.8}
.story-block.tip{background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.25);border-radius:10px;padding:.8rem 1rem;margin-top:.5rem}
.story-block.tip .s-label{color:#fbbf24}

/* ── 수료증 모달 ── */
#cert-modal{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);padding:1rem}
.cert-box{
  background:linear-gradient(160deg,#001a2c 0%,#0a2a3a 60%,#0d3347 100%);
  border:2px solid rgba(234,179,8,.5);border-radius:24px;padding:2.5rem 2rem;
  max-width:480px;width:100%;text-align:center;
  box-shadow:0 0 60px rgba(234,179,8,.2),0 0 120px rgba(234,179,8,.1);
  animation:certIn .5s cubic-bezier(.175,.885,.32,1.275)
}
@keyframes certIn{from{transform:scale(.6) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.cert-badge{font-size:4.5rem;display:block;margin-bottom:.3rem;animation:badgeSpin 1s ease .2s both}
@keyframes badgeSpin{from{transform:rotate(-180deg) scale(0)}to{transform:rotate(0) scale(1)}}
.cert-stars-row{font-size:1.4rem;letter-spacing:.15rem;margin-bottom:1rem}
.cert-title{font-size:2rem;font-weight:900;margin:.3rem 0 .2rem;
  background:linear-gradient(135deg,#fbbf24,#f97316,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cert-sub{font-size:.85rem;color:#94d2bd;letter-spacing:.12em;font-weight:700;margin-bottom:1.2rem}
.cert-deco{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:1.2rem}
.cert-deco::before,.cert-deco::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(234,179,8,.4),transparent)}
.cert-deco span{color:#fbbf24;font-size:.9rem}
.cert-body{font-size:.9rem;color:var(--text2);line-height:1.9;margin-bottom:1.5rem}
.cert-topics{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1.5rem}
.cert-topic-chip{font-size:.75rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.25rem .7rem;color:var(--text2)}
.cert-seal{font-size:.8rem;color:#fbbf24;font-weight:700;margin-bottom:1.4rem;opacity:.85}
.cert-close{padding:.75rem 2rem;border-radius:100px;border:none;background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;font-size:.95rem;font-weight:800;cursor:pointer;width:100%}
/* ── 결과 화면 ── */
#result{text-align:center;padding-top:3rem}
.result-icon{font-size:5rem;display:block;margin-bottom:1rem;animation:spin .5s ease}
@keyframes spin{from{transform:rotate(-20deg) scale(.8)}to{transform:rotate(0) scale(1)}}
#result h2{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.stars{font-size:2.5rem;letter-spacing:.2rem;margin:1rem 0}
.score-txt{color:var(--text2);font-size:1rem;margin-bottom:2rem}
.result-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.result-btn{padding:.75rem 1.8rem;border-radius:100px;border:none;font-size:.95rem;font-weight:700;cursor:pointer}
.btn-retry{background:var(--bg3);color:var(--text)}
.btn-home{background:linear-gradient(135deg,#f97316,#a855f7);color:#fff}
/* ── 우주 씬 애니메이션 ── */
.space-scene{position:relative;width:100%;height:190px;overflow:hidden;border-radius:14px;background:radial-gradient(ellipse at 50% 55%,#0d1b3e 0%,#001015 100%);margin-bottom:1.2rem}
.ss-star{position:absolute;border-radius:50%;background:#fff;animation:ssTwinkle 2s ease-in-out infinite}
@keyframes ssTwinkle{0%,100%{opacity:.15}50%{opacity:1}}
.ss-sun{position:absolute;left:50%;top:50%;font-size:2.8rem;transform:translate(-50%,-50%);z-index:4;animation:ssGlow 3s ease-in-out infinite}
@keyframes ssGlow{0%,100%{filter:drop-shadow(0 0 8px #fbbf24) drop-shadow(0 0 20px #f97316)}50%{filter:drop-shadow(0 0 20px #fbbf24) drop-shadow(0 0 42px #f97316) drop-shadow(0 0 70px rgba(251,191,36,.25))}}
.ss-orbit{position:absolute;left:50%;top:50%;border-radius:50%;border:1px dashed rgba(255,255,255,.1);animation:ssRot 10s linear infinite}
@keyframes ssRot{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.ss-planet{position:absolute;top:-14px;left:50%;transform:translateX(-50%);line-height:1;font-size:1.5rem}
</style>
<script src="../toro_ai.js"></script>
</head>
<body>
<a href="https://choisuka.github.io/" style="position:fixed;top:12px;left:12px;z-index:999;background:rgba(10,10,26,.88);border:1px solid rgba(168,85,247,.4);color:#c084fc;text-decoration:none;border-radius:20px;padding:6px 15px;font-family:'Jua',sans-serif;font-size:.8rem;backdrop-filter:blur(8px)">🏠 메인 허브</a>
<canvas id="c"></canvas>

<!-- ── 홈 ── -->
<div class="wrap" id="home">
  <span class="bus-emoji">🚌</span>
  <h1>과학탐험대</h1>
  <p class="sub">매직스쿨버스를 타고 떠나는 신비한 과학 여행!<br>11가지 주제, 주제마다 5문제 도전!</p>
  <a href="story.html" style="display:inline-block;margin-bottom:1.5rem;padding:.65rem 1.6rem;border-radius:100px;background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.4);color:#c084fc;font-size:.9rem;font-weight:700;text-decoration:none">📖 과학 설명 먼저 보기</a>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- ── 주제 소개 ── -->
<div class="wrap hidden" id="intro">
  <span class="intro-icon" id="intro-icon"></span>
  <h2 class="intro-name" id="intro-name"></h2>
  <p class="intro-desc" id="intro-desc"></p>
  <div id="video-area"></div>
  <div id="story-area"></div>
  <div class="intro-btns">
    <button class="btn-back2" onclick="goHome()">← 돌아가기</button>
    <button class="btn-start" onclick="beginQuiz()">퀴즈 시작! 🚀</button>
  </div>
</div>

<!-- ── 퀴즈 ── -->
<div class="wrap hidden" id="quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="quiz-topic" id="quiz-topic-name"></span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="q-num" id="q-num"></span>
  </div>
  <div class="scene-box">
    <span class="scene-icon" id="scene-icon"></span>
    <p class="scene-text" id="scene-text"></p>
  </div>
  <p class="question" id="question-text"></p>
  <div class="choices" id="choices"></div>
  <div class="fact-box hidden" id="fact-box"></div>
  <button class="next-btn hidden" id="next-btn" onclick="nextQ()">다음 →</button>
</div>

<!-- ── 수료증 모달 ── -->
<div id="cert-modal" class="hidden">
  <div class="cert-box">
    <div class="cert-stars-row">🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟</div>
    <span class="cert-badge">🏅</span>
    <h2 class="cert-title">주니어 과학 대장</h2>
    <p class="cert-sub">JUNIOR SCIENCE EXPLORER</p>
    <div class="cert-deco"><span>✦ 매직스쿨버스 과학탐험대 ✦</span></div>
    <p class="cert-body">과학탐험대의 <strong style="color:#fbbf24">11가지 주제</strong>를 모두 탐험하고<br>퀴즈를 완주하였기에 이 상장을 드립니다.<br><br>호기심 넘치는 탐험가 정신으로<br>과학의 세계를 빛내 주세요! 🚌💫</p>
    <div class="cert-topics" id="cert-topics"></div>
    <p class="cert-seal">🚌 매직스쿨버스 탐험대장 드림 · 2026</p>
    <button class="cert-close" onclick="closeCert()">🎉 닫기</button>
  </div>
</div>

<!-- ── 결과 ── -->
<div class="wrap hidden" id="result">
  <span class="result-icon" id="result-icon"></span>
  <h2 id="result-title"></h2>
  <div class="stars" id="result-stars"></div>
  <p class="score-txt" id="result-score"></p>
  <div class="result-btns">
    <button class="result-btn btn-retry" onclick="retryTopic()">다시 도전 🔄</button>
    <button class="result-btn btn-home" onclick="goHome()">다른 주제 탐험 🚌</button>
  </div>
</div>

<script>
// ── 별 배경 ──
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,stars=[];
function resizeCanvas(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,a:Math.random()}))}
function drawStars(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(drawStars)}
window.addEventListener('resize',resizeCanvas);resizeCanvas();drawStars();

// ── 주제 데이터 ──
const TOPICS = [
  {
    id:'space', icon:'🚀', name:'우주 탐험', color:'#3b82f6',
    desc:'태양계 · 별 · 블랙홀',
    tip:'<strong>질문 던지기:</strong> "달이 매일 모양이 바뀌는 것 혹시 알았어?", "태양을 맨눈으로 보면 왜 안 될까?" 같은 질문으로 호기심을 불러일으켜 주세요.<br><br><strong>연결하기:</strong> "수업에서 배운 동그란 모양(구)이 지구, 달, 태양 모두 같은 모양이란다. 우주도 수학으로 설명돼!"',
    vids:[{id:'',desc:'🌌 우주 탐험 가이드',storyHtml:`<div class="space-scene">
<div class="ss-star" style="width:2px;height:2px;top:12%;left:8%;animation-delay:0s"></div>
<div class="ss-star" style="width:3px;height:3px;top:20%;left:78%;animation-delay:.7s"></div>
<div class="ss-star" style="width:2px;height:2px;top:68%;left:14%;animation-delay:1.1s"></div>
<div class="ss-star" style="width:3px;height:3px;top:80%;left:87%;animation-delay:.3s"></div>
<div class="ss-star" style="width:2px;height:2px;top:38%;left:92%;animation-delay:1.5s"></div>
<div class="ss-star" style="width:2px;height:2px;top:55%;left:4%;animation-delay:.9s"></div>
<div class="ss-star" style="width:3px;height:3px;top:10%;left:42%;animation-delay:1.8s"></div>
<div class="ss-star" style="width:2px;height:2px;top:85%;left:57%;animation-delay:.4s"></div>
<div class="ss-star" style="width:2px;height:2px;top:30%;left:25%;animation-delay:1.3s"></div>
<div class="ss-star" style="width:3px;height:3px;top:75%;left:35%;animation-delay:.6s"></div>
<div class="ss-sun">☀️</div>
<div class="ss-orbit" style="width:100px;height:100px;animation-duration:6s"><span class="ss-planet" style="font-size:1rem;top:-12px">🌍</span></div>
<div class="ss-orbit" style="width:150px;height:150px;animation-duration:11s;animation-direction:reverse"><span class="ss-planet" style="font-size:1.3rem;top:-15px">🪐</span></div>
<div class="ss-orbit" style="width:60px;height:60px;animation-duration:3.5s"><span class="ss-planet" style="font-size:.85rem;top:-10px">🌙</span></div>
<p style="position:absolute;bottom:7px;left:0;right:0;text-align:center;font-size:.68rem;color:rgba(148,210,189,.45);letter-spacing:.06em">✨ 우리 우주 동네 — 태양계 ✨</p>
</div>
<h4 style="color:#fbbf24">👨‍👩‍👧 우주 이야기, 이렇게 읽어주세요!</h4>
<div class="story-block"><div class="s-label">🎙️ 팁 1. 목소리에 우주 효과음 넣기</div><p>엘리베이터가 올라갈 때는 "슈우우웅~", 행성이 뱅글뱅글 돌 때는 "빙글빙글~", 운석이 부딪힐 때는 "쾅쾅!" 실감 나게 소리를 내주세요. 아이가 영상 속에 직접 들어온 기분을 느낄 수 있어요!</p></div>
<div class="story-block"><div class="s-label">🤸 팁 2. 몸을 움직이는 체험형 스토리텔링</div><p>"토성 고리를 피해 가고 있어!"라고 할 때 아이 손을 잡고 요리조리 피하는 흉내를 내보세요. "태양은 아주 뜨거워!"라고 할 때는 부채질을 하거나 덥다는 표정을 함께 지어주면 훨씬 잘 이해한답니다.</p></div>
<div class="story-block"><div class="s-label">⭐ 팁 3. 아이 이름을 넣어 주인공 만들기</div><p>"옴섬이 엘리베이터를 탔어" 대신 <strong>"(아이 이름) 탐험가가 지금 우주 엘리베이터에 탔습니다! 안전벨트를 매세요!"</strong>라고 말해주면 아이가 훨씬 더 몰입해요.</p></div>
<div class="story-block"><div class="s-label">❓ 상상력을 깨우는 질문들</div><p>🚀 <strong>우주 엘리베이터</strong><br>"달에 도착하면 제일 먼저 누구에게 전화를 걸어볼까?"<br>"달에 가면 어떤 간식을 제일 먼저 먹고 싶어?"<br><br>🪐 <strong>태양계 행성</strong><br>"태양한테 선물을 준다면, 뜨겁지 말라고 어떤 걸 선물해주고 싶어?" (예: 커다란 아이스크림!)<br>"토성은 고리 허리띠를 하고 있네? 어떤 색깔 고리를 갖고 싶니?"<br>"빨간 화성이 좋아? 아니면 누워서 자는 천왕성이 좋아?"<br><br>🌍 <strong>지구와 우주</strong><br>"달이 갑자기 숨바꼭질하러 숨어버리면 어떻게 달님을 찾을 수 있을까?"<br>"우주선 창밖으로 작아진 지구를 보면 사탕처럼 보일까, 공처럼 보일까?"</p></div>
<div class="story-block tip"><div class="s-label">💡 부모님께 드리는 작은 조언</div><p>아이가 "왜?"라고 물었을 때 꼭 과학적인 정답을 말해주지 않아도 돼요. <strong>"와, 정말 멋진 생각이다! 엄마(아빠)는 생각도 못 했네?"</strong>라고 상상력을 먼저 칭찬해 주세요. 그다음 "영상에서는 이렇게 알려주네~" 하며 짚어주면 아이가 과학을 공부가 아닌 <strong>즐거운 놀이</strong>로 받아들이게 된답니다! 🚀</p></div>`
},{id:'Td_A9H69eE8',desc:'우리의 대장님! 태양 이야기',storyHtml:`<h4>📖 거대하고 신비로운 우주 대탐험!</h4>
<p class="s-intro">이번에는 "거대하고 신비로운 우주 대탐험"을 떠나볼 거예요! 태양부터 멀리 있는 별자리까지, 우주가 얼마나 크고 재미있는 곳인지 함께 알아볼까요? 🚀✨</p>
<p class="s-intro">안녕, 꼬마 천문학자 친구! 우주는 정말 크고, 춥고, 아주아주 멋진 곳이야. 우리가 사는 지구 밖에는 어떤 비밀들이 숨어 있는지 선생님이 하나씩 들려줄게.</p>
<div class="story-block"><div class="s-label">☀️ 1. 우리와 가장 가까운 별, 태양 (Sol) [00:36]</div><p>우리를 따뜻하게 해주는 태양은 사실 아주 거대한 별이야! 옛날 사람들은 태양을 '솔(Sol)'이라고 불렀단다. [00:42]<br>얼마나 뜨거울까? 태양의 중심은 무려 1,500만 도나 된대! [01:22]<br>얼마나 클까? 태양 안에 지구를 100만 개나 집어넣을 수 있을 정도로 어마어마하게 커. [01:42]<br>빛의 여행: 태양에서 출발한 빛이 지구까지 오는 데는 딱 8분밖에 안 걸린단다. [02:34]</p></div>
<div class="story-block"><div class="s-label">🌌 2. 우주는 얼마나 클까? [03:32]</div><p>우주는 우리가 상상하는 것보다 훨씬 더 넓어.<br>빛의 속도: 빛은 1초에 지구를 7바퀴나 돌 정도로 빨라. [05:08]<br>광년(Light Year): 우주가 너무 넓어서 킬로미터(km) 대신 빛이 1년 동안 달린 거리인 '광년'이라는 단위를 써서 거리를 잰단다. [05:21]</p></div>
<div class="story-block"><div class="s-label">⭐ 3. 별들도 성격이 다 달라요! [08:42]</div><p>밤하늘의 별들은 모두 똑같아 보이지만, 사실 색깔도 크기도 다 다르단다.<br>빨간색 별: 조금 '시원한' 별이야. (그래도 2,700도나 되지만!) [10:12]<br>파란색 별: 아주아주 뜨거운 별이야. [10:27]<br>우리 태양: 딱 중간인 예쁜 노란색 별이지. [10:35]</p></div>
<div class="story-block"><div class="s-label">🏹 4. 밤하늘의 그림 공부, 별자리 [13:02]</div><p>옛날 사람들은 밤하늘의 별들을 이어보고 "어라? 이건 용 같네!", "이건 사자 같아!" 하며 이름을 붙여주었어. 이걸 별자리(Constellation)라고 해. [13:39]<br>유명한 별자리: 용자리(Draco), 헤라클레스자리, 날개 달린 말 페가수스자리 등이 있어. [15:23]<br>황도 12궁 (Zodiac): 지구가 태양 주위를 돌면서 매달 다르게 보이는 13개의 특별한 별자리들도 있단다. [18:02]</p></div>
<div class="story-block"><div class="s-label">🔄 5. 지구가 움직여요: 황도 (Ecliptic) [21:57]</div><p>지구가 태양 주위를 뱅글뱅글 돌기 때문에, 우리가 하늘을 보면 마치 태양이 별자리 사이를 지나가는 것처럼 보여. [23:29] 태양이 지나가는 이 가상의 길을 '황도'라고 부른단다. [23:57]</p></div>
<div class="story-block tip"><div class="s-label">💡 우리 아이와 함께하는 '우주 놀이':</div><p>태양과 지구 크기 비교: 커다란 비치볼(태양) 옆에 아주 작은 콩알(지구)을 놓아보며 우주가 얼마나 큰지 느껴보세요! [01:36]<br>별자리 그리기: 검은 종이에 하얀 스티커를 붙이고 선으로 연결해서 나만의 별자리를 만들어봐요. [13:44]</p></div>
<div class="story-block tip"><div class="s-label">💡 아이에게 이렇게 말해주세요:</div><p>"우리는 아주 넓은 우주 속에 살고 있는 작은 탐험가들이야! [08:12] 태양이 우리를 따뜻하게 해주고, 별들이 밤하늘에서 길을 알려주지. 나중에 우리 친구도 멋진 우주선 엘리베이터를 타고 이 넓은 우주를 여행해 보고 싶지 않니?" 🚀🌕</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=Td_A9H69eE8" target="_blank">Space Compilation: Crash Course Kids</a></p>`,
tip:''},{id:'e8YzKyot4Pc',desc:'태양계 행성 탐험',storyHtml:`<h4>📖 우리 동네 우주 한 바퀴!</h4>
<p class="s-intro">이번에는 "우리 동네 우주 한 바퀴!"라는 주제로, 태양계에 사는 여덟 명의 행성 친구들을 만나러 떠나볼 거예요. 옴섬과 함께 우주선을 타고 신나게 출발해 볼까요? 🚀✨</p>
<p class="s-intro">안녕, 꼬마 우주 비행사 친구! 우리 지구가 속해 있는 이 커다란 동네를 '태양계'라고 불러요. 여기에는 대장님인 태양과 여덟 명의 행성 친구들이 살고 있단다. [00:07]</p>
<div class="story-block"><div class="s-label">☀️ 1. 우리 동네 대장님, 태양 [00:50]</div><p>태양은 아주아주 커다란 불꽃 공 같은 별이에요. 우리에게 따뜻한 열과 밝은 빛을 보내주지. 태양 빛이 지구까지 오는 데는 딱 8분밖에 안 걸린대! [00:42]</p></div>
<div class="story-block"><div class="s-label">🪐 2. 개성 만점 행성 친구들 [01:27]</div><p>태양 주변을 뱅글뱅글 돌고 있는 여덟 친구를 순서대로 만나보자! [01:27]<br><br>수성 (Mercury) [02:52]: 태양과 가장 가까운 막내 행성이에요. 아주 작고 암석이 많아 달처럼 구멍(운석 구덩이)이 뽕뽕 나 있단다. [03:02]<br><br>금성 (Venus) [03:25]: 밤하늘에서 가장 밝게 빛나는 예쁜 친구지만, 사실은 태양계에서 가장 뜨거운 행성이에요! [03:33]<br><br>지구 (Earth) [04:12]: 우리가 사는 소중한 집! 물이 아주 많고(70%), 생물들이 숨 쉴 수 있는 공기가 있어서 특별해요. [04:20]<br><br>화성 (Mars) [04:45]: 온통 빨간색이라 '붉은 행성'이라고 불러요. 예전에는 물이 흘렀던 흔적도 있대서 과학자들이 아주 궁금해하는 친구지. [04:51]<br><br>목성 (Jupiter) [06:40]: 태양계에서 가장 덩치가 큰 거인 행성이에요! 가스로 만들어져서 땅이 없고, 아주 큰 폭풍인 '대적점'이라는 빨간 점이 있단다. [06:54]<br><br>토성 (Saturn) [07:22]: 멋진 고리를 두른 패셔니스타 행성이에요! 이 고리는 얼음과 먼지 알갱이들이 모여서 만들어졌지. [07:40]<br><br>천왕성 (Uranus) [08:12]: 옆으로 누워서 데굴데굴 굴러가듯 도는 신기한 친구예요. 메탄 가스 때문에 아주 예쁜 하늘색 빛을 띤단다. [08:40]<br><br>해왕성 (Neptune) [09:08]: 태양에서 가장 멀리 떨어져 있는 꽁꽁 얼어붙은 푸른 행성이에요. 바람이 엄청나게 세게 부는 곳이지! [09:29]</p></div>
<div class="story-block tip"><div class="s-label">💡 우리 아이와 함께하는 '행성 기차' 놀이:</div><p>행성 순서 외우기: "수-금-지-화-목-토-천-해!" 하고 리듬을 타며 행성 이름을 함께 불러봐요. [01:27]<br>뱅글뱅글 공전 놀이: 엄마나 아빠가 '태양'이 되어 가운데 서고, 아이가 '지구'가 되어 주변을 뱅글뱅글 돌아보세요. "지구는 한 바퀴 도는 데 1년(365일)이 걸린단다!"라고 설명해 주면 좋아요. [01:48]<br>고리 던지기: 토성처럼 허리에 훌라후프를 돌리며 "나는 고리가 멋진 토성이다!"라고 놀아보세요. [07:22]</p></div>
<div class="story-block tip"><div class="s-label">💡 아이에게 이렇게 말해주세요:</div><p>"우주에는 이렇게 저마다 다른 모습을 한 행성 친구들이 사이좋게 살고 있어. [10:37] 우리 친구도 나중에 커서 옴섬처럼 멋진 우주선을 타고 이 친구들을 직접 만나러 가보고 싶지 않니? 꿈을 크게 가지면 언젠가 우주로 여행을 떠날 수 있을 거야!" 🚀🌟</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=e8YzKyot4Pc" target="_blank">Planets in the Solar System for Kids - Learn Bright</a></p>`,
tip:''},{id:'ya6Ko9bF5v8',desc:'밤하늘의 별 이야기',storyHtml:`<h4>📖 우리 우주 마을, 태양계 친구들을 만나요!</h4>
<p class="s-intro">이번에는 "우리 우주 마을, 태양계 친구들을 만나요!"라는 주제로 신비한 우주 여행을 떠나볼까요? 우리가 사는 지구뿐만 아니라 개성 넘치는 행성 친구들이 모두 모여 있답니다! 🚀🌌</p>
<p class="s-intro">안녕, 꼬마 우주 탐험가 친구! 오늘 우리가 여행할 곳은 태양과 그 주변을 도는 행성 가족들이 사는 '태양계'예요. [00:01]</p>
<div class="story-block"><div class="s-label">☀️ 1. 우리 동네의 빛나는 주인공, 태양 [00:09]</div><p>태양계의 중심에는 아주 크고 뜨거운 태양이 있어요. 태양은 사실 별이에요! 우리에게 따뜻한 열과 밝은 빛을 나눠주는 아주 고마운 친구죠. [00:19] 모든 행성은 이 태양의 중력에 묶여 그 주변을 뱅글뱅글 돌고 있답니다. [00:34]</p></div>
<div class="story-block"><div class="s-label">🪐 2. 개성 만점 여덟 행성 친구들 [00:54]</div><p>수성 (Mercury) [00:54]: 태양과 가장 가까운 첫 번째 친구예요. 행성들 중에서 덩치가 가장 작고, 표면은 우리 달처럼 울퉁불퉁해요. [01:05]<br><br>금성 (Venus) [01:23]: 두 번째 친구 금성은 태양계에서 가장 뜨거운 행성이에요! 밤하늘에서 보석처럼 반짝여서 미의 여신 이름을 따왔답니다. [01:34]<br><br>지구 (Earth) [01:51]: 우리가 사는 세 번째 행성! 물이 아주 많고(70%), 공기가 있어서 생물들이 살 수 있는 유일한 곳이에요. 예쁜 달님도 친구로 데리고 있죠. [02:12]<br><br>화성 (Mars) [02:34]: 네 번째 친구는 온통 빨간색인 '붉은 행성'이에요. 땅속에 녹슨 철 성분이 많아서 빨갛게 보인대요. 아주 춥고 먼지가 많은 사막 같은 곳이지요. [02:44]<br><br>목성 (Jupiter) [03:06]: 다섯 번째 친구는 태양계에서 가장 뚱뚱한 대장 행성이에요! 다른 행성들을 다 합친 것보다 2.5배나 더 크대요. [03:15] 가스로 만들어져서 발을 디딜 단단한 땅이 없답니다. [03:32]<br><br>토성 (Saturn) [03:41]: 여섯 번째 친구는 멋진 허리띠(고리)를 두르고 있어요. 가스로 된 거대한 몸집에 아주 아름다운 고리를 가진 특별한 친구죠. [03:58]<br><br>천왕성 (Uranus) [04:11]: 일곱 번째 친구는 신기하게도 옆으로 누워서 데굴데굴 굴러가며 태양 주위를 돌아요. [04:30] 초록빛과 파란빛이 섞인 예쁜 구슬처럼 보인답니다. [04:20]<br><br>해왕성 (Neptune) [04:43]: 여덟 번째, 태양에서 가장 멀리 있는 친구예요. 너무 멀어서 아주 춥고 어두우며, 바람이 엄청나게 세게 부는 파란색 행성이에요. [05:03]</p></div>
<div class="story-block"><div class="s-label">🧊 꼬마 친구 플루토(명왕성) [05:11]</div><p>옛날에는 아홉 번째 행성이었지만, 지금은 아주 작은 '왜소행성'이 된 플루토도 있어요. 크기가 아주 작고 귀여운 친구랍니다. [05:20]</p></div>
<div class="story-block tip"><div class="s-label">💡 우리 아이와 함께하는 '우주 마을' 놀이:</div><p>행성 특징 퀴즈: "가장 뜨거운 행성은 어디일까?" (금성!), "멋진 고리가 있는 행성은?" (토성!) 하고 퀴즈를 내주세요.<br>행성 나열하기: 귤(수성), 사과(지구), 수박(목성) 등 다양한 크기의 과일을 행성이라고 생각하고 태양(전등) 주변에 순서대로 놓아보는 놀이를 해보세요. [00:44]</p></div>
<div class="story-block tip"><div class="s-label">💡 아이에게 이렇게 말해주세요:</div><p>"우주에는 이렇게 저마다 다른 매력을 가진 행성 친구들이 가득해! [05:35] 우리 친구도 지구라는 예쁜 별에서 행성 친구들처럼 반짝반짝 빛나는 사람이 될 거야. 오늘 밤엔 하늘을 보며 저 멀리 있는 행성 친구들에게 손을 흔들어줄까?" 🌍👋⭐</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=ya6Ko9bF5v8" target="_blank">SOLAR SYSTEM AND PLANETS - Kiddopedia</a></p>`,
tip:''},{id:'osSkJuohjM8',desc:'우주의 신비로운 세계',storyHtml:`<h4>📖 꼬마 친구 토푸(Tofu)와 함께 떠나는 우주 대모험!</h4>
<p class="s-intro">이번에는 "꼬마 친구 토푸(Tofu)와 함께 떠나는 우주 대모험!" 이야기를 들려줄게요. 생일을 맞은 토푸가 마법의 로켓을 타고 우주로 날아가 여덟 행성 친구들을 만나는 아주 신나는 이야기랍니다! 🚀🎂✨</p>
<p class="s-intro">안녕, 꼬마 우주 대장님! 오늘은 토푸의 생일이야. 토푸는 생일 선물로 멋진 장난감 로켓을 받았어. [00:55] 밤이 깊어 잠자리에 든 토푸에게 놀라운 일이 벌어졌단다. 장난감 로켓이 갑자기 "안녕! 나는 미스터 로키야. 나랑 같이 우주 여행 갈래?" 하고 말을 거는 게 아니겠어? [02:26] 토푸는 우주복을 챙겨 입고 슈우웅~ 우주로 날아올랐어! [02:51]</p>
<div class="story-block"><div class="s-label">🪐 우주에서 만난 신비한 풍경들</div><p>은하수와 태양계 대장님 [03:33]: 창밖을 보니 반짝이는 별들이 강물처럼 흐르는 '은하수'가 보여. 그리고 태양계의 대장, 태양님이 계셨지! 태양님은 아주 힘이 세서 모든 행성 친구들이 밖으로 튕겨 나가지 않게 꽉 잡아준단다. [04:57]<br><br>행성 친구들의 달리기 시합 [05:25]: 태양님 주변을 돌고 있는 여덟 친구를 순서대로 만나볼까?<br><br>수성: 제일 작지만 태양과 가장 가까워! [05:47]<br>금성: 지구랑 크기가 비슷하지만, 태양계에서 가장 뜨거운 행성이야. [06:04]<br>화성: 온통 빨간색이라 '붉은 행성'이라고 불러. 달을 두 개나 가지고 있단다! [06:26]<br>목성: 덩치가 제일 큰 대장 거인! 가스로 만들어졌어. [07:06]<br>토성: 아름다운 고리 허리띠를 두르고 있어. 멀리서 보면 단단해 보이지만 사실 얼음과 먼지로 되어 있대. [07:16]<br>천왕성: 옆으로 누워서 굴러가는 잠꾸러기 행성이야. [07:36]<br>해왕성: 태양에서 가장 멀리 있어서 한 바퀴 도는 데 무려 164년이나 걸려! [08:06]<br><br>토푸는 미스터 로키 덕분에 우주가 얼마나 넓고 신비로운지 알게 되었어. 우리 친구도 토푸처럼 멋진 우주 여행을 마쳤단다! [09:15]</p></div>
<div class="story-block tip"><div class="s-label">📖 아이에게 읽어줄 때의 팁</div><p>등장인물마다 목소리를 바꿔주세요!<br>장난기 많은 토푸는 귀엽고 높은 목소리로, 듬직한 로켓 미스터 로키는 낮고 씩씩한 목소리로 읽어주면 아이가 훨씬 즐거워해요. [02:26]<br><br>우주복 입기 놀이를 함께 해요!<br>토푸가 우주복을 입는 장면[02:51]에서 아이와 함께 "자, 이제 우주 장화를 신자! 쏙! 우주 헬멧도 쓰자! 찰칵!" 하며 몸짓을 섞어주세요.<br><br>손가락으로 행성을 짚어주세요!<br>영상의 [08:55] 부분에서 행성들이 순서대로 나올 때 아이의 손가락을 잡고 하나하나 짚으며 이름을 함께 불러보세요.</p></div>
<div class="story-block tip"><div class="s-label">❓ 아이와 함께 나누는 재미있는 질문</div><p>[상상력 쑥쑥] "토푸는 생일 선물로 로켓을 받았네? 우리 (아이 이름)는 우주에 갈 때 어떤 장난감을 꼭 가져가고 싶어?" [00:55]<br>[호기심 팡팡] "태양계 대장 태양님은 모든 행성을 꽉 잡아준대. 우리 친구는 태양님이 얼마나 힘이 셀 것 같니?" [04:57]<br>[최애 행성 고르기] "빨간색 화성, 고리가 예쁜 토성, 누워서 자는 천왕성 중에서 어떤 친구가 제일 마음에 들어?" [07:36]<br>[우주 음식] "우주선 안에서 배가 고프면 어떤 간식을 먹고 싶어? 둥둥 떠다니는 초코볼을 잡아먹어 볼까?"</p></div>
<div class="story-block tip"><div class="s-label">💡 마무리 멘트:</div><p>"토푸가 용감하게 우주 여행을 다녀온 것처럼, 우리 친구도 오늘 밤 꿈속에서 미스터 로키를 타고 반짝이는 별나라 여행을 떠나볼까? 잘 자, 꼬마 우주 비행사!" 😴⭐🚀</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=osSkJuohjM8" target="_blank">A SPACE ADVENTURE - Kids Hut</a></p>`,
tip:''},{id:'whSAgISrGME',desc:'블랙홀의 비밀',storyHtml:`<h4>📖 🕳️ 블랙홀의 비밀 — 빛도 삼켜버리는 우주의 괴물!</h4>
<p class="s-intro">우주에는 아주 신기하고 무서운 곳이 있어. 빛조차도 한번 들어가면 절대 나오지 못하는 곳! 그게 바로 블랙홀이야. 같이 탐험해볼까? (단, 너무 가까이 가면 안 돼! 🚀)</p>
<div class="story-block"><div class="s-label">🕳️ 블랙홀이 뭐야?</div><p>블랙홀은 엄청나게 무거운 물질이 아주 작은 공간에 꾹꾹 눌려 있는 곳이야. 중력이 너무너무 강해서 빛까지 빨아들인단다! 그래서 우리 눈에는 그냥 새까만 구멍처럼 보여.</p></div>
<div class="story-block"><div class="s-label">⭐ 어떻게 만들어질까?</div><p>태양보다 훨씬 큰 별이 마지막에 펑! 하고 큰 폭발(초신성)을 해. 그러면 남은 핵이 엄청나게 무거워지면서 꾹 눌려서 블랙홀이 되는 거야. 마치 엄청 큰 스펀지를 손으로 꽉꽉 쥐어짜는 것처럼!</p></div>
<div class="story-block"><div class="s-label">🚧 사건의 지평선이란?</div><p>블랙홀에는 '사건의 지평선(Event Horizon)'이라는 보이지 않는 선이 있어. 이 선을 넘으면 빛도, 로켓도, 아무것도 돌아올 수 없단다. 마치 놀이터 미끄럼틀에서 한번 내려가면 다시 올라올 수 없는 것처럼!</p></div>
<div class="story-block"><div class="s-label">🍝 스파게티화!</div><p>블랙홀 가까이 가면 발쪽이 머리쪽보다 훨씬 더 강하게 당겨져서 몸이 기다란 스파게티처럼 쭉쭉 늘어나! 과학자들이 이걸 진짜로 '스파게티화(Spaghettification)'라고 불러. 재미있는 이름이지?</p></div>
<div class="story-block"><div class="s-label">🌌 우리 은하에도 블랙홀이 있어!</div><p>우리가 사는 은하수 은하 한복판에도 태양보다 400만 배나 무거운 초대질량 블랙홀이 있대! 이름은 '궁수자리 A*'야. 걱정 마, 우리 지구와는 엄청 멀리 떨어져 있어!</p></div>
<div class="story-block tip"><div class="s-label">💡 아이에게 이렇게 말해주세요:</div><p>"블랙홀은 무섭게 들리지만, 사실 우주가 얼마나 신기하고 다양한지 알려주는 증거야! 빛도 빨아들이는 블랙홀처럼, 우리 친구도 책과 지식을 쭉쭉 빨아들이는 지식 블랙홀이 되어볼까? 😄"</p></div>
<div class="story-block tip"><div class="s-label">❓ 재미있는 질문들</div><p>"만약 블랙홀이 냉장고만큼 작다면, 그 안에 뭘 넣고 싶어?"<br>"블랙홀이 스파게티처럼 늘어나게 한대! 만약 내 장난감이 스파게티처럼 길어진다면 어떻게 될까?"<br>"우리 은하 한복판에 블랙홀이 있대. 만약 은하 탐험가가 된다면 블랙홀에 가까이 가볼 용기가 있어?"</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=whSAgISrGME" target="_blank">블랙홀의 비밀</a></p>`,
tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"블랙홀은 무섭게 들리지만, 우주가 얼마나 신기하고 다양한지 알려주는 증거야! 빛도 빨아들이는 블랙홀처럼, 우리 친구도 책과 지식을 쭉쭉 빨아들이는 지식 블랙홀이 되어볼까?" 😄'},{id:'sePqPIXMsAc',desc:'우주 탐험 이야기',storyHtml:`<h4>📖 우리의 슈퍼히어로, 태양님!</h4>
<p class="s-intro">이번에는 우리에게 매일 따뜻한 인사를 건네는 "우리의 슈퍼히어로, 태양님!" 이야기를 들려줄게요. 태양이 얼마나 대단한 친구인지, 왜 우리에게 꼭 필요한지 함께 알아봐요! ☀️✨</p>
<p class="s-intro">안녕, 꼬마 햇살 친구! 아침이 되면 세상이 환해지고 따뜻해지지? 그건 바로 하늘 높이 떠 있는 태양님 덕분이야. [00:17]</p>
<div class="story-block"><div class="s-label">태양은 거대한 불꽃 공 별! [00:35]</div><p>태양은 사실 밤하늘에 반짝이는 별들과 똑같은 별이야. 하지만 우리 지구와 가장 가까이 있어서 아주 크고 밝게 보이는 거란다. [00:42]</p></div>
<div class="story-block"><div class="s-label">얼마나 크고 뜨거울까? [00:51]</div><p>태양은 지구가 32만 개나 들어갈 정도로 정말 어마어마하게 커! [00:51] 그리고 표면 온도가 무려 5,000도가 넘을 정도로 아주아주 뜨겁지. [01:02] 그래서 아주 멀리 떨어져 있는 우리에게까지 따뜻한 열기를 전해줄 수 있는 거야.</p></div>
<div class="story-block"><div class="s-label">번개보다 빠른 태양 빛! [01:19]</div><p>태양과 지구는 아주 멀리 떨어져 있지만, 태양 빛은 엄청나게 빨라서 딱 8분 만에 우리 얼굴에 도착해! [01:19] 우리가 지금 느끼는 햇살은 8분 전에 태양에서 출발한 거란다.</p></div>

<div class="story-block tip"><div class="s-label">📖 아이에게 읽어줄 때의 팁</div><p>온몸으로 따뜻함을 표현해요!<br>"태양은 따뜻한 온기를 줘~"라고 말할 때 아이를 포근하게 꽉 안아주세요. "태양님이 (아이 이름)를 안아주는 것처럼 따뜻하지?"라고 하면 아이가 태양의 고마움을 몸으로 느껴요. [00:28]<br><br>'8분'을 손가락으로 세어봐요!<br>"태양 빛이 지구까지 오는 데 8분!"이라고 말하며 아이와 함께 손가락 8개를 하나씩 꼽아보세요. 숫자를 익히는 재미도 있고, 빛의 여행이 얼마나 짧고 빠른지 상상하게 해줍니다. [01:19]<br><br>크기 비교를 과일로 해보세요!<br>태양은 커다란 수박, 지구는 아주 작은 깨알이라고 비유하며 설명해 주면 아이가 태양이 얼마나 거대한지 쉽게 이해할 수 있어요. [00:51]</p></div>

<div class="story-block tip"><div class="s-label">💡 마무리 멘트:</div><p>"태양님은 우리가 잠든 밤에도 반대편 나라 친구들을 비춰주느라 아주 바쁘대. 내일 아침에 다시 밝은 모습으로 만나기로 약속하고, 오늘은 예쁜 꿈 꾸자!" ☀️🌙💤</p></div>

tip:''},{id:'NIn9IQwnuvA',desc:'목성에 빠지면 어떻게 될까요?',storyHtml:`<h4>📖 🪐 만약 우리가 거대한 목성으로 슝~ 떨어진다면?</h4>

<div class="story-block"><div class="s-label">🌍 지구가 비틀비틀</div><p>달은 지구가 너무 기울거나 흔들리지 않도록 균형을 잡아주는 역할도 해. 달이 없어지면 지구가 조금씩 비틀거려서 계절이 엄청나게 변할 수도 있대!</p></div>

<div class="story-block"><div class="s-label">🌕 4. 드디어 달에 도착! [01:03]</div><p>드디어 엘리베이터 문이 열리고, 옴섬은 먼지가 폴폴 날리는 달 표면에 발을 내디뎠어. [01:03] 저 멀리서 파랗게 빛나는 지구를 바라보며 옴섬은 정말 뿌듯했단다. [01:03]</p></div>
<div class="story-block tip"><div class="s-label">💡 우리 아이와 함께하는 '우주 엘리베이터' 놀이:</div><p>엘리베이터 놀이: 아이와 함께 상자나 이불 속에 들어가서 "자, 이제 우주 엘리베이터 출발합니다! 5, 4, 3, 2, 1, 발사!"라고 외치며 위로 점프해 보세요.<br>방어막 놀이: 풍선이나 공을 던지며 "운석이 날아온다! 빨리 방어막을 켜자!"라고 말하며 아이가 베개나 방패 모양 장난감으로 막아내게 해주세요. [00:47]</p></div>

<p class="s-intro">안녕, 꼬마 우주 탐험가! 밤하늘을 보면 어떤 날은 달님이 동그랗고, 어떤 날은 손톱처럼 뾰족하지? 달님이 정말 마법을 부리는 걸까? [00:55]</p>
<div class="story-block"><div class="s-label">달님은 스스로 빛나지 않아요! [01:24]</div><p>사실 달님은 스스로 빛을 내는 전등이 아니에요. 태양님이 비춰주는 빛을 거울처럼 반사해서 반짝이는 거란다. [01:35] 그래서 태양 빛을 받는 부분만 우리 눈에 보이는 거야.</p></div>
<div class="story-block"><div class="s-label">달님의 숨바꼭질, '삭(New Moon)' [02:06]</div><p>달님이 지구와 태양 사이에 딱 들어가면, 지구에서는 달님의 어두운 뒷모습만 보여서 달님이 사라진 것처럼 보여. 이걸 '삭' 혹은 '신월'이라고 불러. [02:32]</p></div>
<div class="story-block"><div class="s-label">점점 커지는 달님 (Waxing) [02:42]</div><p>달님이 지구 주변을 돌면서 태양 빛을 조금씩 더 받기 시작해. 처음엔 눈썹 같은 초승달이 되었다가, 일주일쯤 지나면 반쪽만 보이는 상현달이 되지. [03:09]</p></div>
<div class="story-block"><div class="s-label">우와! 동그란 '보름달(Full Moon)' [03:40]</div><p>약 2주가 지나면 태양 빛을 정면으로 듬뿍 받아서 아주 크고 동그란 보름달이 돼! 밤하늘을 환하게 비춰주는 가장 아름다운 때야. [03:59]</p></div>
<div class="story-block"><div class="s-label">다시 작아지는 달님 (Waning) [04:09]</div><p>보름달이 된 후에는 다시 조금씩 작아져. 반달인 하현달을 지나서, 아주 얇은 그믐달이 되었다가 다시 처음처럼 숨어버린단다. [04:47] 이 모든 과정이 한 바퀴 도는 데 약 29.5일이 걸려! [04:58]</p></div>
<div class="story-block tip"><div class="s-label">📖 아이에게 읽어줄 때의 팁</div><p>손 모양으로 달을 만들어봐요!<br>초승달을 설명할 때는 손가락을 갈고리처럼 구부려 보여주고, 보름달을 말할 때는 양손으로 큰 원을 그려보세요. 아이가 달의 모양 변화를 훨씬 직관적으로 이해해요. [03:48]<br><br>'거울 놀이'로 빛의 반사를 알려주세요!<br>전등(태양)을 켜고 거울(달)로 빛을 반사해 벽에 비춰보며 설명해 주세요. "달님은 이렇게 태양 빛을 빌려와서 우리에게 보내주는 거란다"라고 하면 쏙쏙 이해가 돼요! [01:35]<br><br>달력을 함께 보며 체크해요!<br>오늘 밤 창밖의 달 모양을 보고, 달력에 그 모양을 그려보게 하세요. "내일은 달님이 더 뚱뚱해질까, 날씬해질까?" 하며 매일의 변화를 기대하게 해주세요.</p></div>
<div class="story-block tip"><div class="s-label">❓ 아이와 함께 나누는 재미있는 질문</div><p>[마법의 이름] "달님이 점점 커질 때는 '왁싱(Waxing)', 작아질 때는 '웨이닝(Waning)'이라고 한대. 우리 (아이 이름)는 달님이 커지는 게 좋아, 작아지는 게 좋아?" [05:08]<br>[달나라 간식] "보름달은 아주 크고 노란색이라 맛있어 보여! 만약 보름달이 커다란 빵이라면, 어떤 맛이 날 것 같니? 치즈 맛? 아니면 달콤한 꿀맛?" [03:59]<br>[숨바꼭질] "달님이 완전히 숨어버리는 '삭'일 때는 달님이 어디서 무얼 하고 있을까? 지구 뒤에서 몰래 낮잠을 자고 있을까?" [02:32]<br>[달토끼 이야기] "보름달 속에 토끼가 살고 있다는 이야기를 들어봤니? 만약 달에 토끼가 산다면, 토끼는 달의 모양이 바뀔 때마다 집을 어떻게 옮길까?"</p></div>
<div class="story-block tip"><div class="s-label">💡 마무리 멘트:</div><p>"달님은 매일 밤 모양을 바꾸며 우리에게 인사를 건네고 있어. 오늘 밤엔 달님이 어떤 모양으로 우리를 지켜주고 있는지 확인해 볼까? 달님처럼 예쁜 꿈 꾸렴!" 🌙💤</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=BQvo7vyCmuE" target="_blank">Phases Of The Moon - Peekaboo Kidz</a></p>`,
tip:''},{id:'4srrN7uUAsU',desc:'🎵 Moon Song',storyHtml:`<h4>📖 🌙 지구의 단짝 친구, 달님의 노래! (The Moon Song)</h4>
<p class="s-intro">이번에는 "지구의 단짝 친구, 달님의 노래" 이야기를 들려줄게요! 이 영상은 노래로 되어 있어서 리듬을 타며 읽어주면 아이가 훨씬 즐거워한답니다. 달님이 직접 자기소개를 하는 것처럼 재미있게 들려주세요. 🌕🎶</p>
<p class="s-intro">"안녕! 나는 지구 곁을 지키는 너의 소중한 친구 달님이야. [00:11] 내가 어떤 비밀을 가지고 있는지 노래하듯 들려줄게!"</p>
<div class="story-block"><div class="s-label">🌍 [00:15] 우리는 단짝 친구!</div><p>지구가 나를 꽉 잡아주는 힘(중력) 덕분에 나는 언제나 지구 곁에 있을 수 있어. 나는 지구보다 작지만, 바닷물을 밀었다 당겼다 하는 아주 힘센 능력도 가지고 있단다! [00:23]</p></div>
<div class="story-block"><div class="s-label">🪨 [00:30] 내 몸은 무엇으로 되어 있을까?</div><p>내 몸속에는 단단한 철이 들어있고, 겉은 딱딱한 바위와 '레골리스'라고 부르는 보들보들한 먼지로 덮여 있어. [00:35] 내 얼굴에 있는 올록볼록한 구멍들은 '크레이터'라고 하는데, 티코나 케플러 같은 멋진 이름도 있단다. [00:46]</p></div>
<div class="story-block"><div class="s-label">🔆 [01:08] 나는 반사쟁이 거울!</div><p>나는 스스로 빛을 내지 못해. 대신 태양님이 비춰주는 빛을 너희에게 반사해서 보여주는 거야. [01:15] 그래서 태양이 어디를 비추느냐에 따라 내 모양이 매일매일 달라 보이지!</p></div>
<div class="story-block"><div class="s-label">🌑 [01:30] 달님의 신기한 마법, 일식과 월식</div><p>가끔 내가 태양과 지구 사이에 쏙 들어가서 해를 가리기도 하고(일식), 지구가 나를 가려서 내가 어둡게 변하기도 해(월식). [01:36] 정말 신기한 마법 같지?</p></div>
<div class="story-block"><div class="s-label">🤫 [01:52] 언제나 같은 얼굴만 보여줄게!</div><p>신기하게도 나는 지구를 돌면서 스스로 도는 속도가 똑같아서, 너희는 언제나 나의 앞모습만 볼 수 있어. 나의 뒷모습은 비밀이야! [01:56]</p></div>
<div class="story-block"><div class="s-label">🌕 [01:59] 여덟 가지 변신 모습</div><p>깜깜한 신월부터 눈썹 같은 초승달, 반쪽짜리 상현달, 그리고 아주 커다란 보름달까지! [02:17] 나는 30일이 안 되는 시간 동안 여덟 번이나 멋지게 변신하며 너희를 찾아가. [02:47]</p></div>
<div class="story-block tip"><div class="s-label">📖 읽어줄 때의 팁</div><p><strong>노래의 리듬을 살려주세요!</strong><br>이 영상은 경쾌한 노래예요. "나는~ 너의~ 달님~" 하고 노래하듯 리드미컬하게 읽어주면 아이가 엉덩이를 들썩이며 집중한답니다. [03:20]<br><br><strong>'먼지 만지기' 흉내를 내보세요!</strong><br>달의 먼지 '레골리스'를 설명할 때[00:35] 아이의 손바닥을 간지럽히며 "달나라 먼지는 이렇게 부드럽대~"라고 속삭여주세요.<br><br><strong>'항상 같은 면' 보여주기 놀이</strong><br>아이(지구) 주위를 엄마나 아빠(달)가 돌면서, 얼굴은 계속 아이만 바라보며 돌아보세요. "달님은 이렇게 (아이 이름)만 바라보며 걷는단다!"라고 설명해 주세요. [01:52]</p></div>
<div class="story-block tip"><div class="s-label">❓ 아이와 함께 나누는 재미있는 질문</div><p><strong>[달나라 여행]</strong> "달나라 먼지 '레골리스'는 아주 부드럽대. 만약 우리가 달에 가면 그 먼지로 어떤 모양의 모래성을 쌓고 싶어?" [00:35]<br><br><strong>[바닷물 놀이]</strong> "달님이 바닷물을 당기는 힘이 있대! 달님이 '영차!' 하고 당기면 바닷물은 어떤 기분이 들까?" [00:23]<br><br><strong>[달님의 이름]</strong> "달의 구멍(크레이터)들에 이름이 있대. 우리 (아이 이름)라면 저기 보이는 커다란 구멍에 어떤 이름을 붙여주고 싶니?" [00:46]<br><br><strong>[달나라 산소]</strong> "달에는 숨 쉴 공기가 거의 없대. 우주복을 입지 않고 달에 가면 우리는 어떻게 숨을 쉬어야 할까? 코끼리 코처럼 긴 빨대가 필요할까?" [01:45]</p></div>
<p class="s-intro" style="margin-top:.8rem">"달님은 30일 동안 매일매일 다른 모습으로 우리를 찾아와 노래를 불러준대. [02:54] 오늘 밤엔 달님이 어떤 가사를 부르고 있을지 귀를 기울이며 잠들어볼까? 달님 노래 들으며 잘 자요!" 🌙🎶😴</p>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=4srrN7uUAsU" target="_blank">The Moon Song - Hopscotch Songs</a></p>`,

    storyHtml:`<h4>📖 ☀️ 우리의 대장님! 태양 이야기 (Our Sun)</h4>
<p class="s-intro">하늘 높이 떠 있는 저 뜨거운 태양은 사실 거대한 '가스 공'이라는 거, 믿겨지니?</p>
<div class="story-block"><div class="s-label">☀️ 우주에서 가장 큰 불공</div><p>태양은 우리 지구보다 훨씬, 훨씬 더 커. 지구가 100만 개나 들어갈 수 있을 정도지!</p></div>
<div class="story-block"><div class="s-label">🌟 빛과 열의 선물</div><p>태양이 없다면 지구는 꽁꽁 얼어붙은 얼음 나라가 될 거야. 태양 덕분에 식물들이 쑥쑥 자라고 우리도 따뜻하게 지낼 수 있는 거란다.</p></div>
<div class="story-block"><div class="s-label">⭐ 우리의 대장 별</div><p>태양은 사실 우주에 있는 수많은 '별' 중 하나야. 하지만 우리 지구와 가장 가깝기 때문에 우리에게 가장 소중한 대장 별이 되었지!</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🌙 달에는 공기가 있을까요? (The Moon)</h4>
<p class="s-intro">밤하늘에 예쁘게 뜬 달! 만약 우리가 우주선을 타고 달에 가면 어떤 일이 벌어질까요?</p>
<div class="story-block"><div class="s-label">🤫 조용한 세상</div><p>달에는 공기가 없어요. 그래서 아무리 크게 소리를 질러도 소리가 들리지 않는 아주 조용한 곳이랍니다.</p></div>
<div class="story-block"><div class="s-label">🦘 깡충깡충 점프</div><p>달은 지구보다 당기는 힘(중력)이 약해요. 그래서 한 번만 살짝 뛰어도 건물 2층 높이까지 붕~ 날아오를 수 있어요!</p></div>
<div class="story-block"><div class="s-label">👨‍🚀 우주복은 필수</div><p>공기도 없고 햇빛이 너무 뜨겁거나 차갑기 때문에, 달에 갈 때는 꼭 튼튼한 우주복을 입어야 한답니다.</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🪐 목성에 빠지면 어떻게 될까요? (What if you fell into Jupiter?)</h4>
<p class="s-intro">태양계에서 가장 덩치가 큰 대장 행성, 목성! 만약 목성 속으로 쏙 들어간다면 어떤 일이 벌어질까?</p>
<div class="story-block"><div class="s-label">🕳️ 바닥이 없는 행성</div><p>지구는 땅이 있어서 발을 딛고 설 수 있지? 하지만 목성은 거대한 가스 덩어리야. 발을 내딛는 순간 끝도 없이 아래로 계속 떨어지게 된단다. 끝이 없는 미끄럼틀을 타는 것 같을 거야!</p></div>
<div class="story-block"><div class="s-label">🌀 무시무시한 폭풍, 대적점</div><p>목성에는 지구보다 더 큰 빨간 눈 모양의 폭풍이 있어. 여기선 바람이 너무 세게 불어서 우리를 휘리릭 날려버릴지도 몰라. 이것을 '대적점'이라고 부르는데, 수백 년 동안 계속 불고 있대!</p></div>
<div class="story-block"><div class="s-label">🔥 점점 뜨거워지고 무거워져</div><p>깊이 들어갈수록 공기가 우리를 꾹꾹 누르는 힘(압력)이 엄청나게 세지고, 온도는 점점 뜨거워져. 결국 목성의 중심에는 아주 단단하고 뜨거운 핵이 숨어 있단다.</p></div>

    vids:[{id:'mc979OhitAg',desc:'전기가 만들어지는 과정',
      storyHtml:`<h4>📖 ⚡🕵️ 전기는 어떻게 흐를까? 보물찾기 탐험!</h4>

      storyHtml:`<h4>📖 ⚡ 찌릿찌릿! 전기는 어디서 올까요?</h4>

    {id:'-aNpmCSZHbk',desc:'자석과 자기장의 비밀!',

<div class="story-block"><div class="s-label">🌿 6. 짜잔! 아기 식물이 되었어요 [04:16]</div><p>줄기가 위로 쑥쑥 자라고 초록색 작은 잎들이 나오면, 이제 어엿한 아기 식물이 된 거야! [04:26] 이렇게 씨앗이 식물로 자라나는 과정을 <strong>'발아'</strong>라고 부른단다. [04:40]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=TE6xptjgNR0" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: Seed Germination - It's AumSum Time</a></p>`,

    {id:'3CCOWHa-qfc',desc:'씨앗들의 신나는 여행!',
      storyHtml:`<h4>📖 🌱 씨앗들의 신나는 여행! — 씨앗은 어떻게 새 집을 찾을까?</h4>
<p class="s-intro">나무와 꽃들은 발이 없어서 걸어다닐 수가 없어. 그럼 씨앗들은 어떻게 멀리멀리 퍼져나갈까? 씨앗들의 놀라운 여행 방법을 함께 알아보자!</p>
<div class="story-block"><div class="s-label">💨 바람을 타고 훨훨!</div><p>민들레 씨앗을 본 적 있어? 하얀 솜털이 달린 씨앗이 바람에 훨훨 날아가지! 단풍나무 씨앗은 프로펠러 모양이라 빙글빙글 돌면서 날아간단다. 바람이 세게 불수록 더 멀리 여행할 수 있어!</p></div>
<div class="story-block"><div class="s-label">🐿️ 동물 친구들의 도움!</div><p>맛있는 열매(체리, 딸기)를 새나 동물이 먹으면, 씨앗은 소화되지 않고 똥과 함께 다른 곳에 떨어져! 찔레나 도꼬마리 씨앗은 갈고리처럼 생겨서 동물 털이나 사람 옷에 쫙 달라붙어서 여행을 해. 재미있지?</p></div>
<div class="story-block"><div class="s-label">💧 물을 타고 둥둥!</div><p>코코넛 열매는 바닷물에 둥둥 떠서 멀리멀리 여행을 해! 두꺼운 껍질 덕분에 물속에서도 안 죽고 수천 킬로미터를 떠내려갈 수 있단다. 그래서 열대 섬들에 야자나무가 많은 거야.</p></div>
<div class="story-block"><div class="s-label">💥 혼자서 펑!</div><p>어떤 씨앗은 스스로 폭발해서 날아가! 봉숭아나 콩 꼬투리가 익으면 비틀리면서 씨앗을 멀리 쏘아 보낸단다. 여름에 봉숭아 꼬투리를 건드려보면 깜짝 놀랄 거야!</p></div>
<div class="story-block tip"><div class="s-label">💡 놀이 팁</div><p>"씨앗 탐험대 놀이: 공원에서 민들레를 찾아 후~ 불어보세요. '씨앗아, 좋은 집 찾아가렴!'이라고 말해주면 아이가 씨앗의 여행을 더 특별하게 느껴요. 가을엔 옷에 달라붙는 도꼬마리 씨앗을 찾아보는 것도 재미있어요!"</p></div>
<div class="story-block tip"><div class="s-label">❓ 재미있는 질문들</div><p>"만약 씨앗이 말할 수 있다면, 여행 중에 어떤 이야기를 할까? '오늘 바람이 너무 세서 너무 멀리 왔어!'라고 할까?"<br>"민들레 씨앗처럼 내 몸에 솜털이 달려서 바람을 타고 날 수 있다면 어디로 날아가고 싶어?"<br>"코코넛은 바다를 건너 여행한대! 우리 친구도 바다를 건너간다면 어느 나라에 가고 싶어?"</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=3CCOWHa-qfc" target="_blank">씨앗들의 신나는 여행!</a></p>`,

      storyHtml:`<h4>📖 🦋 애벌레에서 나비로! — 나비의 놀라운 변신 이야기</h4>
<p class="s-intro">꽃밭에서 팔랑팔랑 나는 예쁜 나비가 처음엔 꿈틀꿈틀 기어다니는 애벌레였다는 거 알고 있어? 나비의 놀라운 변신 이야기를 함께 들어보자!</p>
<div class="story-block"><div class="s-label">🥚 1단계: 아주 작은 알</div><p>나비 엄마는 애벌레가 태어났을 때 바로 먹을 수 있도록, 맛있는 나뭇잎 위에 알을 낳아. 알은 아주 작아서 잘 보이지 않을 정도야. 그 안에서 아기 애벌레가 조금씩 자라고 있단다!</p></div>
<div class="story-block"><div class="s-label">🐛 2단계: 먹보 애벌레</div><p>알에서 깨어난 애벌레는 하루 종일 나뭇잎을 우적우적 먹어! 먹고 또 먹고, 먹고 또 먹어서 몸이 엄청 커진단다. 너무 커지면 낡은 옷처럼 껍질을 벗고 새 껍질로 갈아입어. 이걸 '탈피'라고 해.</p></div>
<div class="story-block"><div class="s-label">🫘 3단계: 번데기 — 마법의 캡슐!</div><p>애벌레는 어느 날 나뭇가지에 달라붙어서 스스로를 실로 꽁꽁 감싸. 그게 바로 '번데기'야! 겉으로 보면 조용히 자는 것 같지만, 안에서는 엄청난 변화가 일어나고 있어. 마치 몸 전체가 녹아서 완전히 새로운 모습으로 만들어지는 것처럼!</p></div>
<div class="story-block"><div class="s-label">🦋 4단계: 드디어 나비 탄생!</div><p>번데기 껍질이 벌어지면서 예쁜 나비가 나와! 처음엔 날개가 쭈글쭈글하지만 조금씩 펴면서 아름다운 무늬가 나타나. 이렇게 완전히 다른 모습으로 변하는 걸 '완전변태'라고 해.</p></div>
<div class="story-block tip"><div class="s-label">💡 놀이 팁</div><p>"나비 변신 놀이: 아이가 애벌레처럼 바닥을 기어다니다가, 이불 속에 쏙 들어가 번데기가 되고, '짠!'하고 나오면서 날개를 펼치는 나비 변신 놀이를 해보세요! 변신할 때 '나비 마법!'이라고 외치면 더 신나요."</p></div>
<div class="story-block tip"><div class="s-label">❓ 재미있는 질문들</div><p>"애벌레가 번데기 안에서 변신할 때 어떤 기분일까? '아, 새 날개가 생기고 있어! 얼른 나가고 싶다!'라고 할까?"<br>"만약 우리도 나비처럼 완전히 다른 모습으로 변할 수 있다면 어떤 모습이 되고 싶어?"<br>"나비는 꽃의 꿀을 먹어. 만약 내가 나비라면 가장 먼저 어떤 꽃으로 날아갈 것 같아?"</p></div>

    tip:'<strong>질문 던지기:</strong> "냉장고에서 꺼낸 얼음이 녹으면 뭐가 될까?", "수증기를 우리 주변에서 어디서 볼 수 있을까?" 일상 속 변신을 찾아봐요.<br><br><strong>연결하기:</strong> "물처럼 같은 수가 분수, 소수, 퍼센트로 변신하는 것처럼 과학도 모습이 바뀌어도 본질은 같아!"',
    vids:[{id:'O-48znAg7VE',desc:'원자와 주기율표 이야기',
      storyHtml:`<h4>📖 🧩 세상을 만드는 마법의 퍼즐 조각, 원소 이야기!</h4>
<p class="s-intro">안녕! 오늘은 우리가 사는 세상을 만드는 <strong>'마법의 퍼즐 조각'</strong>에 대한 아주 재미있는 이야기를 해줄게! 🌟<br>우리가 발을 딛고 있는 땅, 마시는 물, 그리고 반짝이는 별들까지! 세상의 모든 것들은 아주 작은 <strong>'원소'</strong>라는 퍼즐 조각들로 만들어져 있어. 이 조각들이 어떻게 모여서 지금의 멋진 세상을 만들었는지 함께 알아볼까?</p>
<div class="story-block"><div class="s-label">✨ 1. 별이 보내준 선물 [00:25]</div><p>아주 아주 먼 옛날, 우주에 있는 별들이 '펑!' 하고 터지면서 수많은 퍼즐 조각들을 우주로 보내주었어. 이 조각들이 바로 '원소'야. 옛날 사람들은 금이나 은처럼 반짝이는 조각들을 먼저 발견해서 장난감이나 보석을 만들기도 했단다.</p></div>
<div class="story-block"><div class="s-label">🧪 2. 엉뚱한 과학자의 '오줌' 실험! [01:55]</div><p>옛날에 헤닝 브란트라는 아주 엉뚱한 아저씨가 있었어. 이 아저씨는 "우리 몸 안에도 금이 있지 않을까?"라고 생각했대. 그래서 노란색인 '오줌'을 잔뜩 모아서 보글보글 끓여봤어! [02:02]<br>금은 나오지 않았지만, 대신 어둠 속에서 하얗게 빛나는 <strong>'인'</strong>이라는 새로운 조각을 찾아냈단다. 정말 대단하지?</p></div>
<div class="story-block"><div class="s-label">🧩 3. 퍼즐 조각의 규칙을 찾아라! [03:03]</div><p>세상에는 너무 많은 퍼즐 조각들이 있어서 과학자들은 이걸 예쁘게 정리하고 싶어 했어.<br><br>라부아지에 아저씨: "이건 기체야, 이건 금속이야!"라고 처음으로 이름을 붙여주었어. [02:48]<br><br>도베라이너 아저씨: 비슷한 성격의 조각들을 모아봤어. 어떤 조각들은 물에 넣으면 '치익~' 소리를 내며 춤을 추기도 한대! [03:21]</p></div>
<div class="story-block"><div class="s-label">😴 4. 꿈속에서 완성된 마법의 표 [03:42]</div><p>마지막으로 멘델레예프라는 아저씨가 나타났어. 이 아저씨는 퍼즐 조각들을 어떻게 정리할지 3일 밤낮을 고민하다가 깜빡 잠이 들었어. 그런데 꿈속에서 조각들이 스스로 자리를 찾아가는 마법 같은 표를 보게 된 거야! [03:54]<br>아저씨는 잠에서 깨어나 그 표를 그렸고, 아직 찾지 못한 미래의 퍼즐 조각들이 어디에 들어갈지도 미리 맞춰놓았단다. 이게 바로 우리가 과학 시간에 배우는 <strong>'주기율표'</strong>야!</p></div>
<p style="margin-top:1rem;text-align:center">더 자세한 이야기가 궁금하면 아래 영상을 함께 봐보자!<br>📺 <a href="https://www.youtube.com/watch?v=O-48znAg7VE" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: Solving the puzzle of the periodic table</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 몸도, 네가 좋아하는 장난감도 사실은 이 작은 퍼즐 조각들이 모여서 만들어진 거란다. 너도 나중에 이 세상의 숨겨진 새로운 퍼즐 조각을 찾는 멋진 탐험가가 될 수 있어!" 🚀'},
    {id:'jMW_0Ro6b5c',desc:'세상을 만드는 가장 작은 알갱이, 원자!',
      storyHtml:`<h4>📖 ⚛️ 세상을 만드는 가장 작은 알갱이, 원자!</h4>
<p class="s-intro">지금 이 순간, 네 손, 의자, 공기, 물, 모든 것이 아주 작은 알갱이들로 만들어져 있어. 그 알갱이의 이름은 바로 '원자(Atom)'야! 눈에는 보이지 않지만 세상 모든 것을 만드는 마법 같은 알갱이, 같이 만나볼까?</p>
<div class="story-block"><div class="s-label">🔬 얼마나 작을까?</div><p>원자는 너무너무 작아서 맨눈으로는 절대 볼 수 없어. 머리카락 하나의 너비에 원자가 무려 100만 개나 늘어설 수 있을 정도야! 우리 몸 안에도 수조 개의 원자가 있단다.</p></div>
<div class="story-block"><div class="s-label">🌟 원자 속 세계</div><p>원자 한가운데에는 '핵(Nucleus)'이 있어. 그 주변을 아주 빠르게 뱅글뱅글 도는 것이 '전자(Electron)'야. 마치 태양(핵) 주변을 지구(전자)가 도는 것처럼!</p></div>
<div class="story-block"><div class="s-label">🧩 원소마다 다른 원자</div><p>수소, 산소, 철, 금 같은 원소들은 각각 다른 종류의 원자로 만들어져 있어. 원자의 종류가 달라지면 완전히 다른 물질이 된단다! 수소 원자 2개 + 산소 원자 1개 = 물이 돼. 신기하지?</p></div>
<div class="story-block"><div class="s-label">💡 원자가 합쳐지면 분자!</div><p>원자들이 모여서 '분자(Molecule)'를 만들어. 물(H₂O), 이산화탄소(CO₂) 모두 원자들이 손잡고 만든 분자야. 레고 블록처럼 원자들이 합쳐져서 세상 모든 것을 만드는 거야!</p></div>
<div class="story-block tip"><div class="s-label">💡 놀이 팁</div><p>"레고 원자 놀이: 레고나 클레이를 꺼내서 '이건 수소 원자, 이건 산소 원자!'라고 이름 붙이고 합쳐서 물 분자를 만들어보세요. 눈에 보이지 않는 원자를 손으로 느낄 수 있어요!"</p></div>
<div class="story-block tip"><div class="s-label">❓ 재미있는 질문들</div><p>"지금 앉아 있는 의자도 원자로 만들어졌대! 의자 속 원자들이 서로 이야기를 한다면 어떤 말을 할까?"<br>"원자가 레고 블록 같다면, 세상에서 어떤 걸 만들어보고 싶어?"<br>"수소랑 산소가 합쳐지면 물이 된대. 만약 네가 원자라면 어떤 원자랑 손잡고 싶어?"</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=jMW_0Ro6b5c" target="_blank">세상을 만드는 가장 작은 알갱이, 원자!</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 몸도, 공기도, 물도 모두 같은 원자로 만들어져 있어. 우리는 모두 우주의 재료로 만들어진 거야!"'},
    {id:'e9GuJUaX0UM',desc:'원자 속 세 친구: 양성자, 전자, 중성자!',
      storyHtml:`<h4>📖 ⚛️ 원자 속 세 친구: 양성자, 전자, 중성자!</h4>
<p class="s-intro">원자 안에는 세 명의 친구가 살고 있어. 아주 작아서 보이지 않지만, 이 세 친구 덕분에 세상 모든 물질이 만들어진단다! 원자 속으로 쏙 들어가 세 친구를 만나보자!</p>
<div class="story-block"><div class="s-label">➕ 양성자 (Proton) — 긍정 에너지 친구!</div><p>양성자는 원자 한가운데 핵 속에 살아. (+) 양전하를 갖고 있어서 항상 밝고 긍정적인 친구야! 양성자의 개수가 바로 원소의 번호가 된단다. 수소는 1개, 산소는 8개!</p></div>
<div class="story-block"><div class="s-label">➖ 전자 (Electron) — 빠른 달리기 선수!</div><p>전자는 (-) 음전하를 갖고 있어서 양성자에게 끌려! 핵 주변을 엄청 빠르게 뱅글뱅글 돌아. 전자가 원자 밖으로 튀어나오면? 바로 그게 전기야! 전자가 줄줄이 이동하는 게 전류란다.</p></div>
<div class="story-block"><div class="s-label">😐 중성자 (Neutron) — 평화로운 중재자!</div><p>중성자는 핵 속에서 양성자 옆에 붙어 있는데, 전하가 없어 (0). 중간에서 평화롭게 지내는 중재자야. 중성자 덕분에 핵이 너무 불안정해지지 않고 안정적으로 유지된단다.</p></div>
<div class="story-block"><div class="s-label">🏠 원자핵이라는 집</div><p>양성자와 중성자는 함께 핵이라는 집에 살고, 전자는 그 주변을 빠르게 돌아다녀. 핵에 비하면 원자 전체는 엄청 넓어서, 원자의 99.9%는 사실 텅 빈 공간이래! 세상이 거의 텅 비어 있다니 신기하지?</p></div>
<div class="story-block tip"><div class="s-label">💡 놀이 팁</div><p>"원자 가족 역할 놀이: 아빠나 엄마는 '핵(양성자+중성자)', 아이는 '전자'가 되어 주변을 빠르게 돌아다니는 놀이를 해보세요! 전자가 핵에서 멀리 달아나면 '이온이 됐어!'라고 말해주세요."</p></div>
<div class="story-block tip"><div class="s-label">❓ 재미있는 질문들</div><p>"양성자는 (+), 전자는 (-)래. 서로 반대인데 왜 사이좋게 한 원자 안에 있을까?"<br>"원자가 99.9% 텅 빈 공간이래! 그럼 우리가 의자에 앉아도 통과하지 않는 건 왜일까?"<br>"전자가 움직이면 전기가 된대. 우리 집에서 전자가 일하고 있는 물건을 몇 가지나 찾을 수 있어?"</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/watch?v=e9GuJUaX0UM" target="_blank">원자 속 세 친구: 양성자, 전자, 중성자!</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"양성자, 전자, 중성자는 서로 다르지만 함께 원자를 만들어. 우리도 서로 다른 친구들이 함께 모여서 더 멋진 걸 만들 수 있어!"'},
    {id:'efaaNH-LbTQ',desc:'변신의 귀재! 물질의 상태',
      storyHtml:`<h4>📖 🍦 물 변신 로봇 이야기! 물질의 상태</h4>
<p class="s-intro">안녕, 꼬마 과학자 친구들! 오늘은 우리가 매일 먹는 맛있는 아이스크림 속에 숨겨진 <strong>'변신의 비밀'</strong>을 알려줄게. 준비됐니? 출발!</p>
<div class="story-block"><div class="s-label">🍦 1. 아이스크림의 비밀을 찾아라! [00:04]</div><p>친구들, 달콤한 아이스크림이 어떻게 만들어지는지 알아? 아주 차가운 곳에 두면 액체였던 우유가 꽁꽁 얼어서 우리가 좋아하는 아이스크림이 된단다! [03:48] 이처럼 세상 모든 것들은 온도에 따라 변신을 할 수 있어.</p></div>
<div class="story-block"><div class="s-label">🌧️ 2. 하늘에서 내리는 비와 눈은 형제일까? [00:12]</div><p>하늘에서 내리는 축축한 비, 보들보들한 눈, 그리고 딱딱한 우박! 이 세 가지는 사실 모두 같은 '물' 가족이야. [01:06] 온도가 어떠냐에 따라 모습만 바뀐 거란다.</p></div>
<div class="story-block"><div class="s-label">♨️ 3. 주방에서 만나는 물 변신 로봇! [01:31]</div><p>우리 집 주방은 물이 변신하기 가장 좋은 곳이야.<br><br><strong>첫 번째 변신 (기체):</strong> 냄비에 물을 담고 불을 켜면, 물이 아주 뜨거워지면서 가벼운 <strong>'수증기'</strong>로 변해 하늘하늘 위로 올라가. [02:07]<br><br><strong>두 번째 변신 (고체):</strong> 물을 얼음 틀에 넣고 냉동실에 두면, 아주 차가워져서 딱딱한 <strong>'얼음'</strong>이 되지! [03:00]<br><br><strong>세 번째 변신 (액체):</strong> 얼음이 녹거나 수증기가 다시 식으면 우리가 마시는 찰랑찰랑한 <strong>'물'</strong>이 된단다.</p></div>
<div class="story-block"><div class="s-label">🔄 4. 되돌릴 수 있는 변신 vs 못 돌아오는 변신! [05:44]</div><p>물은 얼음이 되었다가 다시 물이 될 수 있지? 이런 걸 <strong>'되돌릴 수 있는 변신(가역 변화)'</strong>이라고 해. 하지만 모든 게 다 그런 건 아니야!<br><br><strong>계란의 비밀:</strong> 액체 같은 계란을 프라이팬에 구우면 하얗고 딱딱해지지? 하지만 이 계란은 다시 액체로 돌아갈 수 없어! [05:51]<br><br><strong>종이의 비밀:</strong> 종이를 불에 태우면 까만 재가 돼버려. 이 재를 다시 하얀 종이로 만들 수는 없지. [06:50] 이런 건 <strong>'다시 돌아올 수 없는 변신(비가역 변화)'</strong>이라고 불러.</p></div>
<div class="story-block"><div class="s-label">💡 엄마/아빠와 함께하는 퀴즈! [07:05]</div><p>우리 주변에서 또 어떤 변신을 찾을 수 있을까?<br>• 주스를 얼리면 뭐가 될까? (힌트: 맛있는 하드!)<br>• 초콜릿이 햇볕에 녹으면 다시 굳힐 수 있을까?<br><br>우리 친구들도 오늘부터 주변 물건들이 어떻게 변신하는지 잘 관찰해 봐! 👋</p></div>`},{id:'QQsybALJoew',desc:'What is Matter? 물질이란 무엇일까요?',
      storyHtml:`<h4>📖 🧪 물질이란 무엇일까요? — 세상 모든 것의 비밀!</h4>
<p class="s-intro">지금 네 주위를 둘러봐. 책상, 컵, 공기, 물... 이 모든 것들에는 공통점이 있어. 바로 '물질(Matter)'이라는 거야! 물질이 뭔지, 어떤 종류가 있는지 같이 알아보자!</p>
<div class="story-block"><div class="s-label">🤔 물질이란?</div><p>물질은 공간을 차지하고 무게가 있는 모든 것이야. 우리가 만지고, 보고, 냄새 맡을 수 있는 것들은 모두 물질이란다! 빛이나 열, 소리는 물질이 아니야.</p></div>
<div class="story-block"><div class="s-label">🧊 고체 — 모양이 있는 물질</div><p>고체는 모양이 정해져 있어서 마음대로 변하지 않아. 돌멩이, 나무, 얼음, 책 모두 고체야. 손으로 잡을 수 있고, 눌러도 모양이 잘 안 변해!</p></div>

       choices:['내 방 청소를 대신 해주면 좋겠어요','어려운 수학 문제를 같이 고민해주면 좋겠어요','내가 심심할 때 재미있는 이야기를 들려주면 좋겠어요','위험한 일을 대신 해주면 좋겠어요'],ans:0,
       fact:'<strong>모두 멋진 생각이에요!</strong> 실제로 인공지능은 집 청소 로봇(룸바), 수학 과외 앱, 이야기를 들려주는 AI 스피커로 이미 우리 곁에 있답니다. 내가 원하는 AI를 직접 만들어볼 수도 있어요!'},
      {scene:'📸',sceneText:'인공지능이 강아지 사진을 수천 장 보고 있어요! 이제 어떤 강아지도 알아볼 수 있대요.',
       q:'인공지능이 강아지 사진을 많이 보는 이유는 무엇일까요?',
       choices:['강아지를 좋아하기 때문에','강아지 사진을 보면서 스스로 강아지를 알아보는 법을 익히기 때문에','강아지 사진이 예쁘기 때문에','시간이 남아서'],ans:1,
       fact:'인공지능은 수많은 데이터를 보면서 패턴을 익혀요. 이것을 <strong>학습(Training)</strong>이라고 해요! 충분히 학습하고 나면, 처음 보는 강아지 사진도 "강아지야!"라고 정확하게 맞힐 수 있게 된답니다.'},
      {scene:'🚗',sceneText:'스스로 달리는 자율주행 자동차를 보고 있어요! 운전사 없이도 잘 달리네요.',
       q:'인공지능이 사람 대신 할 수 있는 일로 적절한 것은?',
       choices:['친구와 진심으로 웃고 즐기기','위험한 곳에서의 구조 활동이나 반복적인 작업','엄마 아빠를 사랑하기','새로운 꿈을 꾸는 것'],ans:1,
       fact:'인공지능은 <strong>위험한 환경에서의 구조, 반복적인 작업, 방대한 데이터 분석</strong> 등 사람이 하기 힘든 일을 도와줄 수 있어요! 하지만 사랑하고 꿈꾸는 것은 사람만이 할 수 있는 특별한 능력이에요.'},
      {scene:'🌟',sceneText:'인공지능 탐험을 마쳤어요! 미래에는 더 멋진 AI 친구들이 생길 거예요.',
       q:'인공지능에서 가장 중요한 것은 무엇일까요?',
       choices:['인공지능이 사람보다 모든 것을 더 잘해야 한다','인공지능을 만들고 올바르게 사용하는 것은 사람의 역할이다','인공지능은 혼자서 모든 것을 결정해야 한다','인공지능은 학교에서 배울 필요가 없다'],ans:1,
       fact:'인공지능을 <strong>만드는 것도, 올바르게 사용하는 것도 바로 사람</strong>이에요! 우리가 인공지능을 어떻게 잘 활용하느냐에 따라 미래는 더 멋지게 변할 수 있어요. 그래서 수학과 과학 공부가 정말 중요하답니다!'},
    ]
  },
];

// ── 상태 ──
let currentTopic = null;
let currentQ = 0;
let score = 0;
let answered = false;
const done = {};

// ── 홈 렌더 ──
function renderHome(){
  const grid=document.getElementById('topic-grid');
  grid.innerHTML=TOPICS.map(t=>`
    <div class="topic-card${done[t.id]?' done':''}" style="--tc:${t.color}" onclick="startTopic('${t.id}')">
      <span class="topic-badge">${done[t.id]?'✓ 완료':'5문제'}</span>
      <span class="topic-icon">${t.icon}</span>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      ${t.vid?'<span style="font-size:.7rem;color:#a78bfa;margin-top:.5rem;display:block">▶ 영상 포함</span>':''}
    </div>
  `).join('');
}

// ── 주제 선택 → 소개 화면 ──
function startTopic(id){
  currentTopic=TOPICS.find(t=>t.id===id);
  document.getElementById('home').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.add('hidden');
  // 소개 화면 세팅
  document.getElementById('intro-icon').textContent=currentTopic.icon;
  document.getElementById('intro-name').textContent=currentTopic.name;
  document.getElementById('intro-desc').textContent=currentTopic.desc;
  const va=document.getElementById('video-area');
  const sa=document.getElementById('story-area');
  const vids=currentTopic.vids||[];
  function buildTip(tip){
    if(!tip) return '';
    return `<div class="story-block tip"><div class="s-label">💡 아이들에게 읽어주실 때 팁</div><p>${tip}</p></div>`;
  }
  function updateStory(vidObj){
    const story=(vidObj&&vidObj.storyHtml)||currentTopic.storyHtml||'';
    const tip=buildTip((vidObj&&vidObj.tip)||currentTopic.tip||'');
    sa.innerHTML='<div class="story-section">'+(story||'')+tip+'</div>';
  }
  if(vids.length){
    let vi=0;
    function renderVid(){
      const v=typeof vids[vi]==='object'?vids[vi].id:vids[vi];
      const vdesc=typeof vids[vi]==='object'?vids[vi].desc:'';
      va.innerHTML=`
        ${v?`<a href="https://www.youtube.com/watch?v=${v}" target="_blank"
           style="display:block;position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4)">
          <img src="https://img.youtube.com/vi/${v}/hqdefault.jpg"
               style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;border-radius:var(--r)" alt="영상 썸네일">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);border-radius:var(--r);transition:.2s">
            <div style="width:68px;height:68px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 2px 12px rgba(0,0,0,.5)">▶</div>
          </div>
          <div style="position:absolute;bottom:.6rem;right:.7rem;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;padding:.2rem .55rem;border-radius:20px">📺 유튜브에서 보기</div>
        </a>`:''}
        ${vdesc?`<p style="font-size:.78rem;color:var(--text2);margin:.3rem 0 .6rem;text-align:center">${vdesc}</p>`:''}
        <div class="vid-nav">
          <button class="vid-nav-btn" onclick="vidPrev()" ${vi===0?'disabled':''}>‹</button>
          <span class="vid-counter">📹 ${vi+1} / ${vids.length}</span>
          <button class="vid-nav-btn" onclick="vidNext()" ${vi===vids.length-1?'disabled':''}>›</button>
        </div>
      `;
      updateStory(vids[vi]);
    }
    window.vidPrev=()=>{if(vi>0){vi--;window.currentVidIdx=vi;renderVid();}};
    window.vidNext=()=>{if(vi<vids.length-1){vi++;window.currentVidIdx=vi;renderVid();}};
    window.currentVidIdx=0;
    renderVid();
  } else {
    va.innerHTML='<div class="no-vid">📹 이 주제는 곧 영상이 추가될 예정이에요!</div>';
    updateStory(null);
  }
  document.getElementById('intro').classList.remove('hidden');
}

// ── 퀴즈 실제 시작 ──
let activeQs=[];
function beginQuiz(){
  currentQ=0; score=0; answered=false;
  // 현재 동영상의 qs 우선, 없으면 주제 qs
  const vi=window.currentVidIdx||0;
  const vids=currentTopic.vids||[];
  const vidObj=typeof vids[vi]==='object'?vids[vi]:null;
  activeQs=(vidObj&&vidObj.qs)||currentTopic.qs||[];
  const va=document.getElementById('video-area');
  va.innerHTML='';
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('quiz-topic-name').textContent=currentTopic.icon+' '+currentTopic.name;
  renderQ();
}

// ── 문제 렌더 ──
function renderQ(){
  answered=false;
  const q=activeQs[currentQ];
  const total=activeQs.length;
  document.getElementById('progress-fill').style.width=((currentQ/total)*100)+'%';
  document.getElementById('q-num').textContent=(currentQ+1)+' / '+total;
  document.getElementById('scene-icon').textContent=q.scene;
  document.getElementById('scene-text').innerHTML=q.sceneText;
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('fact-box').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  const letters=['A','B','C','D'];
  document.getElementById('choices').innerHTML=q.choices.map((c,i)=>`
    <button class="choice" onclick="choose(${i})" id="choice-${i}">
      <span class="choice-letter">${letters[i]}</span>${c}
    </button>
  `).join('');
}

// ── 답 선택 ──
function choose(idx){
  if(answered) return;
  answered=true;
  const q=activeQs[currentQ];
  const btns=document.querySelectorAll('.choice');
  btns.forEach(b=>b.classList.add('disabled'));
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if(idx===q.ans){
    score++;
    if(typeof toroSay==='function') toroSay('science','correct');
    btns[idx].innerHTML='<span class="choice-letter">✓</span>'+q.choices[idx];
  } else {
    if(typeof toroSay==='function') toroSay('science','wrong');
    btns[q.ans].classList.add('correct');
  }
  const fb=document.getElementById('fact-box');
  fb.innerHTML='💡 <strong>재미있는 사실!</strong><br>'+q.fact;
  fb.classList.remove('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('next-btn').textContent=currentQ<activeQs.length-1?'다음 문제 →':'결과 보기 🎉';
}

// ── 다음 문제 ──
function nextQ(){
  currentQ++;
  if(currentQ>=activeQs.length){ showResult(); return; }
  renderQ();
}

// ── 결과 ──
function showResult(){
  if(typeof toroSay==='function') toroSay('science','complete',{score,total:activeQs.length});
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  done[currentTopic.id]=true;
  const total=activeQs.length;
  const pct=score/total;
  let icon,title,stars;
  if(pct===1){icon='🏆';title='완벽해요! 천재 탐험가!';stars='⭐⭐⭐⭐⭐'}
  else if(pct>=0.8){icon='🎉';title='훌륭해요! 대단한 탐험가!';stars='⭐⭐⭐⭐'}
  else if(pct>=0.6){icon='👍';title='잘했어요! 과학자 꿈나무!';stars='⭐⭐⭐'}
  else if(pct>=0.4){icon='💪';title='다시 도전해봐요!';stars='⭐⭐'}
  else{icon='🚌';title='버스를 타고 다시 탐험!';stars='⭐'}
  document.getElementById('result-icon').textContent=currentTopic.icon;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-stars').textContent=stars;
  document.getElementById('result-score').textContent=`${currentTopic.name} — ${score}/${total}문제 정답!`;
  renderHome();
  checkAllDone();
}

function retryTopic(){ startTopic(currentTopic.id); }

// ── 수료증 ──
function checkAllDone(){
  if(TOPICS.every(t=>done[t.id])){
    document.getElementById('cert-topics').innerHTML=
      TOPICS.map(t=>`<span class="cert-topic-chip">${t.icon} ${t.name}</span>`).join('');
    document.getElementById('cert-modal').classList.remove('hidden');
  }
}
function closeCert(){
  document.getElementById('cert-modal').classList.add('hidden');
}
function goHome(){
  // iframe 정지
  document.getElementById('video-area').innerHTML='';
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

renderHome();
// 설명 페이지에서 넘어올 때 해당 주제 자동 시작
const hash = location.hash.slice(1);
if(hash && TOPICS.find(t => t.id === hash)) startTopic(hash);
</script>
</body>
