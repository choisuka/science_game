<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학탐험대 🚌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#001219;--bg2:#0a4a52;--bg3:#0e7490;
  --text:#f1f5f9;--text2:#94d2bd;
  --r:16px;
}
html,body{background:linear-gradient(160deg,#001219 0%,#005f73 100%);color:var(--text);font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100%;overflow-x:hidden}

/* ── 별 배경 ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── 공통 ── */
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 1.2rem 4rem}
.hidden{display:none!important}

/* ── 홈 화면 ── */
#home{text-align:center;padding-top:3.5rem}
.bus-emoji{font-size:5rem;display:block;animation:busFloat 2.5s ease-in-out infinite}
@keyframes busFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
#home h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;margin:.8rem 0 .4rem;
  background:linear-gradient(135deg,#f97316,#eab308,#22c55e,#3b82f6,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#home .sub{color:var(--text2);font-size:1rem;margin-bottom:2.5rem}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-top:1.5rem;text-align:left}
.topic-card{
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r);padding:1.4rem 1.2rem;cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.topic-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.topic-card:hover{border-color:var(--tc)}
.topic-icon{font-size:2.6rem;display:block;margin-bottom:.6rem}
.topic-card h3{font-size:1.05rem;font-weight:800;margin-bottom:.3rem}
.topic-card p{font-size:.78rem;color:var(--text2);line-height:1.6}
.topic-badge{
  position:absolute;top:.8rem;right:.8rem;
  font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;
  background:rgba(255,255,255,.08);color:var(--text2)
}
.topic-card.done .topic-badge{background:rgba(34,197,94,.2);color:#4ade80}

/* ── 퀴즈 화면 ── */
#quiz{padding-top:2rem}
.quiz-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.8rem}
.back-btn{background:rgba(255,255,255,.07);border:none;border-radius:50%;width:40px;height:40px;
  font-size:1.1rem;cursor:pointer;color:var(--text);transition:background .2s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.14)}
.quiz-topic{font-weight:800;font-size:1.1rem}
.progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;flex:1}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f97316,#a855f7);transition:width .4s}
.q-num{font-size:.8rem;color:var(--text2);white-space:nowrap}

.scene-box{
  background:var(--bg2);border-radius:var(--r);padding:1.6rem 1.4rem;
  margin-bottom:1.4rem;border:1px solid rgba(255,255,255,.07);
}
.scene-icon{font-size:3.5rem;text-align:center;display:block;margin-bottom:.8rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.scene-text{font-size:.9rem;color:var(--text2);line-height:1.8;text-align:center}
.scene-text strong{color:var(--text)}

.question{font-size:1.15rem;font-weight:700;line-height:1.6;margin-bottom:1.2rem;text-align:center}

.choices{display:grid;gap:.75rem}
.choice{
  background:var(--bg3);border:1.5px solid rgba(255,255,255,.08);
  border-radius:12px;padding:1rem 1.2rem;cursor:pointer;font-size:.95rem;
  text-align:left;color:var(--text);transition:border-color .15s,background .15s;
  display:flex;align-items:center;gap:.75rem;
}
.choice:hover:not(.disabled){background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.2)}
.choice.correct{background:rgba(34,197,94,.12);border-color:#22c55e;color:#4ade80}
.choice.wrong{background:rgba(239,68,68,.12);border-color:#ef4444;color:#f87171}
.choice.disabled{cursor:default}
.choice-letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.choice.correct .choice-letter{background:rgba(34,197,94,.3)}
.choice.wrong .choice-letter{background:rgba(239,68,68,.3)}

.fact-box{
  background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.25);
  border-radius:12px;padding:1rem 1.2rem;margin-top:1.2rem;
  font-size:.88rem;line-height:1.8;color:var(--text2);
  animation:fadeIn .4s ease
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fact-box strong{color:#fbbf24}
.next-btn{
  width:100%;margin-top:1.2rem;padding:1rem;border-radius:12px;border:none;
  background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;
  font-size:1rem;font-weight:800;cursor:pointer;transition:opacity .2s
}
.next-btn:hover{opacity:.87}

/* ── 주제 소개(영상) 화면 ── */
#intro{text-align:center;padding-top:3rem}
.intro-icon{font-size:5rem;display:block;margin-bottom:.6rem;animation:busFloat 2.5s ease-in-out infinite}
.intro-name{font-size:2rem;font-weight:900;margin-bottom:.3rem}
.intro-desc{color:var(--text2);font-size:.95rem;margin-bottom:1.6rem}
.video-box{position:relative;width:100%;padding-top:56.25%;border-radius:var(--r);overflow:hidden;background:#000}
.video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.no-vid{background:var(--bg2);border-radius:var(--r);padding:2.5rem 1rem;color:var(--text2);font-size:.9rem;margin-bottom:1.4rem}
.vid-nav{display:flex;align-items:center;justify-content:space-between;margin:.6rem 0 1.2rem;gap:.5rem}
.vid-nav-btn{background:rgba(255,255,255,.1);border:none;color:var(--text);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;flex-shrink:0}
.vid-nav-btn:disabled{opacity:.25;cursor:default}
.vid-counter{font-size:.78rem;color:var(--text2)}
.intro-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-start{padding:.9rem 2.2rem;border-radius:100px;border:none;background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;font-size:1rem;font-weight:800;cursor:pointer}
.btn-back2{padding:.9rem 1.6rem;border-radius:100px;border:none;background:var(--bg3);color:var(--text);font-size:1rem;font-weight:700;cursor:pointer}
.story-section{background:var(--bg2);border-radius:var(--r);padding:1.4rem 1.2rem;margin-bottom:1.4rem;border:1px solid rgba(255,255,255,.07);text-align:left}
.story-section h4{font-size:1rem;font-weight:900;margin-bottom:1rem;color:#7dd3c8}
.story-block{margin-bottom:1rem}
.story-block .s-label{font-size:.85rem;font-weight:800;margin-bottom:.3rem;color:var(--text)}
.story-block p{font-size:.82rem;color:var(--text2);line-height:1.9}
.s-intro{font-size:.88rem;color:var(--text2);margin-bottom:1rem;line-height:1.8}
.story-block.tip{background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.25);border-radius:10px;padding:.8rem 1rem;margin-top:.5rem}
.story-block.tip .s-label{color:#fbbf24}

/* ── 수료증 모달 ── */
#cert-modal{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);padding:1rem}
.cert-box{
  background:linear-gradient(160deg,#001a2c 0%,#0a2a3a 60%,#0d3347 100%);
  border:2px solid rgba(234,179,8,.5);border-radius:24px;padding:2.5rem 2rem;
  max-width:480px;width:100%;text-align:center;
  box-shadow:0 0 60px rgba(234,179,8,.2),0 0 120px rgba(234,179,8,.1);
  animation:certIn .5s cubic-bezier(.175,.885,.32,1.275)
}
@keyframes certIn{from{transform:scale(.6) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.cert-badge{font-size:4.5rem;display:block;margin-bottom:.3rem;animation:badgeSpin 1s ease .2s both}
@keyframes badgeSpin{from{transform:rotate(-180deg) scale(0)}to{transform:rotate(0) scale(1)}}
.cert-stars-row{font-size:1.4rem;letter-spacing:.15rem;margin-bottom:1rem}
.cert-title{font-size:2rem;font-weight:900;margin:.3rem 0 .2rem;
  background:linear-gradient(135deg,#fbbf24,#f97316,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cert-sub{font-size:.85rem;color:#94d2bd;letter-spacing:.12em;font-weight:700;margin-bottom:1.2rem}
.cert-deco{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:1.2rem}
.cert-deco::before,.cert-deco::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(234,179,8,.4),transparent)}
.cert-deco span{color:#fbbf24;font-size:.9rem}
.cert-body{font-size:.9rem;color:var(--text2);line-height:1.9;margin-bottom:1.5rem}
.cert-topics{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1.5rem}
.cert-topic-chip{font-size:.75rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.25rem .7rem;color:var(--text2)}
.cert-seal{font-size:.8rem;color:#fbbf24;font-weight:700;margin-bottom:1.4rem;opacity:.85}
.cert-close{padding:.75rem 2rem;border-radius:100px;border:none;background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;font-size:.95rem;font-weight:800;cursor:pointer;width:100%}
/* ── 결과 화면 ── */
#result{text-align:center;padding-top:3rem}
.result-icon{font-size:5rem;display:block;margin-bottom:1rem;animation:spin .5s ease}
@keyframes spin{from{transform:rotate(-20deg) scale(.8)}to{transform:rotate(0) scale(1)}}
#result h2{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.stars{font-size:2.5rem;letter-spacing:.2rem;margin:1rem 0}
.score-txt{color:var(--text2);font-size:1rem;margin-bottom:2rem}
.result-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.result-btn{padding:.75rem 1.8rem;border-radius:100px;border:none;font-size:.95rem;font-weight:700;cursor:pointer}
.btn-retry{background:var(--bg3);color:var(--text)}
.btn-home{background:linear-gradient(135deg,#f97316,#a855f7);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- ── 홈 ── -->
<div class="wrap" id="home">
  <span class="bus-emoji">🚌</span>
  <h1>과학탐험대</h1>
  <p class="sub">매직스쿨버스를 타고 떠나는 신비한 과학 여행!<br>11가지 주제, 주제마다 5문제 도전!</p>
  <a href="story.html" style="display:inline-block;margin-bottom:1.5rem;padding:.65rem 1.6rem;border-radius:100px;background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.4);color:#c084fc;font-size:.9rem;font-weight:700;text-decoration:none">📖 과학 설명 먼저 보기</a>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- ── 주제 소개 ── -->
<div class="wrap hidden" id="intro">
  <span class="intro-icon" id="intro-icon"></span>
  <h2 class="intro-name" id="intro-name"></h2>
  <p class="intro-desc" id="intro-desc"></p>
  <div id="video-area"></div>
  <div id="story-area"></div>
  <div class="intro-btns">
    <button class="btn-back2" onclick="goHome()">← 돌아가기</button>
    <button class="btn-start" onclick="beginQuiz()">퀴즈 시작! 🚀</button>
  </div>
</div>

<!-- ── 퀴즈 ── -->
<div class="wrap hidden" id="quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="quiz-topic" id="quiz-topic-name"></span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="q-num" id="q-num"></span>
  </div>
  <div class="scene-box">
    <span class="scene-icon" id="scene-icon"></span>
    <p class="scene-text" id="scene-text"></p>
  </div>
  <p class="question" id="question-text"></p>
  <div class="choices" id="choices"></div>
  <div class="fact-box hidden" id="fact-box"></div>
  <button class="next-btn hidden" id="next-btn" onclick="nextQ()">다음 →</button>
</div>

<!-- ── 수료증 모달 ── -->
<div id="cert-modal" class="hidden">
  <div class="cert-box">
    <div class="cert-stars-row">🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟</div>
    <span class="cert-badge">🏅</span>
    <h2 class="cert-title">주니어 과학 대장</h2>
    <p class="cert-sub">JUNIOR SCIENCE EXPLORER</p>
    <div class="cert-deco"><span>✦ 매직스쿨버스 과학탐험대 ✦</span></div>
    <p class="cert-body">과학탐험대의 <strong style="color:#fbbf24">11가지 주제</strong>를 모두 탐험하고<br>퀴즈를 완주하였기에 이 상장을 드립니다.<br><br>호기심 넘치는 탐험가 정신으로<br>과학의 세계를 빛내 주세요! 🚌💫</p>
    <div class="cert-topics" id="cert-topics"></div>
    <p class="cert-seal">🚌 매직스쿨버스 탐험대장 드림 · 2026</p>
    <button class="cert-close" onclick="closeCert()">🎉 닫기</button>
  </div>
</div>

<!-- ── 결과 ── -->
<div class="wrap hidden" id="result">
  <span class="result-icon" id="result-icon"></span>
  <h2 id="result-title"></h2>
  <div class="stars" id="result-stars"></div>
  <p class="score-txt" id="result-score"></p>
  <div class="result-btns">
    <button class="result-btn btn-retry" onclick="retryTopic()">다시 도전 🔄</button>
    <button class="result-btn btn-home" onclick="goHome()">다른 주제 탐험 🚌</button>
  </div>
</div>

<script>
// ── 별 배경 ──
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,stars=[];
function resizeCanvas(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,a:Math.random()}))}
function drawStars(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(drawStars)}
window.addEventListener('resize',resizeCanvas);resizeCanvas();drawStars();

// ── 주제 데이터 ──
const TOPICS = [
  {
    id:'space', icon:'🚀', name:'우주 탐험', color:'#3b82f6',
    desc:'태양계 · 별 · 블랙홀',
    tip:'<strong>질문 던지기:</strong> "달이 매일 모양이 바뀌는 것 혹시 알았어?", "태양을 맨눈으로 보면 왜 안 될까?" 같은 질문으로 호기심을 불러일으켜 주세요.<br><br><strong>연결하기:</strong> "수업에서 배운 동그란 모양(구)이 지구, 달, 태양 모두 같은 모양이란다. 우주도 수학으로 설명돼!"',
    vids:[{id:'Td_A9H69eE8',desc:'우리의 대장님! 태양 이야기'},{id:'e8YzKyot4Pc',desc:'태양계 행성 탐험'},{id:'ya6Ko9bF5v8',desc:'밤하늘의 별 이야기'},{id:'osSkJuohjM8',desc:'우주의 신비로운 세계'},{id:'whSAgISrGME',desc:'블랙홀의 비밀'},{id:'sePqPIXMsAc',desc:'우주 탐험 이야기'},{id:'NIn9IQwnuvA',desc:'목성에 빠지면 어떻게 될까요?',storyHtml:`<h4>📖 🪐 만약 우리가 거대한 목성으로 슝~ 떨어진다면?</h4>
<p class="s-intro">태양계에서 가장 덩치가 큰 대장 행성, 목성! 만약 우주복을 입고 목성 속으로 쏙 들어간다면 어떤 일이 벌어질까? 선생님이랑 같이 탐험을 시작해보자!</p>
<div class="story-block"><div class="s-label">🕳️ 바닥이 없는 행성</div><p>지구는 땅이 있어서 발을 딛고 설 수 있지? 하지만 목성은 거대한 가스 덩어리야. 발을 내딛는 순간 끝도 없이 아래로 아래로 계속 떨어지게 된단다. 마치 끝이 없는 미끄럼틀을 타는 것 같을 거야!</p></div>
<div class="story-block"><div class="s-label">🌀 무시무시한 폭풍, 대적점</div><p>목성에는 지구보다 더 큰 빨간 눈 모양의 폭풍이 있어. 여기선 바람이 너무 세게 불어서 우리를 휘리릭 날려버릴지도 몰라. 하지만 걱정 마, 우리에겐 튼튼한 상상 우주복이 있으니까!</p></div>
<div class="story-block"><div class="s-label">🔥 점점 뜨거워지고 무거워져</div><p>깊이 들어갈수록 공기가 우리를 꾹꾹 누르는 힘(압력)이 엄청나게 세져. 온도는 점점 뜨거워져서 마치 거대한 오븐 속에 들어온 것 같을 거야. 결국 목성의 중심에는 아주 단단하고 뜨거운 핵이 숨어 있단다.</p></div>
<p class="s-intro" style="margin-top:.8rem">목성은 정말 아름답지만, 멀리서 바라볼 때 가장 멋진 행성인 것 같지 않니? 우리 지구처럼 발을 딛고 살 수 있는 땅이 있다는 게 얼마나 감사한 일인지 알게 될 거야!</p>`,
tip:'이 영상을 보여주실 때 제목을 <strong>"목성 탐험대: 목성에 떨어지면?"</strong>이라고 소개해 주시면 아이들이 훨씬 호기심을 가질 거예요.<br><br>혹시 아이들이 <strong>"그럼 목성 말고 다른 행성에 떨어지면요?"</strong>라고 물어본다면 토성이나 화성 영상도 연결해서 보여주시면 최고의 우주 수업이 될 것 같습니다!',
qs:[
  {scene:'🪐',sceneText:'버스가 목성에 도착했어요! 내리려고 했더니 발이 닿을 땅이 없네요?',
   q:'목성에는 발을 딛고 설 수 있는 \'땅\'이 있을까요?',
   choices:['네, 아주 넓은 운동장이 있어요','아니요, 목성은 가스로 되어 있어서 계속 아래로 떨어져요','네, 하지만 너무 미끄러워서 스케이트를 타야 해요'],ans:1,
   fact:'목성은 <strong>가스 행성</strong>이라 지구처럼 딱딱한 땅이 없답니다! 발을 내딛는 순간 끝도 없이 아래로 계속 떨어지게 돼요.'},

    storyHtml:`<h4>📖 ☀️ 우리의 대장님! 태양 이야기 (Our Sun)</h4>
<p class="s-intro">하늘 높이 떠 있는 저 뜨거운 태양은 사실 거대한 '가스 공'이라는 거, 믿겨지니?</p>
<div class="story-block"><div class="s-label">☀️ 우주에서 가장 큰 불공</div><p>태양은 우리 지구보다 훨씬, 훨씬 더 커. 지구가 100만 개나 들어갈 수 있을 정도지!</p></div>
<div class="story-block"><div class="s-label">🌟 빛과 열의 선물</div><p>태양이 없다면 지구는 꽁꽁 얼어붙은 얼음 나라가 될 거야. 태양 덕분에 식물들이 쑥쑥 자라고 우리도 따뜻하게 지낼 수 있는 거란다.</p></div>
<div class="story-block"><div class="s-label">⭐ 우리의 대장 별</div><p>태양은 사실 우주에 있는 수많은 '별' 중 하나야. 하지만 우리 지구와 가장 가깝기 때문에 우리에게 가장 소중한 대장 별이 되었지!</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🌙 달에는 공기가 있을까요? (The Moon)</h4>
<p class="s-intro">밤하늘에 예쁘게 뜬 달! 만약 우리가 우주선을 타고 달에 가면 어떤 일이 벌어질까요?</p>
<div class="story-block"><div class="s-label">🤫 조용한 세상</div><p>달에는 공기가 없어요. 그래서 아무리 크게 소리를 질러도 소리가 들리지 않는 아주 조용한 곳이랍니다.</p></div>
<div class="story-block"><div class="s-label">🦘 깡충깡충 점프</div><p>달은 지구보다 당기는 힘(중력)이 약해요. 그래서 한 번만 살짝 뛰어도 건물 2층 높이까지 붕~ 날아오를 수 있어요!</p></div>
<div class="story-block"><div class="s-label">👨‍🚀 우주복은 필수</div><p>공기도 없고 햇빛이 너무 뜨겁거나 차갑기 때문에, 달에 갈 때는 꼭 튼튼한 우주복을 입어야 한답니다.</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🪐 목성에 빠지면 어떻게 될까요? (What if you fell into Jupiter?)</h4>
<p class="s-intro">태양계에서 가장 덩치가 큰 대장 행성, 목성! 만약 목성 속으로 쏙 들어간다면 어떤 일이 벌어질까?</p>
<div class="story-block"><div class="s-label">🕳️ 바닥이 없는 행성</div><p>지구는 땅이 있어서 발을 딛고 설 수 있지? 하지만 목성은 거대한 가스 덩어리야. 발을 내딛는 순간 끝도 없이 아래로 계속 떨어지게 된단다. 끝이 없는 미끄럼틀을 타는 것 같을 거야!</p></div>
<div class="story-block"><div class="s-label">🌀 무시무시한 폭풍, 대적점</div><p>목성에는 지구보다 더 큰 빨간 눈 모양의 폭풍이 있어. 여기선 바람이 너무 세게 불어서 우리를 휘리릭 날려버릴지도 몰라. 이것을 '대적점'이라고 부르는데, 수백 년 동안 계속 불고 있대!</p></div>
<div class="story-block"><div class="s-label">🔥 점점 뜨거워지고 무거워져</div><p>깊이 들어갈수록 공기가 우리를 꾹꾹 누르는 힘(압력)이 엄청나게 세지고, 온도는 점점 뜨거워져. 결국 목성의 중심에는 아주 단단하고 뜨거운 핵이 숨어 있단다.</p></div>`,

      storyHtml:`<h4>📖 🧩 세상을 만드는 마법의 퍼즐 조각, 원소 이야기!</h4>

<div class="story-block"><div class="s-label">🧪 2. 엉뚱한 과학자의 '오줌' 실험! [01:55]</div><p>옛날에 헤닝 브란트라는 아주 엉뚱한 아저씨가 있었어. 이 아저씨는 "우리 몸 안에도 금이 있지 않을까?"라고 생각했대. 그래서 노란색인 '오줌'을 잔뜩 모아서 보글보글 끓여봤어! [02:02]<br>금은 나오지 않았지만, 대신 어둠 속에서 하얗게 빛나는 <strong>'인'</strong>이라는 새로운 조각을 찾아냈단다. 정말 대단하지?</p></div>

      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 몸도, 네가 좋아하는 장난감도 사실은 이 작은 퍼즐 조각들이 모여서 만들어진 거란다. 너도 나중에 이 세상의 숨겨진 새로운 퍼즐 조각을 찾는 멋진 탐험가가 될 수 있어!" 🚀'},{id:'efaaNH-LbTQ',desc:'변신의 귀재! 물질의 상태',
      storyHtml:`<h4>📖 🍦 물 변신 로봇 이야기! 물질의 상태</h4>
<p class="s-intro">안녕, 꼬마 과학자 친구들! 오늘은 우리가 매일 먹는 맛있는 아이스크림 속에 숨겨진 <strong>'변신의 비밀'</strong>을 알려줄게. 준비됐니? 출발!</p>
<div class="story-block"><div class="s-label">🍦 1. 아이스크림의 비밀을 찾아라! [00:04]</div><p>친구들, 달콤한 아이스크림이 어떻게 만들어지는지 알아? 아주 차가운 곳에 두면 액체였던 우유가 꽁꽁 얼어서 우리가 좋아하는 아이스크림이 된단다! [03:48] 이처럼 세상 모든 것들은 온도에 따라 변신을 할 수 있어.</p></div>
<div class="story-block"><div class="s-label">🌧️ 2. 하늘에서 내리는 비와 눈은 형제일까? [00:12]</div><p>하늘에서 내리는 축축한 비, 보들보들한 눈, 그리고 딱딱한 우박! 이 세 가지는 사실 모두 같은 '물' 가족이야. [01:06] 온도가 어떠냐에 따라 모습만 바뀐 거란다.</p></div>
<div class="story-block"><div class="s-label">♨️ 3. 주방에서 만나는 물 변신 로봇! [01:31]</div><p>우리 집 주방은 물이 변신하기 가장 좋은 곳이야.<br><br><strong>첫 번째 변신 (기체):</strong> 냄비에 물을 담고 불을 켜면, 물이 아주 뜨거워지면서 가벼운 <strong>'수증기'</strong>로 변해 하늘하늘 위로 올라가. [02:07]<br><br><strong>두 번째 변신 (고체):</strong> 물을 얼음 틀에 넣고 냉동실에 두면, 아주 차가워져서 딱딱한 <strong>'얼음'</strong>이 되지! [03:00]<br><br><strong>세 번째 변신 (액체):</strong> 얼음이 녹거나 수증기가 다시 식으면 우리가 마시는 찰랑찰랑한 <strong>'물'</strong>이 된단다.</p></div>
<div class="story-block"><div class="s-label">🔄 4. 되돌릴 수 있는 변신 vs 못 돌아오는 변신! [05:44]</div><p>물은 얼음이 되었다가 다시 물이 될 수 있지? 이런 걸 <strong>'되돌릴 수 있는 변신(가역 변화)'</strong>이라고 해. 하지만 모든 게 다 그런 건 아니야!<br><br><strong>계란의 비밀:</strong> 액체 같은 계란을 프라이팬에 구우면 하얗고 딱딱해지지? 하지만 이 계란은 다시 액체로 돌아갈 수 없어! [05:51]<br><br><strong>종이의 비밀:</strong> 종이를 불에 태우면 까만 재가 돼버려. 이 재를 다시 하얀 종이로 만들 수는 없지. [06:50] 이런 건 <strong>'다시 돌아올 수 없는 변신(비가역 변화)'</strong>이라고 불러.</p></div>
<div class="story-block"><div class="s-label">💡 엄마/아빠와 함께하는 퀴즈! [07:05]</div><p>우리 주변에서 또 어떤 변신을 찾을 수 있을까?<br>• 주스를 얼리면 뭐가 될까? (힌트: 맛있는 하드!)<br>• 초콜릿이 햇볕에 녹으면 다시 굳힐 수 있을까?<br><br>우리 친구들도 오늘부터 주변 물건들이 어떻게 변신하는지 잘 관찰해 봐! 👋</p></div>`},{id:'QQsybALJoew',desc:'What is Matter? 물질이란 무엇일까요?',
      storyHtml:`<h4>📖 🌟 물질 탐험 이야기! What is Matter?</h4>
<p class="s-intro">안녕, 꼬마 탐험가 친구들! 오늘은 우리 주변에 있는 모든 것들에 숨겨진 아주 특별한 비밀을 알려줄게. 바로 <strong>'물질(Matter)'</strong>이라는 친구에 대한 이야기야!</p>
<div class="story-block"><div class="s-label">🌟 1. "세상은 모두 내 거야!" - 물질이 뭐예요? [01:05]</div><p>우리 친구가 읽는 책, 가지고 노는 장난감, 마시는 물, 심지어 우리가 숨 쉬는 공기까지! 세상의 모든 것들은 '물질'로 만들어져 있어. 물질인 걸 확인하려면 딱 두 가지만 기억하면 돼!<br>• 무게가 있니? (얼마나 무거운지!)<br>• 자리를 차지하니? (얼마나 큰지!)<br>공도 작은 자리를 차지하고, 커다란 태양도 아주 넓은 자리를 차지하니까 모두 물질이야! [01:48]</p></div>

  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.add('hidden');
  // 소개 화면 세팅
  document.getElementById('intro-icon').textContent=currentTopic.icon;
  document.getElementById('intro-name').textContent=currentTopic.name;
  document.getElementById('intro-desc').textContent=currentTopic.desc;
  const va=document.getElementById('video-area');
  const sa=document.getElementById('story-area');
  const vids=currentTopic.vids||[];
  function buildTip(tip){
    if(!tip) return '';
    return `<div class="story-block tip"><div class="s-label">💡 아이들에게 읽어주실 때 팁</div><p>${tip}</p></div>`;
  }
  function updateStory(vidObj){
    const story=(vidObj&&vidObj.storyHtml)||currentTopic.storyHtml||'';
    const tip=buildTip((vidObj&&vidObj.tip)||currentTopic.tip||'');
    sa.innerHTML='<div class="story-section">'+(story||'')+tip+'</div>';
  }
  if(vids.length){
    let vi=0;
    function renderVid(){
      const v=typeof vids[vi]==='object'?vids[vi].id:vids[vi];
      const vdesc=typeof vids[vi]==='object'?vids[vi].desc:'';
      va.innerHTML=`
        <a href="https://www.youtube.com/watch?v=${v}" target="_blank"
           style="display:block;position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4)">
          <img src="https://img.youtube.com/vi/${v}/hqdefault.jpg"
               style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;border-radius:var(--r)" alt="영상 썸네일">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);border-radius:var(--r);transition:.2s">
            <div style="width:68px;height:68px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 2px 12px rgba(0,0,0,.5)">▶</div>
          </div>
          <div style="position:absolute;bottom:.6rem;right:.7rem;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;padding:.2rem .55rem;border-radius:20px">📺 유튜브에서 보기</div>
        </a>
        ${vdesc?`<p style="font-size:.78rem;color:var(--text2);margin:.3rem 0 .6rem;text-align:center">${vdesc}</p>`:''}
        <div class="vid-nav">
          <button class="vid-nav-btn" onclick="vidPrev()" ${vi===0?'disabled':''}>‹</button>
          <span class="vid-counter">📹 ${vi+1} / ${vids.length}</span>
          <button class="vid-nav-btn" onclick="vidNext()" ${vi===vids.length-1?'disabled':''}>›</button>
        </div>
      `;
      updateStory(vids[vi]);
    }
    window.vidPrev=()=>{if(vi>0){vi--;window.currentVidIdx=vi;renderVid();}};
    window.vidNext=()=>{if(vi<vids.length-1){vi++;window.currentVidIdx=vi;renderVid();}};
    window.currentVidIdx=0;
    renderVid();
  } else {
    va.innerHTML='<div class="no-vid">📹 이 주제는 곧 영상이 추가될 예정이에요!</div>';
    updateStory(null);
  }
  document.getElementById('intro').classList.remove('hidden');
}

// ── 퀴즈 실제 시작 ──
let activeQs=[];
function beginQuiz(){
  currentQ=0; score=0; answered=false;
  // 현재 동영상의 qs 우선, 없으면 주제 qs
  const vi=window.currentVidIdx||0;
  const vids=currentTopic.vids||[];
  const vidObj=typeof vids[vi]==='object'?vids[vi]:null;
  activeQs=(vidObj&&vidObj.qs)||currentTopic.qs||[];
  const va=document.getElementById('video-area');
  va.innerHTML='';
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('quiz-topic-name').textContent=currentTopic.icon+' '+currentTopic.name;
  renderQ();
}

// ── 문제 렌더 ──
function renderQ(){
  answered=false;
  const q=activeQs[currentQ];
  const total=activeQs.length;
  document.getElementById('progress-fill').style.width=((currentQ/total)*100)+'%';
  document.getElementById('q-num').textContent=(currentQ+1)+' / '+total;
  document.getElementById('scene-icon').textContent=q.scene;
  document.getElementById('scene-text').innerHTML=q.sceneText;
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('fact-box').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  const letters=['A','B','C','D'];
  document.getElementById('choices').innerHTML=q.choices.map((c,i)=>`
    <button class="choice" onclick="choose(${i})" id="choice-${i}">
      <span class="choice-letter">${letters[i]}</span>${c}
    </button>
  `).join('');
}

// ── 답 선택 ──
function choose(idx){
  if(answered) return;
  answered=true;
  const q=activeQs[currentQ];
  const btns=document.querySelectorAll('.choice');
  btns.forEach(b=>b.classList.add('disabled'));
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if(idx===q.ans){
    score++;
    btns[idx].innerHTML='<span class="choice-letter">✓</span>'+q.choices[idx];
  } else {
    btns[q.ans].classList.add('correct');
  }
  const fb=document.getElementById('fact-box');
  fb.innerHTML='💡 <strong>재미있는 사실!</strong><br>'+q.fact;
  fb.classList.remove('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('next-btn').textContent=currentQ<activeQs.length-1?'다음 문제 →':'결과 보기 🎉';
}

// ── 다음 문제 ──
function nextQ(){
  currentQ++;
  if(currentQ>=activeQs.length){ showResult(); return; }
  renderQ();
}

// ── 결과 ──
function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  done[currentTopic.id]=true;
  const total=activeQs.length;
  const pct=score/total;
  let icon,title,stars;
  if(pct===1){icon='🏆';title='완벽해요! 천재 탐험가!';stars='⭐⭐⭐⭐⭐'}
  else if(pct>=0.8){icon='🎉';title='훌륭해요! 대단한 탐험가!';stars='⭐⭐⭐⭐'}
  else if(pct>=0.6){icon='👍';title='잘했어요! 과학자 꿈나무!';stars='⭐⭐⭐'}
  else if(pct>=0.4){icon='💪';title='다시 도전해봐요!';stars='⭐⭐'}
  else{icon='🚌';title='버스를 타고 다시 탐험!';stars='⭐'}
  document.getElementById('result-icon').textContent=currentTopic.icon;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-stars').textContent=stars;
  document.getElementById('result-score').textContent=`${currentTopic.name} — ${score}/${total}문제 정답!`;
  renderHome();
  checkAllDone();
}

function retryTopic(){ startTopic(currentTopic.id); }

// ── 수료증 ──
function checkAllDone(){
  if(TOPICS.every(t=>done[t.id])){
    document.getElementById('cert-topics').innerHTML=
      TOPICS.map(t=>`<span class="cert-topic-chip">${t.icon} ${t.name}</span>`).join('');
    document.getElementById('cert-modal').classList.remove('hidden');
  }
}
function closeCert(){
  document.getElementById('cert-modal').classList.add('hidden');
}
function goHome(){
  // iframe 정지
  document.getElementById('video-area').innerHTML='';
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

renderHome();
// 설명 페이지에서 넘어올 때 해당 주제 자동 시작
const hash = location.hash.slice(1);
if(hash && TOPICS.find(t => t.id === hash)) startTopic(hash);
</script>
</body>
