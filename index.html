<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학탐험대 🚌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#001219;--bg2:#0a4a52;--bg3:#0e7490;
  --text:#f1f5f9;--text2:#94d2bd;
  --r:16px;
}
html,body{background:linear-gradient(160deg,#001219 0%,#005f73 100%);color:var(--text);font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100%;overflow-x:hidden}

/* ── 별 배경 ── */
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── 공통 ── */
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 1.2rem 4rem}
.hidden{display:none!important}

/* ── 홈 화면 ── */
#home{text-align:center;padding-top:3.5rem}
.bus-emoji{font-size:5rem;display:block;animation:busFloat 2.5s ease-in-out infinite}
@keyframes busFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
#home h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;margin:.8rem 0 .4rem;
  background:linear-gradient(135deg,#f97316,#eab308,#22c55e,#3b82f6,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#home .sub{color:var(--text2);font-size:1rem;margin-bottom:2.5rem}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-top:1.5rem;text-align:left}
.topic-card{
  background:var(--bg2);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r);padding:1.4rem 1.2rem;cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.topic-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.topic-card:hover{border-color:var(--tc)}
.topic-icon{font-size:2.6rem;display:block;margin-bottom:.6rem}
.topic-card h3{font-size:1.05rem;font-weight:800;margin-bottom:.3rem}
.topic-card p{font-size:.78rem;color:var(--text2);line-height:1.6}
.topic-badge{
  position:absolute;top:.8rem;right:.8rem;
  font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:20px;
  background:rgba(255,255,255,.08);color:var(--text2)
}
.topic-card.done .topic-badge{background:rgba(34,197,94,.2);color:#4ade80}

/* ── 퀴즈 화면 ── */
#quiz{padding-top:2rem}
.quiz-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.8rem}
.back-btn{background:rgba(255,255,255,.07);border:none;border-radius:50%;width:40px;height:40px;
  font-size:1.1rem;cursor:pointer;color:var(--text);transition:background .2s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.14)}
.quiz-topic{font-weight:800;font-size:1.1rem}
.progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;flex:1}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f97316,#a855f7);transition:width .4s}
.q-num{font-size:.8rem;color:var(--text2);white-space:nowrap}

.scene-box{
  background:var(--bg2);border-radius:var(--r);padding:1.6rem 1.4rem;
  margin-bottom:1.4rem;border:1px solid rgba(255,255,255,.07);
}
.scene-icon{font-size:3.5rem;text-align:center;display:block;margin-bottom:.8rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.scene-text{font-size:.9rem;color:var(--text2);line-height:1.8;text-align:center}
.scene-text strong{color:var(--text)}

.question{font-size:1.15rem;font-weight:700;line-height:1.6;margin-bottom:1.2rem;text-align:center}

.choices{display:grid;gap:.75rem}
.choice{
  background:var(--bg3);border:1.5px solid rgba(255,255,255,.08);
  border-radius:12px;padding:1rem 1.2rem;cursor:pointer;font-size:.95rem;
  text-align:left;color:var(--text);transition:border-color .15s,background .15s;
  display:flex;align-items:center;gap:.75rem;
}
.choice:hover:not(.disabled){background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.2)}
.choice.correct{background:rgba(34,197,94,.12);border-color:#22c55e;color:#4ade80}
.choice.wrong{background:rgba(239,68,68,.12);border-color:#ef4444;color:#f87171}
.choice.disabled{cursor:default}
.choice-letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.choice.correct .choice-letter{background:rgba(34,197,94,.3)}
.choice.wrong .choice-letter{background:rgba(239,68,68,.3)}

.fact-box{
  background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.25);
  border-radius:12px;padding:1rem 1.2rem;margin-top:1.2rem;
  font-size:.88rem;line-height:1.8;color:var(--text2);
  animation:fadeIn .4s ease
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fact-box strong{color:#fbbf24}
.next-btn{
  width:100%;margin-top:1.2rem;padding:1rem;border-radius:12px;border:none;
  background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;
  font-size:1rem;font-weight:800;cursor:pointer;transition:opacity .2s
}
.next-btn:hover{opacity:.87}

/* ── 주제 소개(영상) 화면 ── */
#intro{text-align:center;padding-top:3rem}
.intro-icon{font-size:5rem;display:block;margin-bottom:.6rem;animation:busFloat 2.5s ease-in-out infinite}
.intro-name{font-size:2rem;font-weight:900;margin-bottom:.3rem}
.intro-desc{color:var(--text2);font-size:.95rem;margin-bottom:1.6rem}
.video-box{position:relative;width:100%;padding-top:56.25%;border-radius:var(--r);overflow:hidden;background:#000}
.video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.no-vid{background:var(--bg2);border-radius:var(--r);padding:2.5rem 1rem;color:var(--text2);font-size:.9rem;margin-bottom:1.4rem}
.vid-nav{display:flex;align-items:center;justify-content:space-between;margin:.6rem 0 1.2rem;gap:.5rem}
.vid-nav-btn{background:rgba(255,255,255,.1);border:none;color:var(--text);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;flex-shrink:0}
.vid-nav-btn:disabled{opacity:.25;cursor:default}
.vid-counter{font-size:.78rem;color:var(--text2)}
.intro-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-start{padding:.9rem 2.2rem;border-radius:100px;border:none;background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;font-size:1rem;font-weight:800;cursor:pointer}
.btn-back2{padding:.9rem 1.6rem;border-radius:100px;border:none;background:var(--bg3);color:var(--text);font-size:1rem;font-weight:700;cursor:pointer}
.story-section{background:var(--bg2);border-radius:var(--r);padding:1.4rem 1.2rem;margin-bottom:1.4rem;border:1px solid rgba(255,255,255,.07);text-align:left}
.story-section h4{font-size:1rem;font-weight:900;margin-bottom:1rem;color:#7dd3c8}
.story-block{margin-bottom:1rem}
.story-block .s-label{font-size:.85rem;font-weight:800;margin-bottom:.3rem;color:var(--text)}
.story-block p{font-size:.82rem;color:var(--text2);line-height:1.9}
.s-intro{font-size:.88rem;color:var(--text2);margin-bottom:1rem;line-height:1.8}
.story-block.tip{background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.25);border-radius:10px;padding:.8rem 1rem;margin-top:.5rem}
.story-block.tip .s-label{color:#fbbf24}

/* ── 수료증 모달 ── */
#cert-modal{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);padding:1rem}
.cert-box{
  background:linear-gradient(160deg,#001a2c 0%,#0a2a3a 60%,#0d3347 100%);
  border:2px solid rgba(234,179,8,.5);border-radius:24px;padding:2.5rem 2rem;
  max-width:480px;width:100%;text-align:center;
  box-shadow:0 0 60px rgba(234,179,8,.2),0 0 120px rgba(234,179,8,.1);
  animation:certIn .5s cubic-bezier(.175,.885,.32,1.275)
}
@keyframes certIn{from{transform:scale(.6) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.cert-badge{font-size:4.5rem;display:block;margin-bottom:.3rem;animation:badgeSpin 1s ease .2s both}
@keyframes badgeSpin{from{transform:rotate(-180deg) scale(0)}to{transform:rotate(0) scale(1)}}
.cert-stars-row{font-size:1.4rem;letter-spacing:.15rem;margin-bottom:1rem}
.cert-title{font-size:2rem;font-weight:900;margin:.3rem 0 .2rem;
  background:linear-gradient(135deg,#fbbf24,#f97316,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cert-sub{font-size:.85rem;color:#94d2bd;letter-spacing:.12em;font-weight:700;margin-bottom:1.2rem}
.cert-deco{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:1.2rem}
.cert-deco::before,.cert-deco::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(234,179,8,.4),transparent)}
.cert-deco span{color:#fbbf24;font-size:.9rem}
.cert-body{font-size:.9rem;color:var(--text2);line-height:1.9;margin-bottom:1.5rem}
.cert-topics{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1.5rem}
.cert-topic-chip{font-size:.75rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.25rem .7rem;color:var(--text2)}
.cert-seal{font-size:.8rem;color:#fbbf24;font-weight:700;margin-bottom:1.4rem;opacity:.85}
.cert-close{padding:.75rem 2rem;border-radius:100px;border:none;background:linear-gradient(135deg,#f97316,#a855f7);color:#fff;font-size:.95rem;font-weight:800;cursor:pointer;width:100%}
/* ── 결과 화면 ── */
#result{text-align:center;padding-top:3rem}
.result-icon{font-size:5rem;display:block;margin-bottom:1rem;animation:spin .5s ease}
@keyframes spin{from{transform:rotate(-20deg) scale(.8)}to{transform:rotate(0) scale(1)}}
#result h2{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.stars{font-size:2.5rem;letter-spacing:.2rem;margin:1rem 0}
.score-txt{color:var(--text2);font-size:1rem;margin-bottom:2rem}
.result-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.result-btn{padding:.75rem 1.8rem;border-radius:100px;border:none;font-size:.95rem;font-weight:700;cursor:pointer}
.btn-retry{background:var(--bg3);color:var(--text)}
.btn-home{background:linear-gradient(135deg,#f97316,#a855f7);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- ── 홈 ── -->
<div class="wrap" id="home">
  <span class="bus-emoji">🚌</span>
  <h1>과학탐험대</h1>
  <p class="sub">매직스쿨버스를 타고 떠나는 신비한 과학 여행!<br>11가지 주제, 주제마다 5문제 도전!</p>
  <a href="story.html" style="display:inline-block;margin-bottom:1.5rem;padding:.65rem 1.6rem;border-radius:100px;background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.4);color:#c084fc;font-size:.9rem;font-weight:700;text-decoration:none">📖 과학 설명 먼저 보기</a>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- ── 주제 소개 ── -->
<div class="wrap hidden" id="intro">
  <span class="intro-icon" id="intro-icon"></span>
  <h2 class="intro-name" id="intro-name"></h2>
  <p class="intro-desc" id="intro-desc"></p>
  <div id="video-area"></div>
  <div id="story-area"></div>
  <div class="intro-btns">
    <button class="btn-back2" onclick="goHome()">← 돌아가기</button>
    <button class="btn-start" onclick="beginQuiz()">퀴즈 시작! 🚀</button>
  </div>
</div>

<!-- ── 퀴즈 ── -->
<div class="wrap hidden" id="quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="quiz-topic" id="quiz-topic-name"></span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="q-num" id="q-num"></span>
  </div>
  <div class="scene-box">
    <span class="scene-icon" id="scene-icon"></span>
    <p class="scene-text" id="scene-text"></p>
  </div>
  <p class="question" id="question-text"></p>
  <div class="choices" id="choices"></div>
  <div class="fact-box hidden" id="fact-box"></div>
  <button class="next-btn hidden" id="next-btn" onclick="nextQ()">다음 →</button>
</div>

<!-- ── 수료증 모달 ── -->
<div id="cert-modal" class="hidden">
  <div class="cert-box">
    <div class="cert-stars-row">🌟🌟🌟🌟🌟🌟🌟🌟🌟🌟</div>
    <span class="cert-badge">🏅</span>
    <h2 class="cert-title">주니어 과학 대장</h2>
    <p class="cert-sub">JUNIOR SCIENCE EXPLORER</p>
    <div class="cert-deco"><span>✦ 매직스쿨버스 과학탐험대 ✦</span></div>
    <p class="cert-body">과학탐험대의 <strong style="color:#fbbf24">11가지 주제</strong>를 모두 탐험하고<br>퀴즈를 완주하였기에 이 상장을 드립니다.<br><br>호기심 넘치는 탐험가 정신으로<br>과학의 세계를 빛내 주세요! 🚌💫</p>
    <div class="cert-topics" id="cert-topics"></div>
    <p class="cert-seal">🚌 매직스쿨버스 탐험대장 드림 · 2026</p>
    <button class="cert-close" onclick="closeCert()">🎉 닫기</button>
  </div>
</div>

<!-- ── 결과 ── -->
<div class="wrap hidden" id="result">
  <span class="result-icon" id="result-icon"></span>
  <h2 id="result-title"></h2>
  <div class="stars" id="result-stars"></div>
  <p class="score-txt" id="result-score"></p>
  <div class="result-btns">
    <button class="result-btn btn-retry" onclick="retryTopic()">다시 도전 🔄</button>
    <button class="result-btn btn-home" onclick="goHome()">다른 주제 탐험 🚌</button>
  </div>
</div>

<script>
// ── 별 배경 ──
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,stars=[];
function resizeCanvas(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,a:Math.random()}))}
function drawStars(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(drawStars)}
window.addEventListener('resize',resizeCanvas);resizeCanvas();drawStars();

// ── 주제 데이터 ──
const TOPICS = [
  {
    id:'space', icon:'🚀', name:'우주 탐험', color:'#3b82f6',
    desc:'태양계 · 별 · 블랙홀',
    tip:'<strong>질문 던지기:</strong> "달이 매일 모양이 바뀌는 것 혹시 알았어?", "태양을 맨눈으로 보면 왜 안 될까?" 같은 질문으로 호기심을 불러일으켜 주세요.<br><br><strong>연결하기:</strong> "수업에서 배운 동그란 모양(구)이 지구, 달, 태양 모두 같은 모양이란다. 우주도 수학으로 설명돼!"',
    vids:[{id:'Td_A9H69eE8',desc:'우리의 대장님! 태양 이야기'},{id:'e8YzKyot4Pc',desc:'태양계 행성 탐험'},{id:'ya6Ko9bF5v8',desc:'밤하늘의 별 이야기'},{id:'osSkJuohjM8',desc:'우주의 신비로운 세계'},{id:'whSAgISrGME',desc:'블랙홀의 비밀'},{id:'sePqPIXMsAc',desc:'우주 탐험 이야기'},{id:'NIn9IQwnuvA',desc:'목성에 빠지면 어떻게 될까요?',storyHtml:`<h4>📖 🪐 만약 우리가 거대한 목성으로 슝~ 떨어진다면?</h4>
<p class="s-intro">태양계에서 가장 덩치가 큰 대장 행성, 목성! 만약 우주복을 입고 목성 속으로 쏙 들어간다면 어떤 일이 벌어질까? 선생님이랑 같이 탐험을 시작해보자!</p>
<div class="story-block"><div class="s-label">🕳️ 바닥이 없는 행성</div><p>지구는 땅이 있어서 발을 딛고 설 수 있지? 하지만 목성은 거대한 가스 덩어리야. 발을 내딛는 순간 끝도 없이 아래로 아래로 계속 떨어지게 된단다. 마치 끝이 없는 미끄럼틀을 타는 것 같을 거야!</p></div>
<div class="story-block"><div class="s-label">🌀 무시무시한 폭풍, 대적점</div><p>목성에는 지구보다 더 큰 빨간 눈 모양의 폭풍이 있어. 여기선 바람이 너무 세게 불어서 우리를 휘리릭 날려버릴지도 몰라. 하지만 걱정 마, 우리에겐 튼튼한 상상 우주복이 있으니까!</p></div>
<div class="story-block"><div class="s-label">🔥 점점 뜨거워지고 무거워져</div><p>깊이 들어갈수록 공기가 우리를 꾹꾹 누르는 힘(압력)이 엄청나게 세져. 온도는 점점 뜨거워져서 마치 거대한 오븐 속에 들어온 것 같을 거야. 결국 목성의 중심에는 아주 단단하고 뜨거운 핵이 숨어 있단다.</p></div>
<p class="s-intro" style="margin-top:.8rem">목성은 정말 아름답지만, 멀리서 바라볼 때 가장 멋진 행성인 것 같지 않니? 우리 지구처럼 발을 딛고 살 수 있는 땅이 있다는 게 얼마나 감사한 일인지 알게 될 거야!</p>`,
tip:'이 영상을 보여주실 때 제목을 <strong>"목성 탐험대: 목성에 떨어지면?"</strong>이라고 소개해 주시면 아이들이 훨씬 호기심을 가질 거예요.<br><br>혹시 아이들이 <strong>"그럼 목성 말고 다른 행성에 떨어지면요?"</strong>라고 물어본다면 토성이나 화성 영상도 연결해서 보여주시면 최고의 우주 수업이 될 것 같습니다!',
qs:[
  {scene:'🪐',sceneText:'버스가 목성에 도착했어요! 내리려고 했더니 발이 닿을 땅이 없네요?',
   q:'목성에는 발을 딛고 설 수 있는 \'땅\'이 있을까요?',
   choices:['네, 아주 넓은 운동장이 있어요','아니요, 목성은 가스로 되어 있어서 계속 아래로 떨어져요','네, 하지만 너무 미끄러워서 스케이트를 타야 해요'],ans:1,
   fact:'목성은 <strong>가스 행성</strong>이라 지구처럼 딱딱한 땅이 없답니다! 발을 내딛는 순간 끝도 없이 아래로 계속 떨어지게 돼요.'},

]},{id:'MY7REwEGS0I',desc:'만약 달이 사라진다면?',storyHtml:`<h4>📖 🌙 만약 달이 사라진다면 어떻게 될까?</h4>
<p class="s-intro">우리가 매일 밤 보는 달이 갑자기 펑! 하고 사라져버린다면 지구에는 어떤 일이 생길까? 같이 상상해보자!</p>
<div class="story-block"><div class="s-label">🌑 밤이 더 캄캄해져</div><p>달은 태양빛을 받아서 우리에게 빛을 보내줘. 달이 없어지면 밤이 훨씬 더 어두워지고, 별들만 반짝반짝 빛날 거야. 손전등 없이 밖에 나가면 아무것도 안 보일지도 몰라!</p></div>
<div class="story-block"><div class="s-label">🌊 바다 파도가 달라져</div><p>달은 보이지 않는 힘(중력)으로 바닷물을 잡아당겨서 밀물과 썰물을 만들어. 달이 사라지면 바다의 파도가 약해지고, 해변이 완전히 달라질 거야!</p></div>
<div class="story-block"><div class="s-label">🌍 지구가 비틀비틀</div><p>달은 지구가 너무 기울거나 흔들리지 않도록 균형을 잡아주는 역할도 해. 달이 없어지면 지구가 조금씩 비틀거려서 계절이 엄청나게 변할 수도 있대!</p></div>
<div class="story-block"><div class="s-label">🔭 달 탐험가 놀이</div><p>오늘 밤엔 달을 찾아봐! 둥글둥글 보름달인지, 반쪽짜리 반달인지, 눈썹처럼 얇은 초승달인지 관찰해보자. 달이 있어서 우리 지구가 얼마나 행복한지 느껴볼 수 있을 거야!</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/shorts/MY7REwEGS0I" target="_blank">What Would Happen if The Moon Disappears? - Peekaboo Kidz</a></p>`,
tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"달은 우리 지구의 가장 친한 짝꿍이야! 달이 없으면 지구가 얼마나 힘들어질지 상상해봐. 오늘 밤엔 달님에게 \'고마워!\' 하고 인사해 볼까?"'
},{id:'-3hYw1Fg5us',desc:'엘리베이터를 타고 달에 갈 수 있다면?',storyHtml:`<h4>📖 🚀 엘리베이터를 타고 달나라로! (Space Elevator)</h4>
<p class="s-intro">우리 아파트 엘리베이터가 달까지 연결되어 있다면 어떨까? 옴섬(AumSum)이랑 같이 달까지 신나는 엘리베이터 여행을 떠나보자!</p>
<div class="story-block"><div class="s-label">🎒 우주 여행 준비 완료!</div><p>옴섬은 맛있는 간식과 물통, 행운의 모자를 챙겨서 엘리베이터에 탔어. "슈욱~" 문이 닫히더니 엄청나게 빠른 속도로 위로 위로 올라가기 시작했단다!</p></div>
<div class="story-block"><div class="s-label">🌍 창밖으로 보이는 지구</div><p>높이 올라갈수록 도시, 숲, 커다란 바다가 점점 작아 보였어. 마치 개미처럼 조그맣게 보이는 집들! 우리가 사는 지구가 이렇게 아름다운 곳이었구나 하고 옴섬은 깜짝 놀랐단다.</p></div>
<div class="story-block"><div class="s-label">☄️ 돌발 상황 — 운석 공격!</div><p>갑자기 쌩쌩 우주 돌멩이(운석)들이 날아왔어! 옴섬은 얼른 '비상 방어막' 레버를 힘차게 당겼지. 그러자 반짝이는 파란 방어막이 생겨나서 돌멩이들을 "통~ 통~" 튕겨냈단다!</p></div>
<div class="story-block"><div class="s-label">🌕 드디어 달에 도착!</div><p>엘리베이터 문이 열리고, 옴섬은 먼지가 폴폴 날리는 달 표면에 발을 내디뎠어. 저 멀리 파랗게 빛나는 지구를 바라보며 "우리 지구 정말 예쁘다!"라고 외쳤지!</p></div>
<p class="s-intro" style="margin-top:.8rem">📺 영상 다시 보기: <a href="https://www.youtube.com/shorts/-3hYw1Fg5us" target="_blank">What if we could go to the Moon using an Elevator? - It's AumSum Time</a></p>`,

},{id:'PCxjuDePdCI',desc:'🎵 태양계 행성 노래'},{id:'BQvo7vyCmuE',desc:'달의 모양은 왜 바뀔까요? (Phases of the Moon)'},{id:'4srrN7uUAsU',desc:'🎵 Moon Song'}],
    storyHtml:`<h4>📖 ☀️ 우리의 대장님! 태양 이야기 (Our Sun)</h4>
<p class="s-intro">하늘 높이 떠 있는 저 뜨거운 태양은 사실 거대한 '가스 공'이라는 거, 믿겨지니?</p>
<div class="story-block"><div class="s-label">☀️ 우주에서 가장 큰 불공</div><p>태양은 우리 지구보다 훨씬, 훨씬 더 커. 지구가 100만 개나 들어갈 수 있을 정도지!</p></div>
<div class="story-block"><div class="s-label">🌟 빛과 열의 선물</div><p>태양이 없다면 지구는 꽁꽁 얼어붙은 얼음 나라가 될 거야. 태양 덕분에 식물들이 쑥쑥 자라고 우리도 따뜻하게 지낼 수 있는 거란다.</p></div>
<div class="story-block"><div class="s-label">⭐ 우리의 대장 별</div><p>태양은 사실 우주에 있는 수많은 '별' 중 하나야. 하지만 우리 지구와 가장 가깝기 때문에 우리에게 가장 소중한 대장 별이 되었지!</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🌙 달에는 공기가 있을까요? (The Moon)</h4>
<p class="s-intro">밤하늘에 예쁘게 뜬 달! 만약 우리가 우주선을 타고 달에 가면 어떤 일이 벌어질까요?</p>
<div class="story-block"><div class="s-label">🤫 조용한 세상</div><p>달에는 공기가 없어요. 그래서 아무리 크게 소리를 질러도 소리가 들리지 않는 아주 조용한 곳이랍니다.</p></div>
<div class="story-block"><div class="s-label">🦘 깡충깡충 점프</div><p>달은 지구보다 당기는 힘(중력)이 약해요. 그래서 한 번만 살짝 뛰어도 건물 2층 높이까지 붕~ 날아오를 수 있어요!</p></div>
<div class="story-block"><div class="s-label">👨‍🚀 우주복은 필수</div><p>공기도 없고 햇빛이 너무 뜨겁거나 차갑기 때문에, 달에 갈 때는 꼭 튼튼한 우주복을 입어야 한답니다.</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🪐 목성에 빠지면 어떻게 될까요? (What if you fell into Jupiter?)</h4>
<p class="s-intro">태양계에서 가장 덩치가 큰 대장 행성, 목성! 만약 목성 속으로 쏙 들어간다면 어떤 일이 벌어질까?</p>
<div class="story-block"><div class="s-label">🕳️ 바닥이 없는 행성</div><p>지구는 땅이 있어서 발을 딛고 설 수 있지? 하지만 목성은 거대한 가스 덩어리야. 발을 내딛는 순간 끝도 없이 아래로 계속 떨어지게 된단다. 끝이 없는 미끄럼틀을 타는 것 같을 거야!</p></div>
<div class="story-block"><div class="s-label">🌀 무시무시한 폭풍, 대적점</div><p>목성에는 지구보다 더 큰 빨간 눈 모양의 폭풍이 있어. 여기선 바람이 너무 세게 불어서 우리를 휘리릭 날려버릴지도 몰라. 이것을 '대적점'이라고 부르는데, 수백 년 동안 계속 불고 있대!</p></div>
<div class="story-block"><div class="s-label">🔥 점점 뜨거워지고 무거워져</div><p>깊이 들어갈수록 공기가 우리를 꾹꾹 누르는 힘(압력)이 엄청나게 세지고, 온도는 점점 뜨거워져. 결국 목성의 중심에는 아주 단단하고 뜨거운 핵이 숨어 있단다.</p></div>`,

      storyHtml:`<h4>📖 🧠 우리 몸의 똑똑한 지휘관, 뇌 이야기!</h4>
<p class="s-intro">우리 몸 안에는 아주 특별한 '슈퍼컴퓨터'가 들어있어. 바로 머릿속에 있는 뇌란다. 뇌는 우리가 잠을 잘 때도, 수학 문제를 풀 때도 쉬지 않고 일하는 아주 부지런한 지휘관이야!</p>

<div class="story-block"><div class="s-label">🗄️ 기억의 보관소</div><p>어제 먹은 맛있는 간식, 친구와 놀았던 즐거운 시간들을 뇌는 차곡차곡 저장해 둔단다. 뇌가 없으면 우리는 이름도, 집 주소도 다 잊어버릴지도 몰라. 뇌는 정말 대단한 기억 창고지?</p></div>
<div class="story-block"><div class="s-label">😊 기분을 조절해요</div><p>우리가 기뻐서 웃거나 슬퍼서 눈물이 나는 것도 뇌가 하는 일이야. 뇌를 튼튼하게 하려면 맛있는 음식을 골고루 먹고 잠도 푹 자야 해!</p></div>`,
      tip:'이 영상은 아이들이 <strong>"나는 왜 생각을 할까?"</strong>라는 궁금증을 가질 때 보여주면 정말 좋습니다.<br><br>특히 수학 문제를 풀 때 <strong>"지금 너희들의 뇌가 아주 열심히 운동하고 있는 거야!"</strong>라고 응원해 주시면 아이들이 더 뿌듯해할 거예요!',
      qs:[
        {scene:'🧠',sceneText:'버스가 머릿속으로 쏙 들어왔어요! 수많은 신호들이 번개처럼 빠르게 오가고 있어요.',
         q:'우리 몸의 모든 움직임을 조절하고 명령을 내리는 \'지휘관\'의 이름은 무엇일까요?',
         choices:['배꼽','뇌','엉덩이'],ans:1,

        {scene:'🗄️',sceneText:'뇌의 기억 창고에 도착했어요! 오늘 배운 것들이 차곡차곡 저장되고 있어요.',

        {scene:'🌟',sceneText:'뇌 탐험을 마쳤어요! 이제 뇌를 건강하게 키우는 방법을 배워봐요.',

      ]},{id:'3pjkQcQBTtc',desc:'몸속 미끄럼틀! 소화 기관 여행',
      storyHtml:`<h4>📖 🍇 길버트 포도와 함께 떠나는 몸속 미끄럼틀 탐험!</h4>
<p class="s-intro">안녕, 꼬마 탐험가! 오늘은 우리가 맛있는 음식을 먹었을 때, 우리 몸 안에서 어떤 신기한 일이 벌어지는지 '길버트'라는 포도 친구와 함께 여행을 떠나볼 거야. 준비됐니? 입을 크게 벌리고 "아~" 해봐!</p>
<div class="story-block"><div class="s-label">👄 1. 입: 소화 기계의 입구! [00:32]</div><p>음식물이 입속으로 들어오면 여행이 시작돼!<br>• 치아 형님: 딱딱한 이빨들이 음식을 잘게 잘게 부숴줘. [01:25]<br>• 침 홍수: 입속에서 침이 섞이면서 음식을 부드럽게 만들어준단다. 우리가 1년 동안 만드는 침은 욕조 두 개를 가득 채울 정도래! [01:11]</p></div>
<div class="story-block"><div class="s-label">🎢 2. 식도: 꿀렁꿀렁 미끄럼틀! [02:13]</div><p>입을 통과하면 길고 좁은 미끄럼틀인 <strong>'식도'</strong>가 나와. 근육들이 꿀렁꿀렁 움직이면서 음식물을 아래로 밀어준단다. [02:37]</p></div>
<div class="story-block"><div class="s-label">🧪 3. 위: 보글보글 마법의 주머니! [03:01]</div><p>식도를 지나면 튼튼한 주머니인 <strong>'위'</strong>에 도착해. 여기서는 아주 강한 <strong>'위산'</strong>이라는 액체가 나와서 음식을 죽처럼 걸쭉하게 만들어버려. [03:23] 아주 튼튼한 소화 공장이지!</p></div>
<div class="story-block"><div class="s-label">🐍 4. 소장: 아주 긴 꼬불꼬불 터널! [03:55]</div><p>이제 <strong>'소장(작은창자)'</strong>이라는 곳으로 가보자. 여기는 무려 6미터나 될 정도로 아주 길어! 기린의 키만큼 길단다. [04:14]<br>이곳에서는 우리 몸에 꼭 필요한 영양분들을 쏙쏙 흡수해. 간에서 만든 <strong>'담즙'</strong>이라는 액체가 소화를 도와준단다. [04:35]</p></div>
<div class="story-block"><div class="s-label">💩 5. 대장: 마지막 변신, 응가 공장! [05:03]</div><p>드디어 마지막 코스, <strong>'대장(큰창자)'</strong>이야. 여기에는 우리 몸을 도와주는 착한 세균 친구들이 아주 많이 살고 있어. [05:23] 여기서 음식물에 남은 물기를 쏙 빼면, 드디어 우리가 아는 <strong>'응가'</strong>가 완성된단다! [06:24]</p></div>
<div class="story-block"><div class="s-label">🚽 6. 직장과 항문: "이제 나갈 시간이야!" [07:15]</div><p>응가가 다 만들어지면 엉덩이 근처에 있는 <strong>'직장'</strong>이라는 방에 모여. [07:15] 여기서 뇌한테 "똑똑, 화장실 가고 싶어요!"라고 신호를 보내면, 우리는 화장실로 달려가서 시원하게 여행을 마무리하게 되는 거지! [07:31]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=3pjkQcQBTtc" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: A Journey Inside Your Body - BRIGHT SIDE</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리가 먹은 음식이 이렇게 긴 여행을 거쳐서 우리를 튼튼하게 만들어준단다. 길버트 포도처럼 음식물들이 우리 몸속에서 열심히 일할 수 있게, 골고루 맛있게 먹는 게 중요하겠지?" 🥗💪'},
    {id:'VwrsL-lCZYo',desc:'소화 공장 탐험! 음식이 에너지로 변하는 방법',
      storyHtml:`<h4>📖 🎢 클로이와 함께 떠나는 몸속 소화 공장 탐험!</h4>
<p class="s-intro">안녕, 꼬마 탐험가! 오늘은 우리가 맛있는 음식을 먹으면 몸속에서 어떤 일이 일어나는지, 마법의 잠수함을 타고 직접 구경해 볼 거야. 자, 입을 크게 벌리고 출발~!</p>
<div class="story-block"><div class="s-label">👄 1. 입: 소화 공장의 정문! [01:03]</div><p>우리가 음식을 한 입 베어 물면, 소화 공장이 가동되기 시작해!<br>침 공격: 입속에 있는 침은 음식을 부드럽게 만들고, '효소'라는 친구들이 음식을 잘게 부수기 시작한단다. [01:36]</p></div>
<div class="story-block"><div class="s-label">🎢 2. 식도: 쭈욱 미끄럼틀! [01:45]</div><p>입을 지난 음식은 목구멍 뒤에 있는 긴 통로인 <strong>'식도'</strong>를 타고 내려가. 여긴 아주 긴 미끄럼틀 같아! [01:45]</p></div>
<div class="story-block"><div class="s-label">🧪 3. 위: 보글보글 마법 주스 공장! [02:06]</div><p>드디어 <strong>'위'</strong>에 도착했어! 위는 아주 튼튼한 주머니 같아.<br>• 위액: 여기서는 오렌지 주스 같은 '위액'이 나와서 음식을 죽처럼 걸쭉하게 만들어버려. [02:17]<br>• 꿀렁꿀렁: 위가 음식을 섞고 으깨면, 음식은 이제 '액체 죽' 같은 모습이 된단다. [02:23]</p></div>
<div class="story-block"><div class="s-label">🐍 4. 소장: 영양분 보물찾기! [03:15]</div><p>이제 가늘고 긴 <strong>'소장(작은창자)'</strong>으로 갈 시간이야.<br>여기서는 간에서 만든 <strong>'담즙'</strong>과 췌장에서 만든 즙들이 나와서 단백질, 지방, 탄수화물을 더 작게 쪼개. [03:34]<br>소장은 우리 몸에 꼭 필요한 비타민과 미네랄을 쏙쏙 흡수해서 우리를 튼튼하게 만들어준단다! [03:41]</p></div>
<div class="story-block"><div class="s-label">💩 5. 대장: 마지막 물기 꽉 짜기! [03:51]</div><p>영양분을 다 뺀 나머지는 <strong>'대장(큰창자)'</strong>으로 가. 대장은 남은 음식에서 물과 소금을 흡수하는 중요한 일을 해. [04:08]<br>이제 몸에 필요 없는 찌꺼기들만 남게 되는데, 이게 바로 우리가 아는 <strong>'응가'</strong>가 된단다! [04:17]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=VwrsL-lCZYo" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: How the Digestive System Works - Nemours KidsHealth</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리가 먹은 피자 한 조각이 우리 몸속을 여행하면서 우리가 뛰어놀 수 있는 힘을 만들어준단다! 우리 몸속 소화 공장 친구들이 열심히 일할 수 있게, 오늘도 맛있는 음식을 골고루 잘 먹기로 약속하자!" 🥦🍗'},
    {id:'_eVG45_iF9U',desc:'심장 속 네 개의 방 탐험!',
      storyHtml:`<h4>📖 💓 우리 몸의 엔진, 심장 이야기!</h4>
<p class="s-intro">안녕, 꼬마 탐험가! 우리 가슴에 손을 한번 얹어볼까? "두근두근" 소리가 들리지? 이건 우리 몸속에서 가장 부지런한 펌프인 <strong>'심장'</strong>이 열심히 일하고 있는 소리야. 심장 속으로 함께 들어가 보자!</p>
<div class="story-block"><div class="s-label">💓 1. 심장은 우리 몸의 엔진! [01:05]</div><p>심장은 우리가 씩씩하게 뛰어놀 수 있게 피를 온몸으로 보내주는 역할을 해. 보통 우리 주먹만한 크기지만, 힘은 아주아주 세단다! [03:24]</p></div>
<div class="story-block"><div class="s-label">🩸 2. 피를 나르는 고속도로: 혈관 [01:36]</div><p>피는 우리 몸 구석구석에 <strong>'산소'</strong>라는 선물을 배달해.<br>• 동맥: 심장에서 출발해서 온몸으로 선물을 배달하러 가는 길! [01:46]<br>• 정맥: 배달을 마치고 다시 심장으로 돌아오는 길이야. [01:46]<br>우리 발가락 끝까지 산소 선물이 잘 도착하려면 이 혈관 고속도로가 꼭 필요해! [02:00]</p></div>
<div class="story-block"><div class="s-label">🏠 3. 심장 아파트의 네 개의 방 [03:41]</div><p>심장 안에는 4개의 방이 있어. 피 친구들은 순서대로 이 방들을 통과한단다.<br>• <strong>우심방:</strong> 온몸을 돌고 온 피가 처음 들어오는 대기실이야. [04:01]<br>• <strong>우심실:</strong> 여기서 피는 <strong>'폐(허파)'</strong>로 슝~ 날아가서 새로운 산소 선물을 가득 받아와. [04:07]<br>• <strong>좌심방:</strong> 산소를 듬뿍 받은 깨끗한 피가 다시 심장으로 돌아와서 쉬는 방이야. [04:23]<br>• <strong>좌심실:</strong> 여기가 가장 힘이 센 방이야! 여기서 피를 "팍!" 밀어서 온몸으로 다시 보내준단다. [04:32]</p></div>
<div class="story-block"><div class="s-label">🚪 4. 일방통행 문, '판막' [04:14]</div><p>심장의 방들 사이에는 <strong>'판막'</strong>이라는 특별한 문이 있어. 이 문은 피가 한쪽으로만 가도록 도와주고, 거꾸로 돌아오지 못하게 막아주는 아주 중요한 문이야! [04:14]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=_eVG45_iF9U" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: How Your Heart Works - Nemours KidsHealth</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리가 숨을 쉬면 폐에서 산소를 받고, 심장이 그 산소를 피에 실어 머리부터 발가락 끝까지 보내준단다. 우리가 건강하게 자랄 수 있는 건 이 부지런한 심장 덕분이야! 심장이 더 튼튼해지도록 즐겁게 뛰어놀고 건강한 음식도 잘 먹자!" 🏃‍♂️🍎'}],
    storyHtml:`<h4>📖 🫀 우리 몸속 슈퍼 펌프! 심장 이야기 (The Heart)</h4>
<p class="s-intro">가슴에 손을 얹어보세요. 콩닥콩닥 소리가 들리나요? 우리 몸속에는 1초도 쉬지 않고 일하는 엔진이 있어요!</p>
<div class="story-block"><div class="s-label">💪 피를 보내주는 펌프</div><p>심장은 주먹만한 크기지만 힘이 아주 세요. 우리 몸 구석구석 발가락 끝까지 영양분이 담긴 피를 쏴주는 역할을 한답니다.</p></div>
<div class="story-block"><div class="s-label">🌬️ 산소 배달부</div><p>우리가 숨을 쉴 때 들어오는 산소를 피에 실어서 온몸에 전달해 줘요.</p></div>
<div class="story-block"><div class="s-label">🏃 운동하면 더 빨리!</div><p>우리가 운동장을 뛰면 심장도 더 빨리 뛰면서 "힘내라! 힘내!" 하고 에너지를 보내준답니다.</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🧠 우리 몸의 똑똑한 지휘관, 뇌 이야기!</h4>

      storyHtml:`<h4>📖 ⚡🕵️ 전기는 어떻게 흐를까? 보물찾기 탐험!</h4>
<p class="s-intro">안녕, 꼬마 공학자 친구! 우리 주변에는 전기가 흐르고 있지만, 눈으로는 볼 수 없지? 전기가 어떻게 만들어지고 움직이는지 선생님이 아주 쉽게 설명해 줄게.</p>
<div class="story-block"><div class="s-label">⚛️ 1. 세상 모든 것은 '원자'로 되어 있어! [00:20]</div><p>우리의 몸, 장난감, 책상... 이 모든 것들은 아주아주 작은 알갱이인 <strong>'원자'</strong>로 만들어졌단다. [00:27]<br>• 원자 안에는 <strong>양성자(+)</strong>와 중성자가 가운데에 찰떡처럼 붙어 있고, [00:43]<br>• 그 주변을 <strong>전자(-)</strong>라는 작은 친구들이 빛처럼 빠른 속도로 뱅글뱅글 돌고 있어. [01:09]</p></div>
<div class="story-block"><div class="s-label">🏃‍♂️ 2. 전자가 이동하면 전기가 돼요! [01:40]</div><p>• <strong>도체(금속):</strong> 구리 같은 금속은 전자들이 아주 잘 옮겨 다닐 수 있는 길이야. [01:48]<br>• <strong>부도체(고무, 유리):</strong> 고무나 유리는 전자들이 움직이지 못하게 꽉 붙잡는 방패 같은 친구들이지. [01:54]</p></div>
<div class="story-block"><div class="s-label">🔋 3. 건전지는 '밀어주는 힘'이에요! [02:32]</div><p>전선만 있다고 전기가 흐르지는 않아. 건전지(배터리)를 연결하면 <strong>'전압'</strong>이라는 힘이 생겨서, 전자들을 한쪽 방향으로 "어서 가!" 하고 밀어준단다. [03:11]<br>회로: 전자들이 건전지의 한쪽 끝에서 출발해서 전구를 지나 다시 반대쪽 끝으로 돌아오는 길을 '회로'라고 해. [02:43]</p></div>
<div class="story-block"><div class="s-label">💡 4. 전기를 쓰는 방법들 [04:39]</div><p>전자들이 전선을 타고 가다가 전구를 지나가면 빛이 나고, 저항기라는 곳을 지나가면 열이 나기도 해. [05:13]<br>자기장: 전기가 흐르는 전선을 칭칭 감으면 힘센 자석(전자석)이 되기도 한단다! [05:40]</p></div>
<div class="story-block"><div class="s-label">🌊 5. 두 가지 전기: 직류(DC)와 교류(AC) [08:19]</div><p>• <strong>직류(DC):</strong> 건전지처럼 전자가 한 방향으로만 쭉 가는 거야. [09:03]<br>• <strong>교류(AC):</strong> 우리 집 벽에 있는 콘센트 전기처럼 전자가 앞뒤로 왔다 갔다 하며 흐르는 거야. 마치 바다의 파도 같지! [08:40]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=mc979OhitAg" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: How ELECTRICITY works - The Engineering Mindset</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 친구가 텔레비전을 볼 때, 전선 안에서는 아주 작은 전자 친구들이 빛보다 빠르게 달리기 경주를 하고 있는 거야! 전자들이 힘차게 달려준 덕분에 우리는 재미있는 만화도 볼 수 있고 예쁜 불빛도 켤 수 있는 거란다. 전기는 정말 부지런한 친구지?" ⚡🏃‍♂️'},{id:'Dx3RpXdJw2k',desc:'찌릿찌릿! 전기는 어디서 올까요?',
      storyHtml:`<h4>📖 ⚡ 찌릿찌릿! 전기는 어디서 올까요?</h4>
<p class="s-intro">안녕, 꼬마 전기 탐험가! 혹시 번개가 번쩍하는 걸 본 적 있니? 번개는 자연이 만드는 아주 힘센 전기란다. 무려 태양 표면보다 더 뜨겁대! [00:27] 하지만 우리 집에서 쓰는 전기는 다른 곳에서 만들어져서 우리에게 온단다.</p>
<div class="story-block"><div class="s-label">🔋 1. 건전지 속의 작은 전기 [01:37]</div><p>우리가 쓰는 장난감 조종기나 손전등에는 <strong>건전지(배터리)</strong>가 들어가지? [02:03]<br>건전지에는 플러스(+)와 마이너스(-) 두 개의 얼굴이 있어. 전기는 이 두 친구 사이를 뱅글뱅글 한 방향으로 돌면서 힘을 낸단다. 이걸 '직류'라고 불러. [01:48]</p></div>
<div class="story-block"><div class="s-label">☀️ 2. 햇님과 바람이 만드는 전기 [02:58]</div><p>• <strong>태양광:</strong> 지붕 위에 있는 검은 판(태양전지)은 햇빛을 받아서 전기를 만들어내. [03:23]<br>• <strong>발전소:</strong> 아주 커다란 공장(발전소)에서는 석탄이나 가스, 또는 흐르는 물과 바람을 이용해서 엄청나게 많은 전기를 만들어낸단다. [05:56]</p></div>
<div class="story-block"><div class="s-label">🔌 3. 우리 집까지 오는 전기의 긴 여행 [04:19]</div><p>발전소에서 만든 전기는 긴 전선을 타고 우리 동네까지 여행을 와. 전봇대에 달린 통(변압기)은 전기가 우리 집 가전제품에 딱 알맞은 힘으로 들어오도록 조절해 주는 아주 중요한 일을 해. [05:05]</p></div>
<div class="story-block"><div class="s-label">🎈 4. 찌릿찌릿! 정전기 놀이 [07:37]</div><p>양말을 신고 카펫 위를 걷다가 문고리를 잡으면 "찌릿!" 할 때가 있지? 이건 <strong>'정전기'</strong>라고 해. [07:46] 풍선을 머리카락에 문지르면 머리카락이 풍선에 착 달라붙는 것도 바로 이 정전기 마법 때문이란다! [08:17]</p></div>
<div class="story-block"><div class="s-label">🛡️ 5. 전기가 잘 통하는 것과 안 통하는 것 [08:38]</div><p>• <strong>도체(친구):</strong> 철, 구리, 은 같은 금속은 전기가 아주 잘 지나가. 물이나 우리 몸도 전기가 잘 통해서 번개가 칠 때는 꼭 실내에 있어야 해! [08:50]<br>• <strong>절연체(방패):</strong> 플라스틱, 고무, 유리는 전기가 지나가지 못하게 막아줘. 그래서 전선 겉은 항상 고무나 플라스틱으로 감싸져 있단다. [09:12]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=Dx3RpXdJw2k" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: Electricity for Kids - Learn Bright</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"전기는 우리 생활을 아주 편리하게 해주지만, 함부로 만지면 위험할 수 있어. 젖은 손으로 콘센트를 만지지 않고, 전선은 조심해서 다루는 멋진 어린이가 되자!" ⚡🙅‍♂️'},{id:'SK4uLmodN6A',desc:'전기로 만드는 마법 자석, 전자석!',
      storyHtml:`<h4>📖 ⚡🧲 전기로 만드는 마법 자석, 전자석 이야기!</h4>
<p class="s-intro">안녕, 꼬마 발명가 친구! 우리가 평소에 쓰는 자석은 언제나 철을 끌어당기지? 그런데 마음대로 껐다 켰다 할 수 있는 '스위치 자석'이 있다면 어떨까? [00:51]</p>
<div class="story-block"><div class="s-label">🧵 1. 전자석은 어떻게 만들까요? [00:16]</div><p>만드는 방법은 아주 간단해!<br>• 철 막대에 구리선을 칭칭 감고, [00:28]<br>• 양쪽 끝을 배터리에 연결하면 끝! [00:33]<br>이렇게 하면 구리선을 타고 전기가 흐르면서, 철 막대가 갑자기 힘센 자석으로 변신한단다. [00:41]</p></div>
<div class="story-block"><div class="s-label">🧲 2. 전자석의 신기한 점! [00:51]</div><p>• <strong>내 마음대로 껐다 켰다:</strong> 전기를 끊으면 자석의 힘이 바로 사라져. [01:00] 이게 일반 자석과 가장 큰 차이점이야!<br>• <strong>어디에 쓰일까?</strong> 우리가 학교에서 듣는 전기종(벨) 소리도 이 전자석을 이용해서 만든단다. [01:17]</p></div>
<div class="story-block"><div class="s-label">💡 영상 속 또 다른 재미있는 이야기들</div><p>• <strong>자석이 세상에서 사라진다면? [02:31]</strong> 냉장고 스티커도 다 떨어지고, 병원의 MRI 기계도 쓸 수 없게 된대. [03:06]<br>• <strong>북극과 남극은 왜 추울까? [03:39]</strong> 햇님이 비스듬하게 비춰서 에너지가 약하고, 하얀 눈이 햇빛을 튕겨내 버려서래! [04:35]<br>• <strong>건전지는 어떻게 힘을 낼까? [04:45]</strong> 안에 있는 작은 알갱이들이 한쪽으로 슝~ 이동하면서 전기를 만들어준단다. [05:04]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=SK4uLmodN6A" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: How do Electromagnets Work? - It's AumSum Time</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 친구가 좋아하는 장난감 속에도 전기로 만든 마법 자석이 숨어 있을지도 몰라! 전기가 흐르면 힘센 자석이 되고, 전기를 끄면 다시 평범한 쇠막대가 되는 게 정말 신기하지 않니?" ⚡🤖'},
    {id:'-aNpmCSZHbk',desc:'자석과 자기장의 비밀!',
      storyHtml:`<h4>📖 🧲 자석과 자기장의 비밀 이야기!</h4>
<p class="s-intro">안녕, 꼬마 과학자 친구! 혹시 자석이 쇠붙이를 가까이 가져가기만 해도 "툭!" 하고 잡아당기는 걸 본 적 있니? 그건 마법이 아니라 바로 <strong>'자기장'</strong>이라는 힘 때문이야. [00:32]</p>
<div class="story-block"><div class="s-label">🧲 1. 자석은 어떤 친구일까? [00:40]</div><p>자석은 철이나 특별한 금속들을 자기 쪽으로 끌어당기는 힘을 가진 돌이나 금속 조각을 말해. 이 힘을 <strong>'자기성'</strong>이라고 부른단다. [00:40]</p></div>
<div class="story-block"><div class="s-label">🏢 2. 자석의 세 가지 유형 [00:50]</div><p>자석에는 크게 세 종류가 있어!<br>• <strong>임시 자석:</strong> 잠시 동안만 자석이 되었다가 힘이 금방 사라지는 친구야. [00:50]<br>• <strong>영구 자석:</strong> 한 번 자석이 되면 아주 오랫동안 그 힘을 유지하는 튼튼한 친구지. [01:01]<br>• <strong>전자석:</strong> 아주아주 센 힘이 필요할 때 전기를 써서 만드는 특별한 자석이야. [01:12]</p></div>
<div class="story-block"><div class="s-label">↔️ 3. 서로 밀어내고 당기는 '극'의 비밀 [01:30]</div><p>모든 자석에는 <strong>N극(북극)</strong>과 <strong>S극(남극)</strong>, 두 개의 얼굴이 있어. [01:30]<br>• <strong>"저리 가!" (척력):</strong> 똑같은 극끼리 만나면 서로 밀어내. [01:47]<br>• <strong>"이리 와!" (인력):</strong> 서로 다른 극끼리 만나면 "착!" 하고 달라붙는단다. [02:03]</p></div>
<div class="story-block"><div class="s-label">🚫 4. 자석이 싫어하는 물건들도 있어! [02:25]</div><p>• <strong>안 붙어요:</strong> 플라스틱, 고무, 물, 유리는 자석이 잡아당길 수 없어. [02:25]<br>• <strong>잘 붙어요:</strong> 철(못, 나사), 코발트, 니켈 같은 금속들은 자석을 아주 좋아해! [02:36]</p></div>
<div class="story-block"><div class="s-label">🌍 5. 지구는 커다란 자석! [03:02]</div><p>사실 우리가 사는 이 커다란 지구도 하나의 거대한 자석이라는 사실, 알고 있었니? [03:02] 지구 안쪽에 철과 니켈이 가득 차 있어서 지구 전체에 커다란 자기장이 흐르고 있단다. [03:08]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=-aNpmCSZHbk" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: Magnets and Magnetism - Learning Junction</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"냉장고 문이 꽉 닫히는 것도, 컴퓨터 속에 정보를 저장하는 것도, 우리가 좋아하는 음악을 들려주는 스피커 속에도 자석 친구가 숨어서 열심히 일하고 있어! 오늘 우리 집 어디에 자석이 숨어 있는지 탐험가가 되어서 한번 찾아볼까?" 🕵️‍♂️🏠'}],
    storyHtml:`<h4>📖 ⚡ 찌릿찌릿! 전기는 어디서 올까? (Electricity)</h4>
<p class="s-intro">우리가 게임기를 하고, 밤에 전등을 켤 수 있게 해주는 '전기'! 이 힘은 대체 어디서 오는 걸까요?</p>
<div class="story-block"><div class="s-label">⚡ 전기는 '흐름'이에요</div><p>아주 작은 알갱이(전자)들이 긴 고속도로(전선)를 따라 엄청나게 빨리 달리는 게 바로 전기야.</p></div>
<div class="story-block"><div class="s-label">🏭 전기 공장(발전소)</div><p>거대한 바람개비를 돌리거나(풍력), 뜨거운 열을 이용해 전기를 만들어내지. 이렇게 만들어진 전기는 구불구불한 전선을 타고 우리 집 콘센트까지 여행을 온단다.</p></div>
<div class="story-block"><div class="s-label">⚠️ 주의!</div><p>전기는 힘이 아주 세서 조심해야 해. 젖은 손으로 만지면 전기가 우리 몸으로 소풍을 오려고 해서 위험할 수 있으니 꼭 조심하자!</p></div>
`,
    qs:[
      {scene:'🔋',sceneText:'버스가 전선 안으로 들어갔어요! 아주 작은 알갱이들이 엄청난 속도로 달려가고 있어요.',
       q:'전기란 무엇이 이동하는 것인가요?',
       choices:['물','빛','아주 작은 알갱이(전자)','바람'],ans:2,
       fact:'전기는 아주 작은 알갱이인 <strong>전자</strong>들이 전선이라는 고속도로를 따라 엄청나게 빨리 달리는 거예요! 그 흐름이 바로 우리가 쓰는 전기랍니다.'},
      {scene:'💡',sceneText:'전구가 켜졌어요! 필라멘트가 빨갛게 달궈지면서 빛이 납니다.',
       q:'LED가 기존 전구보다 좋은 이유는?',

       fact:'일반 전구는 전기 에너지의 겨우 5~10%만 빛으로 바꾸고 나머지는 열로 낭비해요. 반면 <strong>LED</strong>는 80~90%를 빛으로 변환합니다! 그래서 전기도 덜 쓰고 오래 사용할 수 있어요.'},

      storyHtml:`<h4>📖 🧩 세상을 만드는 마법의 퍼즐 조각, 원소 이야기!</h4>

<div class="story-block"><div class="s-label">✨ 1. 별이 보내준 선물 [00:25]</div><p>아주 아주 먼 옛날, 우주에 있는 별들이 '펑!' 하고 터지면서 수많은 퍼즐 조각들을 우주로 보내주었어. 이 조각들이 바로 '원소'야. 옛날 사람들은 금이나 은처럼 반짝이는 조각들을 먼저 발견해서 장난감이나 보석을 만들기도 했단다.</p></div>
<div class="story-block"><div class="s-label">🧪 2. 엉뚱한 과학자의 '오줌' 실험! [01:55]</div><p>옛날에 헤닝 브란트라는 아주 엉뚱한 아저씨가 있었어. 이 아저씨는 "우리 몸 안에도 금이 있지 않을까?"라고 생각했대. 그래서 노란색인 '오줌'을 잔뜩 모아서 보글보글 끓여봤어! [02:02]<br>금은 나오지 않았지만, 대신 어둠 속에서 하얗게 빛나는 <strong>'인'</strong>이라는 새로운 조각을 찾아냈단다. 정말 대단하지?</p></div>
<div class="story-block"><div class="s-label">🧩 3. 퍼즐 조각의 규칙을 찾아라! [03:03]</div><p>세상에는 너무 많은 퍼즐 조각들이 있어서 과학자들은 이걸 예쁘게 정리하고 싶어 했어.<br><br>라부아지에 아저씨: "이건 기체야, 이건 금속이야!"라고 처음으로 이름을 붙여주었어. [02:48]<br><br>도베라이너 아저씨: 비슷한 성격의 조각들을 모아봤어. 어떤 조각들은 물에 넣으면 '치익~' 소리를 내며 춤을 추기도 한대! [03:21]</p></div>
<div class="story-block"><div class="s-label">😴 4. 꿈속에서 완성된 마법의 표 [03:42]</div><p>마지막으로 멘델레예프라는 아저씨가 나타났어. 이 아저씨는 퍼즐 조각들을 어떻게 정리할지 3일 밤낮을 고민하다가 깜빡 잠이 들었어. 그런데 꿈속에서 조각들이 스스로 자리를 찾아가는 마법 같은 표를 보게 된 거야! [03:54]<br>아저씨는 잠에서 깨어나 그 표를 그렸고, 아직 찾지 못한 미래의 퍼즐 조각들이 어디에 들어갈지도 미리 맞춰놓았단다. 이게 바로 우리가 과학 시간에 배우는 <strong>'주기율표'</strong>야!</p></div>
<p style="margin-top:1rem;text-align:center">더 자세한 이야기가 궁금하면 아래 영상을 함께 봐보자!<br>📺 <a href="https://www.youtube.com/watch?v=O-48znAg7VE" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: Solving the puzzle of the periodic table</a></p>`,

    {id:'jMW_0Ro6b5c',desc:'세상을 만드는 가장 작은 알갱이, 원자!',
      storyHtml:`<h4>📖 🧱 세상을 만드는 가장 작은 알갱이, 원자 이야기!</h4>
<p class="s-intro">안녕, 꼬마 과학자 친구! 혹시 세상을 만드는 가장 작은 블록이 무엇인지 알고 있니? 그건 바로 <strong>'원자'</strong>라고 부르는 아주 작은 알갱이야. 너무 작아서 우리 눈에는 보이지 않지만, 세상 모든 곳에 숨어 있단다! [00:55]</p>

<div class="story-block"><div class="s-label">🏠 2. 원자 가족을 소개할게! [03:35]</div><p>원자 속에는 아주 작은 가족들이 모여 살고 있어.<br>• <strong>양성자 (+):</strong> 원자의 정중앙에서 플러스(+) 에너지를 뿜뿜 내뿜는 친구야. [03:56]<br>• <strong>중성자:</strong> 양성자 옆에서 든든하게 지켜주는, 화도 안 내고 웃기만 하는 친구야. [03:56]<br>• <strong>전자 (-):</strong> 원자 주변을 아주아주 빠르게 돌아다니는 장난꾸러기 마이너스(-) 친구야. [03:47]</p></div>
<div class="story-block"><div class="s-label">☁️ 3. 전자 친구는 숨바꼭질 대장! [04:41]</div><p>옛날에는 전자 친구가 행성처럼 예쁘게 길을 따라 도는 줄 알았어. [04:30] 그런데 알고 보니 전자 친구는 너무 빨라서 어디 있는지 찾기가 힘든 숨바꼭질 대장이었어! [04:52] 그냥 '전자 구름'이라는 곳 어딘가에 숨어 있단다. [04:59]</p></div>
<div class="story-block"><div class="s-label">🪄 4. 원자는 텅텅 비어 있다고? (신기한 사실!) [05:23]</div><p>놀라지 마! 원자는 사실 99.99%가 텅텅 빈 공간이래. [05:30] 만약 지구상에 있는 모든 사람의 몸속에 있는 빈 공간을 다 빼고 원자 알갱이만 꽉꽉 모으면, 전 세계 사람들이 각설탕 한 개 크기 안에 쏙 들어갈 수 있대! 정말 신기하지? [05:46]</p></div>
<p style="margin-top:1rem;text-align:center">📺 <a href="https://www.youtube.com/watch?v=jMW_0Ro6b5c" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: What Is An Atom? - The Dr. Binocs Show</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 친구가 만지는 모든 것들이 이렇게 작은 원자 친구들로 만들어져 있어. 눈에 보이지 않지만, 이 작은 친구들이 모여서 우리 친구의 예쁜 손도 만들고 맛있는 과일도 만든단다. 원자 친구들은 정말 대단한 건축가지?" 🏗️🍎'},
    {id:'e9GuJUaX0UM',desc:'원자 속 세 친구: 양성자, 전자, 중성자!',
      storyHtml:`<h4>📖 ⚛️ 원자 속에 사는 세 친구 이야기!</h4>
<p class="s-intro">안녕, 꼬마 과학자! 세상 모든 것들은 아주 작은 알갱이인 <strong>'원자'</strong>로 만들어져 있어. 그런데 이 원자 속에는 세 가지 특별한 친구들이 살고 있단다. [00:01]</p>
<div class="story-block"><div class="s-label">🍎 1. 이름을 결정하는 대장님, '양성자' (Proton) [01:08]</div><p>원자 속에 양성자 대장님이 몇 명 있느냐에 따라 원자의 이름이 바뀌어!<br>• 양성자가 1명이면 가벼운 '수소' [01:22]<br>• 양성자가 2명이면 풍선 속에 넣는 '헬륨' [01:31]<br>• 양성자가 79명이나 모이면 반짝반짝 <strong>'금'</strong>이 된단다!<br>이 양성자 대장님의 숫자를 유식한 말로 <strong>'원자 번호'</strong>라고 불러. [01:55]</p></div>
<div class="story-block"><div class="s-label">⚡ 2. 번개처럼 빠른 장난꾸러기, '전자' (Electron) [02:06]</div><p>양성자보다 훨씬 작고 몸이 가벼운 '전자' 친구는 양성자 주변을 번개 같은 속도로 뱅글뱅글 돌아다녀. [02:06]<br>자석 놀이: 양성자는 플러스(+) 힘을 가지고 있고, 전자는 마이너스(-) 힘을 가지고 있어. 그래서 서로 자석처럼 "착!" 하고 끌어당기는 <strong>'전기력'</strong>이라는 힘으로 같이 살게 된단다. [02:26]</p></div>
<div class="story-block"><div class="s-label">🔗 3. 사이좋게 묶어주는 접착제, '중성자' (Neutron) [02:57]</div><p>양성자 대장님들은 서로 플러스(+) 힘을 가지고 있어서 같이 있으면 서로 밀어내려고 해. "저리 가!" 하고 말이야. [03:00]<br>이때 중성자 친구가 나타나서 강력한 접착제 역할을 해줘. 이걸 <strong>'강한 핵력'</strong>이라고 부르는데, 양성자들이 밖으로 튕겨 나가지 않게 꽉 잡아주는 아주 고마운 친구야! [03:19] 중성자가 없으면 세상 모든 것들은 그냥 수소로 변해버릴지도 몰라. [03:44]</p></div>

      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"우리 몸속에도, 장난감 속에도 이 세 친구가 아주 많이 들어있어. 양성자 대장님이 이름을 정해주고, 중성자가 꽉 붙잡아주고, 전자 친구가 신나게 뛰어놀면서 세상을 만들고 있는 거야! 정말 대단한 친구들이지?" 🧱✨'},
    {id:'efaaNH-LbTQ',desc:'변신의 귀재! 물질의 상태',
      storyHtml:`<h4>📖 🍦 물 변신 로봇 이야기! 물질의 상태</h4>
<p class="s-intro">안녕, 꼬마 과학자 친구들! 오늘은 우리가 매일 먹는 맛있는 아이스크림 속에 숨겨진 <strong>'변신의 비밀'</strong>을 알려줄게. 준비됐니? 출발!</p>
<div class="story-block"><div class="s-label">🍦 1. 아이스크림의 비밀을 찾아라! [00:04]</div><p>친구들, 달콤한 아이스크림이 어떻게 만들어지는지 알아? 아주 차가운 곳에 두면 액체였던 우유가 꽁꽁 얼어서 우리가 좋아하는 아이스크림이 된단다! [03:48] 이처럼 세상 모든 것들은 온도에 따라 변신을 할 수 있어.</p></div>
<div class="story-block"><div class="s-label">🌧️ 2. 하늘에서 내리는 비와 눈은 형제일까? [00:12]</div><p>하늘에서 내리는 축축한 비, 보들보들한 눈, 그리고 딱딱한 우박! 이 세 가지는 사실 모두 같은 '물' 가족이야. [01:06] 온도가 어떠냐에 따라 모습만 바뀐 거란다.</p></div>
<div class="story-block"><div class="s-label">♨️ 3. 주방에서 만나는 물 변신 로봇! [01:31]</div><p>우리 집 주방은 물이 변신하기 가장 좋은 곳이야.<br><br><strong>첫 번째 변신 (기체):</strong> 냄비에 물을 담고 불을 켜면, 물이 아주 뜨거워지면서 가벼운 <strong>'수증기'</strong>로 변해 하늘하늘 위로 올라가. [02:07]<br><br><strong>두 번째 변신 (고체):</strong> 물을 얼음 틀에 넣고 냉동실에 두면, 아주 차가워져서 딱딱한 <strong>'얼음'</strong>이 되지! [03:00]<br><br><strong>세 번째 변신 (액체):</strong> 얼음이 녹거나 수증기가 다시 식으면 우리가 마시는 찰랑찰랑한 <strong>'물'</strong>이 된단다.</p></div>
<div class="story-block"><div class="s-label">🔄 4. 되돌릴 수 있는 변신 vs 못 돌아오는 변신! [05:44]</div><p>물은 얼음이 되었다가 다시 물이 될 수 있지? 이런 걸 <strong>'되돌릴 수 있는 변신(가역 변화)'</strong>이라고 해. 하지만 모든 게 다 그런 건 아니야!<br><br><strong>계란의 비밀:</strong> 액체 같은 계란을 프라이팬에 구우면 하얗고 딱딱해지지? 하지만 이 계란은 다시 액체로 돌아갈 수 없어! [05:51]<br><br><strong>종이의 비밀:</strong> 종이를 불에 태우면 까만 재가 돼버려. 이 재를 다시 하얀 종이로 만들 수는 없지. [06:50] 이런 건 <strong>'다시 돌아올 수 없는 변신(비가역 변화)'</strong>이라고 불러.</p></div>
<div class="story-block"><div class="s-label">💡 엄마/아빠와 함께하는 퀴즈! [07:05]</div><p>우리 주변에서 또 어떤 변신을 찾을 수 있을까?<br>• 주스를 얼리면 뭐가 될까? (힌트: 맛있는 하드!)<br>• 초콜릿이 햇볕에 녹으면 다시 굳힐 수 있을까?<br><br>우리 친구들도 오늘부터 주변 물건들이 어떻게 변신하는지 잘 관찰해 봐! 👋</p></div>`},{id:'QQsybALJoew',desc:'What is Matter? 물질이란 무엇일까요?',
      storyHtml:`<h4>📖 🌟 물질 탐험 이야기! What is Matter?</h4>
<p class="s-intro">안녕, 꼬마 탐험가 친구들! 오늘은 우리 주변에 있는 모든 것들에 숨겨진 아주 특별한 비밀을 알려줄게. 바로 <strong>'물질(Matter)'</strong>이라는 친구에 대한 이야기야!</p>
<div class="story-block"><div class="s-label">🌟 1. "세상은 모두 내 거야!" - 물질이 뭐예요? [01:05]</div><p>우리 친구가 읽는 책, 가지고 노는 장난감, 마시는 물, 심지어 우리가 숨 쉬는 공기까지! 세상의 모든 것들은 '물질'로 만들어져 있어. 물질인 걸 확인하려면 딱 두 가지만 기억하면 돼!<br>• 무게가 있니? (얼마나 무거운지!)<br>• 자리를 차지하니? (얼마나 큰지!)<br>공도 작은 자리를 차지하고, 커다란 태양도 아주 넓은 자리를 차지하니까 모두 물질이야! [01:48]</p></div>
<div class="story-block"><div class="s-label">🏰 2. 첫 번째 변신: 딱딱한 '고체' (Solid) [02:32]</div><p>고체 친구들은 아주 튼튼해! 모양이 쉽게 변하지 않고, 흐르지도 않아.<br>공부하는 책상, 달콤한 각설탕, 반짝이는 돌멩이가 바로 고체야. [02:41]<br>얼음도 딱딱한 고체지만, 따뜻해지면 다른 모습으로 변신할 수 있단다!</p></div>
<div class="story-block"><div class="s-label">🌊 3. 두 번째 변신: 찰랑찰랑 '액체' (Liquid) [03:05]</div><p>액체 친구들은 아주 유연해! 컵에 넣으면 컵 모양으로, 병에 넣으면 병 모양으로 변신하지.<br>우리가 마시는 물이 대표적인 액체야. [03:14]<br>물도 무게가 있을까? 물병에 물을 가득 채우면 무거워졌다가, 꿀꺽꿀꺽 다 마시면 가벼워지는 걸 보면 알 수 있지! [03:30]</p></div>
<div class="story-block"><div class="s-label">🎈 4. 세 번째 변신: 보이지 않는 '기체' (Gas) [03:40]</div><p>기체 친구는 장난꾸러기라 우리 눈에 잘 보이지 않아. 우리가 마시는 공기가 바로 기체야!<br><br><strong>실험 1: 공기도 자리를 차지할까? [04:15]</strong><br>빈 컵을 물속에 똑바로 넣으면 물이 컵 안으로 다 안 들어와. 바로 공기가 "여긴 내 자리야!" 하고 버티고 있기 때문이야. 컵을 살짝 기울이면 '보글보글' 공기 방울이 나오면서 그제야 물이 들어간단다!<br><br><strong>실험 2: 공기도 무게가 있을까? [05:04]</strong><br>풍선 두 개를 막대기 양쪽에 매달아 수평을 맞춘 다음, 한쪽 풍선에만 공기를 가득 불어넣어 봐. 공기가 든 풍선 쪽으로 막대기가 쑥 내려가! 공기도 무게가 있다는 증거지!</p></div>
<div class="story-block"><div class="s-label">💡 퀴즈 타임! [06:02]</div><p>오늘 우리가 배운 세 가지 변신 로봇 같은 모습은 무엇일까요?<br>• 딱딱한 고체<br>• 찰랑찰랑 액체<br>• 눈에 안 보이는 기체<br><br>이 세 가지만 알면 우리 친구도 이제 멋진 과학 탐험가야! 🚀</p></div>`,
      tip:'아이들이 이 영상을 보고 난 뒤, <strong>"우리 교실 안에서 \'고체\'인 물건 3개 찾아오기!"</strong> 같은 게임을 연결해 주시면 훨씬 효과적이에요.'}],
    storyHtml:`<h4>📖 🧱 세상 모든 것은 무엇으로 만들어졌을까요? (What is Matter?)</h4>
<p class="s-intro">우리 주변에 있는 모든 것들, 의자, 주스, 그리고 숨 쉬는 공기까지! 이 모든 것들을 과학자들은 '물질(Matter)'이라고 불러.</p>
<div class="story-block"><div class="s-label">🎯 물질의 두 가지 조건</div><p>물질이 되려면 두 가지 조건이 필요해! 첫째, 자리를 차지해야 해. 네가 가방에 책을 넣으면 자리가 차는 것처럼. 둘째, 무게가 있어야 해. 아주 가볍더라도 저울에 올리면 무게가 나가는 친구들이 바로 물질이야!</p></div>
<h4 style="margin-top:1.2rem;font-size:1rem;font-weight:900;color:#7dd3c8">📖 🧊 변신의 귀재! 물질의 상태 (States of Matter)</h4>
<p class="s-intro">물질은 세 가지 모습으로 변신할 수 있어! 물 하나만 봐도 알 수 있지.</p>
<div class="story-block"><div class="s-label">🧊 딱딱한 고체</div><p>얼음처럼 모양이 딱딱하게 정해져 있는 친구들이야. 입자들이 서로 꼭 껴안고 있어서 움직이지 않지. 마치 수업 시간에 집중해서 자리에 앉아 있는 우리 모습 같아!</p></div>
<div class="story-block"><div class="s-label">💧 찰랑찰랑 액체</div><p>물처럼 컵에 담으면 컵 모양으로 변하는 친구들이야. 입자들이 손을 잡고 조금씩 움직일 수 있거든. 미끄럼틀을 타고 내려오는 것처럼 자유롭지.</p></div>
<div class="story-block"><div class="s-label">💨 둥실둥실 기체</div><p>공기나 수증기처럼 눈에 잘 보이지도 않고 어디로든 날아가는 친구들이야. 입자들이 서로 멀리 떨어져서 신나게 뛰어다니고 있어. 마치 운동장에서 뛰어노는 시간 같지?</p></div>
`,

  {
    id:'ai', icon:'🤖', name:'인공지능', color:'#06b6d4',

    tip:'<strong>질문 던지기:</strong> "유튜브가 왜 내가 좋아하는 영상을 알고 추천해주는 걸까?", "인공지능이 못 하는 게 뭐가 있을까?" 함께 생각해봐요.<br><br><strong>연결하기:</strong> "AI가 배우는 데이터(정보)가 바로 수학의 통계와 그래프야. 우리가 배우는 수학이 AI의 기초가 된다는 것 알고 있었어?"',
    vids:[{id:'ttIOdAdQaUE',desc:'인공지능이란 무엇일까요?',
      storyHtml:`<h4>📖 🤖 생각하는 기계 친구, 인공지능 이야기!</h4>
<p class="s-intro">안녕, 우리 꼬마 친구! 오늘은 우리가 사는 세상에서 아주아주 똑똑한 '생각하는 기계 친구' 이야기를 해줄게. 이름은 조금 어렵지만 <strong>'인공지능(AI)'</strong>이라고 해! 🤖✨</p>
<div class="story-block"><div class="s-label">🧠 1. "지능"이 뭐예요? [01:26]</div><p>친구야, 우리가 유치원에서 가나다나 ABC를 배우고, 그 글자들로 단어를 만들고 문제를 푸는 능력을 '지능'이라고 해. 우리가 공부해서 똑똑해지는 것처럼 말이야!</p></div>
<div class="story-block"><div class="s-label">🤖 2. 기계가 공부를 한다고? '인공지능'! [01:49]</div><p>우리가 머리로 생각하는 것처럼, 로봇이나 컴퓨터도 배운 정보를 가지고 문제를 풀 수 있어. 하지만 이건 사람의 머리가 아니라 기계가 하는 거라서 <strong>'인공지능(Artificial Intelligence)'</strong>이라고 불러.<br><br>혹시 "헤이 구글"이나 "시리야"라고 불러본 적 있니? [00:53] 스스로 운전하는 자동차나, 얼굴을 보고 잠금을 해제하는 핸드폰도 모두 이 인공지능 친구가 도와주고 있는 거란다! [01:03]</p></div>
<div class="story-block"><div class="s-label">⚡ 3. 인공지능은 무엇을 잘할까요? [03:07]</div><p>인공지능 친구는 엄청나게 많은 정보를 아주아주 빠르게 읽고 정리할 수 있어!<br>• 병원에서: 아픈 사람을 빨리 낫게 도와주고, [02:44]<br>• 공장에서: 로봇이 물건을 척척 만들게 도와주고,<br>• 도로에서: 스스로 운전하는 자동차가 사고 나지 않게 길을 찾아준단다! [02:54]</p></div>
<div class="story-block"><div class="s-label">⚠️ 4. 인공지능 친구와 사이좋게 지내려면? [03:38]</div><p>인공지능은 아주 힘센 도구지만, 너무 인공지능 친구에게만 의지하면 안 돼!<br>• <strong>스스로 생각하기:</strong> 인공지능이 다 해주면 우리 몸과 마음이 게을러질 수 있어. [03:49]<br>• <strong>책임감 갖기:</strong> 인공지능을 나쁜 곳에 쓰지 않고, 사람들을 돕는 착한 일에만 써야 해. [04:32]</p></div>
<div class="story-block"><div class="s-label">✨ 신기한 이야기 (트리비아 타임!) [04:45]</div><p>아주 옛날인 1997년에 '딥블루'라는 인공지능 컴퓨터가 세계에서 체스를 제일 잘 두는 챔피언 아저씨를 이긴 적도 있대! 정말 놀랍지? [05:06]</p></div>
<p style="margin-top:1rem;text-align:center">더 궁금한 게 있다면 아래 영상을 같이 봐볼까?<br>📺 <a href="https://www.youtube.com/watch?v=ttIOdAdQaUE" target="_blank" style="color:#a78bfa;font-weight:bold">영상 보기: What is Artificial Intelligence? - Peekaboo Kidz</a></p>`,
      tip:'💡 <strong>아이에게 이렇게 말해주세요:</strong><br>"인공지능은 네가 더 멋진 세상을 만들 수 있게 도와주는 아주 똑똑한 조수 같은 친구야. 네가 이 친구를 어떻게 잘 다룰지 공부하다 보면, 나중에 더 멋진 미래를 만들 수 있을 거야!" 🚀'}],
    storyHtml:`<h4>📖 🤖 내 친구 인공지능! AI는 어떻게 생각할까요?</h4>
<p class="s-intro">엄마 휴대폰에게 '오늘 날씨 어때?'라고 물어본 적 있니? 내가 좋아할 만한 만화를 척척 찾아주는 TV를 본 적 있어? 이렇게 사람처럼 생각하고 배우는 똑똑한 기계를 바로 '인공지능(AI)'이라고 불러!</p>
<div class="story-block"><div class="s-label">📚 공부하는 기계</div><p>인공지능은 태어날 때부터 모든 걸 알지는 못해. 하지만 아주아주 많은 사진과 글을 보면서 공부한단다. 수천 장의 강아지 사진을 보고 나면, 나중에는 어떤 강아지 사진을 봐도 '이건 강아지야!'라고 맞힐 수 있게 되지.</p></div>
<div class="story-block"><div class="s-label">🔍 우리 주위에 숨어있어</div><p>인공지능은 로봇 영화에만 나오는 게 아니야. 우리가 하는 게임 속에도, 엄마가 길을 찾을 때 쓰는 내비게이션 속에도, 우리가 좋아하는 노래를 골라주는 앱 속에도 쏙쏙 숨어있단다.</p></div>
<div class="story-block"><div class="s-label">🤝 사람을 도와주는 착한 마음</div><p>인공지능은 사람이 하기 힘들거나 위험한 일을 대신 해주기도 해. 하지만 가장 중요한 건, 인공지능을 만드는 것도 사용하는 것도 바로 우리 사람들이라는 거야!</p></div>
`,
    qs:[
      {scene:'🤖',sceneText:'인공지능 친구가 인사를 해요! "안녕, 나는 AI야. 나는 어떻게 똑똑해졌는지 알아?"',
       q:'인공지능(AI)은 어떻게 똑똑해지는 걸까요?',
       choices:['잠을 푹 자고 나면 저절로 똑똑해져요','엄청나게 많은 데이터(사진, 글 등)를 보고 스스로 공부해요','마법사가 주문을 걸어주면 똑똑해져요','만들 때부터 모든 것을 다 알고 있어요'],ans:1,
       fact:'인공지능이 공부하는 과정을 <strong>머신러닝(Machine Learning)</strong>이라고 부르기도 해요! 수천, 수백만 개의 데이터를 보면서 패턴을 익히고 스스로 실력을 키워나간답니다.'},
      {scene:'🏠',sceneText:'집 안을 둘러봐요! 인공지능이 쓰이는 곳과 아닌 곳을 찾아봐요.',
       q:'우리 생활 속에서 인공지능이 쓰이는 곳이 아닌 것은?',
       choices:['내가 좋아할 만한 영상을 추천해 주는 유튜브','말을 하면 척척 알아듣는 인공지능 스피커','전기가 필요 없는 나무 빗자루','길을 알려주는 내비게이션'],ans:2,
       fact:'나무 빗자루는 스스로 생각하거나 배우는 기능이 없어서 인공지능이 아니에요! 하지만 유튜브 추천, AI 스피커, 내비게이션은 모두 <strong>인공지능 기술</strong>을 사용하고 있답니다.'},
      {scene:'🤝',sceneText:'인공지능 로봇 친구가 나타났어요! "나는 너를 어떻게 도와줄 수 있을까?" 하고 물어봐요.',
       q:'인공지능 로봇이 도와준다면 어떤 도움을 받고 싶나요?',
       choices:['내 방 청소를 대신 해주면 좋겠어요','어려운 수학 문제를 같이 고민해주면 좋겠어요','내가 심심할 때 재미있는 이야기를 들려주면 좋겠어요','위험한 일을 대신 해주면 좋겠어요'],ans:0,
       fact:'<strong>모두 멋진 생각이에요!</strong> 실제로 인공지능은 집 청소 로봇(룸바), 수학 과외 앱, 이야기를 들려주는 AI 스피커로 이미 우리 곁에 있답니다. 내가 원하는 AI를 직접 만들어볼 수도 있어요!'},
      {scene:'📸',sceneText:'인공지능이 강아지 사진을 수천 장 보고 있어요! 이제 어떤 강아지도 알아볼 수 있대요.',
       q:'인공지능이 강아지 사진을 많이 보는 이유는 무엇일까요?',
       choices:['강아지를 좋아하기 때문에','강아지 사진을 보면서 스스로 강아지를 알아보는 법을 익히기 때문에','강아지 사진이 예쁘기 때문에','시간이 남아서'],ans:1,
       fact:'인공지능은 수많은 데이터를 보면서 패턴을 익혀요. 이것을 <strong>학습(Training)</strong>이라고 해요! 충분히 학습하고 나면, 처음 보는 강아지 사진도 "강아지야!"라고 정확하게 맞힐 수 있게 된답니다.'},
      {scene:'🚗',sceneText:'스스로 달리는 자율주행 자동차를 보고 있어요! 운전사 없이도 잘 달리네요.',
       q:'인공지능이 사람 대신 할 수 있는 일로 적절한 것은?',
       choices:['친구와 진심으로 웃고 즐기기','위험한 곳에서의 구조 활동이나 반복적인 작업','엄마 아빠를 사랑하기','새로운 꿈을 꾸는 것'],ans:1,
       fact:'인공지능은 <strong>위험한 환경에서의 구조, 반복적인 작업, 방대한 데이터 분석</strong> 등 사람이 하기 힘든 일을 도와줄 수 있어요! 하지만 사랑하고 꿈꾸는 것은 사람만이 할 수 있는 특별한 능력이에요.'},
      {scene:'🌟',sceneText:'인공지능 탐험을 마쳤어요! 미래에는 더 멋진 AI 친구들이 생길 거예요.',
       q:'인공지능에서 가장 중요한 것은 무엇일까요?',
       choices:['인공지능이 사람보다 모든 것을 더 잘해야 한다','인공지능을 만들고 올바르게 사용하는 것은 사람의 역할이다','인공지능은 혼자서 모든 것을 결정해야 한다','인공지능은 학교에서 배울 필요가 없다'],ans:1,
       fact:'인공지능을 <strong>만드는 것도, 올바르게 사용하는 것도 바로 사람</strong>이에요! 우리가 인공지능을 어떻게 잘 활용하느냐에 따라 미래는 더 멋지게 변할 수 있어요. 그래서 수학과 과학 공부가 정말 중요하답니다!'},
    ]
  },
];

// ── 상태 ──
let currentTopic = null;
let currentQ = 0;
let score = 0;
let answered = false;
const done = {};

// ── 홈 렌더 ──
function renderHome(){
  const grid=document.getElementById('topic-grid');
  grid.innerHTML=TOPICS.map(t=>`
    <div class="topic-card${done[t.id]?' done':''}" style="--tc:${t.color}" onclick="startTopic('${t.id}')">
      <span class="topic-badge">${done[t.id]?'✓ 완료':'5문제'}</span>
      <span class="topic-icon">${t.icon}</span>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      ${t.vid?'<span style="font-size:.7rem;color:#a78bfa;margin-top:.5rem;display:block">▶ 영상 포함</span>':''}
    </div>
  `).join('');
}

// ── 주제 선택 → 소개 화면 ──
function startTopic(id){
  currentTopic=TOPICS.find(t=>t.id===id);
  document.getElementById('home').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.add('hidden');
  // 소개 화면 세팅
  document.getElementById('intro-icon').textContent=currentTopic.icon;
  document.getElementById('intro-name').textContent=currentTopic.name;
  document.getElementById('intro-desc').textContent=currentTopic.desc;
  const va=document.getElementById('video-area');
  const sa=document.getElementById('story-area');
  const vids=currentTopic.vids||[];
  function buildTip(tip){
    if(!tip) return '';
    return `<div class="story-block tip"><div class="s-label">💡 아이들에게 읽어주실 때 팁</div><p>${tip}</p></div>`;
  }
  function updateStory(vidObj){
    const story=(vidObj&&vidObj.storyHtml)||currentTopic.storyHtml||'';
    const tip=buildTip((vidObj&&vidObj.tip)||currentTopic.tip||'');
    sa.innerHTML='<div class="story-section">'+(story||'')+tip+'</div>';
  }
  if(vids.length){
    let vi=0;
    function renderVid(){
      const v=typeof vids[vi]==='object'?vids[vi].id:vids[vi];
      const vdesc=typeof vids[vi]==='object'?vids[vi].desc:'';
      va.innerHTML=`
        <a href="https://www.youtube.com/watch?v=${v}" target="_blank"
           style="display:block;position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4)">
          <img src="https://img.youtube.com/vi/${v}/hqdefault.jpg"
               style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;border-radius:var(--r)" alt="영상 썸네일">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);border-radius:var(--r);transition:.2s">
            <div style="width:68px;height:68px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 2px 12px rgba(0,0,0,.5)">▶</div>
          </div>
          <div style="position:absolute;bottom:.6rem;right:.7rem;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;padding:.2rem .55rem;border-radius:20px">📺 유튜브에서 보기</div>
        </a>
        ${vdesc?`<p style="font-size:.78rem;color:var(--text2);margin:.3rem 0 .6rem;text-align:center">${vdesc}</p>`:''}
        <div class="vid-nav">
          <button class="vid-nav-btn" onclick="vidPrev()" ${vi===0?'disabled':''}>‹</button>
          <span class="vid-counter">📹 ${vi+1} / ${vids.length}</span>
          <button class="vid-nav-btn" onclick="vidNext()" ${vi===vids.length-1?'disabled':''}>›</button>
        </div>
      `;
      updateStory(vids[vi]);
    }
    window.vidPrev=()=>{if(vi>0){vi--;window.currentVidIdx=vi;renderVid();}};
    window.vidNext=()=>{if(vi<vids.length-1){vi++;window.currentVidIdx=vi;renderVid();}};
    window.currentVidIdx=0;
    renderVid();
  } else {
    va.innerHTML='<div class="no-vid">📹 이 주제는 곧 영상이 추가될 예정이에요!</div>';
    updateStory(null);
  }
  document.getElementById('intro').classList.remove('hidden');
}

// ── 퀴즈 실제 시작 ──
let activeQs=[];
function beginQuiz(){
  currentQ=0; score=0; answered=false;
  // 현재 동영상의 qs 우선, 없으면 주제 qs
  const vi=window.currentVidIdx||0;
  const vids=currentTopic.vids||[];
  const vidObj=typeof vids[vi]==='object'?vids[vi]:null;
  activeQs=(vidObj&&vidObj.qs)||currentTopic.qs||[];
  const va=document.getElementById('video-area');
  va.innerHTML='';
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('quiz-topic-name').textContent=currentTopic.icon+' '+currentTopic.name;
  renderQ();
}

// ── 문제 렌더 ──
function renderQ(){
  answered=false;
  const q=activeQs[currentQ];
  const total=activeQs.length;
  document.getElementById('progress-fill').style.width=((currentQ/total)*100)+'%';
  document.getElementById('q-num').textContent=(currentQ+1)+' / '+total;
  document.getElementById('scene-icon').textContent=q.scene;
  document.getElementById('scene-text').innerHTML=q.sceneText;
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('fact-box').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  const letters=['A','B','C','D'];
  document.getElementById('choices').innerHTML=q.choices.map((c,i)=>`
    <button class="choice" onclick="choose(${i})" id="choice-${i}">
      <span class="choice-letter">${letters[i]}</span>${c}
    </button>
  `).join('');
}

// ── 답 선택 ──
function choose(idx){
  if(answered) return;
  answered=true;
  const q=activeQs[currentQ];
  const btns=document.querySelectorAll('.choice');
  btns.forEach(b=>b.classList.add('disabled'));
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if(idx===q.ans){
    score++;
    btns[idx].innerHTML='<span class="choice-letter">✓</span>'+q.choices[idx];
  } else {
    btns[q.ans].classList.add('correct');
  }
  const fb=document.getElementById('fact-box');
  fb.innerHTML='💡 <strong>재미있는 사실!</strong><br>'+q.fact;
  fb.classList.remove('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  document.getElementById('next-btn').textContent=currentQ<activeQs.length-1?'다음 문제 →':'결과 보기 🎉';
}

// ── 다음 문제 ──
function nextQ(){
  currentQ++;
  if(currentQ>=activeQs.length){ showResult(); return; }
  renderQ();
}

// ── 결과 ──
function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  done[currentTopic.id]=true;
  const total=activeQs.length;
  const pct=score/total;
  let icon,title,stars;
  if(pct===1){icon='🏆';title='완벽해요! 천재 탐험가!';stars='⭐⭐⭐⭐⭐'}
  else if(pct>=0.8){icon='🎉';title='훌륭해요! 대단한 탐험가!';stars='⭐⭐⭐⭐'}
  else if(pct>=0.6){icon='👍';title='잘했어요! 과학자 꿈나무!';stars='⭐⭐⭐'}
  else if(pct>=0.4){icon='💪';title='다시 도전해봐요!';stars='⭐⭐'}
  else{icon='🚌';title='버스를 타고 다시 탐험!';stars='⭐'}
  document.getElementById('result-icon').textContent=currentTopic.icon;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-stars').textContent=stars;
  document.getElementById('result-score').textContent=`${currentTopic.name} — ${score}/${total}문제 정답!`;
  renderHome();
  checkAllDone();
}

function retryTopic(){ startTopic(currentTopic.id); }

// ── 수료증 ──
function checkAllDone(){
  if(TOPICS.every(t=>done[t.id])){
    document.getElementById('cert-topics').innerHTML=
      TOPICS.map(t=>`<span class="cert-topic-chip">${t.icon} ${t.name}</span>`).join('');
    document.getElementById('cert-modal').classList.remove('hidden');
  }
}
function closeCert(){
  document.getElementById('cert-modal').classList.add('hidden');
}
function goHome(){
  // iframe 정지
  document.getElementById('video-area').innerHTML='';
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

renderHome();
// 설명 페이지에서 넘어올 때 해당 주제 자동 시작
const hash = location.hash.slice(1);
if(hash && TOPICS.find(t => t.id === hash)) startTopic(hash);
</script>
</body>
</html>
