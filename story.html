<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 탐험 이야기 🔭</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#001219;--bg2:#0a4a52;--bg3:#0e7490;--text:#f1f5f9;--text2:#94d2bd;--r:16px}
html,body{background:linear-gradient(160deg,#001219 0%,#005f73 100%);color:var(--text);font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100%;overflow-x:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 1.2rem 4rem}
.hidden{display:none!important}

/* 홈 */
#home{text-align:center;padding-top:3rem}
#home h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;margin:.6rem 0 .3rem;
  background:linear-gradient(135deg,#f97316,#eab308,#22c55e,#3b82f6,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#home .sub{color:var(--text2);font-size:.95rem;margin-bottom:.8rem}
.back-home{display:inline-flex;align-items:center;gap:.4rem;color:#a78bfa;text-decoration:none;font-size:.85rem;margin-bottom:2rem}
.story-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:1.2rem;text-align:left}
.story-card{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);
  padding:1.3rem 1.1rem;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden}
.story-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.5);border-color:var(--tc)}
.sc-icon{font-size:2.4rem;display:block;margin-bottom:.5rem}
.story-card h3{font-size:1rem;font-weight:800;margin-bottom:.25rem}
.story-card p{font-size:.75rem;color:var(--text2);line-height:1.5}
.sc-cnt{position:absolute;top:.7rem;right:.7rem;font-size:.62rem;font-weight:700;
  padding:.15rem .45rem;border-radius:20px;background:rgba(255,255,255,.08);color:var(--text2)}

/* 스토리 화면 */
#story{padding-top:1.5rem}
.s-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1.4rem}
.s-back{background:rgba(255,255,255,.07);border:none;border-radius:50%;width:38px;height:38px;
  font-size:1rem;cursor:pointer;color:var(--text);flex-shrink:0}
.s-title{font-weight:800;font-size:1.05rem}
.s-prog{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px}
.s-prog-fill{height:100%;border-radius:3px;transition:width .5s}
.s-cnt-txt{font-size:.78rem;color:var(--text2);white-space:nowrap}

.scene{background:var(--bg2);border-radius:var(--r);overflow:hidden;margin-bottom:1.2rem;
  border:1px solid rgba(255,255,255,.07);min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.6rem;text-align:center;position:relative}
.scene-bg{position:absolute;inset:0;z-index:0;opacity:.13;font-size:10rem;display:flex;align-items:center;justify-content:center;pointer-events:none;filter:blur(2px)}
.scene-content{position:relative;z-index:1}
.s-big-icon{font-size:4.5rem;display:block;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.s-scene-title{font-size:1.4rem;font-weight:900;margin-bottom:.8rem;line-height:1.4}
.s-scene-text{font-size:.92rem;color:var(--text2);line-height:1.9;max-width:580px}
.s-scene-text strong{color:var(--text)}
.fact-chip{display:inline-block;background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.3);
  border-radius:100px;padding:.3rem .9rem;font-size:.78rem;color:#fbbf24;margin-top:1rem}

.s-nav{display:flex;gap:.8rem;justify-content:space-between;align-items:center}
.s-nav-btn{padding:.85rem 1.8rem;border-radius:100px;border:none;font-size:.95rem;font-weight:700;cursor:pointer}
.btn-prev{background:var(--bg3);color:var(--text)}
.btn-next{background:linear-gradient(135deg,#f97316,#a855f7);color:#fff}
.btn-next:disabled{opacity:.4;cursor:default}

/* 완료 */
.s-done{text-align:center;padding:2rem 1rem}
.s-done .d-icon{font-size:4rem;display:block;margin-bottom:.8rem}
.s-done h2{font-size:1.6rem;font-weight:900;margin-bottom:.5rem}
.s-done p{color:var(--text2);margin-bottom:1.6rem;font-size:.9rem}
.done-btns{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
.d-btn{padding:.8rem 1.8rem;border-radius:100px;border:none;font-size:.9rem;font-weight:700;cursor:pointer}
.d-quiz{background:linear-gradient(135deg,#f97316,#a855f7);color:#fff}
.d-home{background:var(--bg3);color:var(--text)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- 홈 -->
<div class="wrap" id="home">
  <div style="text-align:center;padding-top:3rem">
    <span style="font-size:3.5rem">🔭</span>
    <h1>과학 탐험 이야기</h1>
    <p class="sub">각 주제를 슬라이드로 배워요! 읽고 나서 퀴즈도 도전해봐요.</p>
    <a href="index.html" class="back-home">← 퀴즈 게임으로</a>
  </div>
  <div class="story-grid" id="story-grid"></div>
</div>

<!-- 스토리 -->
<div class="wrap hidden" id="story">
  <div class="s-header">
    <button class="s-back" onclick="goHome()">←</button>
    <span class="s-title" id="s-title"></span>
    <div class="s-prog"><div class="s-prog-fill" id="s-prog-fill"></div></div>
    <span class="s-cnt-txt" id="s-cnt-txt"></span>
  </div>
  <div class="scene" id="scene-box"></div>
  <div class="s-nav">
    <button class="s-nav-btn btn-prev" id="btn-prev" onclick="prevScene()">← 이전</button>
    <button class="s-nav-btn btn-next" id="btn-next" onclick="nextScene()">다음 →</button>
  </div>
</div>

<script>
// 별 배경
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,stars=[];
function resizeCanvas(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.3,a:Math.random()}))}
function drawStars(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{ctx.globalAlpha=s.a*.7;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;requestAnimationFrame(drawStars)}
window.addEventListener('resize',resizeCanvas);resizeCanvas();drawStars();

// 스토리 데이터
const STORIES = [
  {
    id:'space',icon:'🚀',name:'우주 탐험',color:'#3b82f6',desc:'태양계 · 별 · 블랙홀',
    scenes:[
      {bg:'🌍',icon:'🚀',title:'우주로 출발!',
       text:'지구를 벗어나 우주로 나가면 우리 태양계가 보여요.<br>태양계에는 <strong>8개의 행성</strong>이 있고, 모두 태양 주위를 돌고 있어요.<br>태양에서 가장 가까운 행성은 수성, 가장 먼 행성은 해왕성이에요.',
       fact:'태양계는 지름이 약 9조 km!'},
      {bg:'☀️',icon:'☀️',title:'태양은 얼마나 클까?',
       text:'태양의 지름은 지구의 <strong>109배</strong>예요.<br>태양 안에 지구가 130만 개 들어갈 수 있어요!<br>태양 표면 온도는 약 <strong>6,000°C</strong>, 중심부는 무려 1,500만°C예요.',
       fact:'태양 빛이 지구까지 오는 데 약 8분 걸려요'},
      {bg:'🪐',icon:'🪐',title:'가장 큰 행성, 목성',
       text:'목성은 태양계에서 <strong>가장 큰 행성</strong>이에요.<br>지구 11개를 옆에 나열해야 목성 지름이 될 정도로 거대해요.<br>목성의 대적점은 300년 넘게 계속되는 <strong>거대한 태풍</strong>이에요.',
       fact:'목성에는 현재까지 발견된 위성이 95개!'},
      {bg:'⭐',icon:'⭐',title:'별의 일생',
       text:'별은 수소 기체가 모여 탄생해요. 수소 핵융합으로 빛을 내다가<br>수소가 다 소진되면 <strong>적색거성</strong>으로 부풀어 오른 뒤<br>폭발하거나 수축해서 백색왜성·중성자별·<strong>블랙홀</strong>이 돼요.',
       fact:'우리 태양도 약 50억 년 후 적색거성이 될 거예요'},
      {bg:'🌌',icon:'🌌',title:'우주의 크기',
       text:'우리 은하(밀키웨이)에만 별이 <strong>2,000억~4,000억 개</strong> 있어요.<br>그리고 우주에는 이런 은하가 수천억 개!<br>빛이 우주 끝까지 가려면 <strong>138억 년</strong>이 걸린다고 해요.',
       fact:'우주는 지금 이 순간도 계속 팽창하고 있어요'},
    ]
  },
  {
    id:'body',icon:'🫀',name:'인체의 비밀',color:'#ef4444',desc:'심장 · 뼈 · 뇌',
    scenes:[
      {bg:'❤️',icon:'🫀',title:'쉬지 않는 심장',
       text:'심장은 하루에 약 <strong>10만 번</strong> 뛰어요.<br>1년이면 3,600만 번, 평생 약 30억 번 이상 뛰는 셈이에요.<br>잠을 자도, 쉬어도 멈추지 않는 가장 부지런한 근육이에요.',

      {bg:'🦴',icon:'🦴',title:'206개의 뼈',
       text:'어른 몸에는 <strong>206개</strong>의 뼈가 있어요.<br>신기하게도 아기 때는 약 270~300개인데, 자라면서 여러 뼈가 합쳐져요.<br>가장 작은 뼈는 귀 안의 <strong>등골뼈</strong>로 크기가 3mm예요.',

      {bg:'🧠',icon:'🧠',title:'우주보다 복잡한 뇌',

       fact:'우리가 새로운 걸 배울 때마다 뇌 속 연결이 새로 생겨요'},
      {bg:'🩸',icon:'🩸',title:'빨간 혈액의 비밀',
       text:'혈액이 빨간 이유는 <strong>헤모글로빈</strong> 속 철(Fe)이 산소와 결합하면 빨간색이 되기 때문이에요.<br>혈관을 모두 이어 붙이면 약 <strong>96,000km</strong>, 지구를 두 바퀴 반 돌 수 있는 길이예요.',
       fact:'문어·오징어의 피는 구리를 포함해 파란색이에요'},
      {bg:'🫁',icon:'🫁',title:'하루 2만 번 숨쉬기',

       fact:'하루에 약 11,000리터의 공기를 들이마셔요'},
    ]
  },
  {
    id:'ocean',icon:'🌊',name:'바다 세계',color:'#0ea5e9',desc:'심해 · 해양생물 · 물의 순환',
    scenes:[
      {bg:'🌊',icon:'🌊',title:'지구의 71%는 바다',
       text:'지구 표면의 <strong>71%</strong>가 바다예요.<br>평균 수심은 약 3,800m이고, 가장 깊은 곳인 <strong>마리아나 해구</strong>는 무려 11,034m예요.<br>에베레스트산을 거꾸로 넣어도 1.6km가 더 남아요.',
       fact:'바다의 95%는 아직 인간이 탐험하지 못했어요'},
      {bg:'🐙',icon:'🐙',title:'문어의 놀라운 능력',
       text:'문어는 <strong>심장이 3개</strong>이고 피가 파란색이에요.<br>색맹인데도 피부 색을 자유자재로 바꾸고, 먹물로 천적을 혼란시켜요.<br>뇌가 9개(중앙 1개 + 다리마다 1개)나 있어요.',
       fact:'문어는 병뚜껑을 열고, 퍼즐도 풀 수 있어요'},
      {bg:'💧',icon:'💧',title:'물은 어떻게 여행할까?',
       text:'물은 <strong>증발 → 응결(구름) → 강수(비·눈) → 유출(강→바다)</strong>을 반복해요.<br>지구의 물은 새로 만들어지거나 없어지지 않고<br>수십억 년째 이 사이클을 계속하고 있어요.',
       fact:'우리가 마시는 물은 공룡도 마셨던 바로 그 물일 수 있어요'},
      {bg:'🐠',icon:'🐠',title:'바다의 열대우림, 산호초',
       text:'산호는 식물처럼 보이지만 사실 <strong>동물</strong>이에요!<br>아주 작은 폴립이라는 동물들이 모여 형성해요.<br>지구 바다 면적의 0.1%인 산호초에 <strong>전체 해양생물의 25%</strong>가 살아요.',

       fact:'바다가 흡수한 CO₂로 인해 해양 산성화가 진행 중이에요'},
    ]
  },
  {
    id:'electricity',icon:'⚡',name:'전기 마법',color:'#eab308',desc:'전류 · 회로 · 번개',
    scenes:[

       fact:'LED는 일반 전구보다 25배 이상 오래 써요'},
      {bg:'⛈️',icon:'⛈️',title:'번개의 과학',
       text:'구름 속 얼음 알갱이들이 충돌하면서 <strong>정전기</strong>가 쌓여요.<br>전압이 수억 볼트에 달하면 한순간에 방전!<br>번개의 온도는 <strong>약 30,000°C</strong>로 태양 표면의 4배예요.',
       fact:'1초에 전 세계에서 약 100개의 번개가 쳐요'},

       text:'전류가 흐르면 주변에 <strong>자기장</strong>이 생겨요.<br>반대로 자기장이 변하면 전류가 생기는 <strong>전자기 유도</strong>!<br>발전기·모터·스피커·이어폰 모두 이 원리를 이용해요.',

       fact:'전 세계 태양광 발전량은 매년 빠르게 늘고 있어요'},
    ]
  },
  {
    id:'dino',icon:'🦕',name:'공룡 시대',color:'#22c55e',desc:'쥐라기 · 백악기 · 멸종',
    scenes:[
      {bg:'🌿',icon:'🦕',title:'공룡의 시대',

       fact:'공룡이 살던 시간은 인류 역사의 50배 이상이에요'},
      {bg:'🦴',icon:'🦖',title:'최강 포식자 T-rex',
       text:'티라노사우루스 렉스는 당시 <strong>최강 포식자</strong>였어요.<br>무는 힘이 최대 6톤에 달했지만, 앞다리는 유난히 작고 짧았어요.<br>최근 연구에 따르면 T-rex에게 <strong>깃털</strong>이 있었을 가능성이 높아요.',

let curStory = null;
let curScene = 0;

function renderGrid(){
  const grid = document.getElementById('story-grid');
  grid.innerHTML = STORIES.map(s => `
    <div class="story-card" style="--tc:${s.color}" onclick="openStory('${s.id}')">
      <span class="sc-cnt">${s.scenes.length}장면</span>
      <span class="sc-icon">${s.icon}</span>
      <h3>${s.name}</h3>
      <p>${s.desc}</p>
    </div>
  `).join('');
}

function openStory(id){
  curStory = STORIES.find(s => s.id === id);
  curScene = 0;
  document.getElementById('home').classList.add('hidden');
  document.getElementById('story').classList.remove('hidden');
  document.getElementById('s-title').textContent = curStory.icon + ' ' + curStory.name;
  renderScene();
}

function renderScene(){
  const sc = curStory.scenes[curScene];
  const total = curStory.scenes.length;
  document.getElementById('s-prog-fill').style.cssText = `width:${((curScene+1)/total*100)}%;background:${curStory.color}`;
  document.getElementById('s-cnt-txt').textContent = (curScene+1) + ' / ' + total;
  document.getElementById('btn-prev').style.visibility = curScene === 0 ? 'hidden' : 'visible';

  const isLast = curScene === total - 1;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '완료 🎉' : '다음 →';

  document.getElementById('scene-box').innerHTML = `
    <div class="scene-bg">${sc.bg}</div>
    <div class="scene-content">
      <span class="s-big-icon">${sc.icon}</span>
      <div class="s-scene-title">${sc.title}</div>
      <p class="s-scene-text">${sc.text}</p>
      <span class="fact-chip">💡 ${sc.fact}</span>
    </div>
  `;
}

function nextScene(){
  const total = curStory.scenes.length;
  if(curScene < total - 1){
    curScene++;
    renderScene();
  } else {
    // 완료
    document.getElementById('story').classList.add('hidden');
    document.getElementById('scene-box').innerHTML = '';
    showDone();
  }
}

function prevScene(){
  if(curScene > 0){ curScene--; renderScene(); }
}

function showDone(){
  const el = document.getElementById('story');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="s-done">
      <span class="d-icon">${curStory.icon}</span>
      <h2>${curStory.name} 완료!</h2>
      <p style="color:#94a3b8">이제 퀴즈로 실력을 확인해봐요!</p>
      <div class="done-btns">
        <button class="d-btn d-home" onclick="goHome()">← 목록으로</button>
        <button class="d-btn d-quiz" onclick="goQuiz('${curStory.id}')">퀴즈 도전! 🚀</button>
      </div>
    </div>
  `;
}

function goHome(){
  document.getElementById('story').classList.add('hidden');
  document.getElementById('story').innerHTML = `
    <div class="s-header">
      <button class="s-back" onclick="goHome()">←</button>
      <span class="s-title" id="s-title"></span>
      <div class="s-prog"><div class="s-prog-fill" id="s-prog-fill"></div></div>
      <span class="s-cnt-txt" id="s-cnt-txt"></span>
    </div>
    <div class="scene" id="scene-box"></div>
    <div class="s-nav">
      <button class="s-nav-btn btn-prev" id="btn-prev" onclick="prevScene()">← 이전</button>
      <button class="s-nav-btn btn-next" id="btn-next" onclick="nextScene()">다음 →</button>
    </div>
  `;
  document.getElementById('home').classList.remove('hidden');
}

function goQuiz(id){
  location.href = 'index.html#' + id;
}

renderGrid();
</script>
</body>
</html>
